<title>競艇 期待値分析アシスタント — 買わないAI</title>
<script>
/* =========================================================
   CDN 自動フォールバックローダー
   jsdelivr → unpkg → cdnjs の順で試行
   いずれかで読み込みに成功すれば次のライブラリへ進む
   ========================================================= */
(function() {
  var LIBS = [
    { name:'React', test:function(){ return typeof React !== 'undefined'; },
      urls:[
        'https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js',
        'https://unpkg.com/react@18.2.0/umd/react.production.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js'
      ]},
    { name:'ReactDOM', test:function(){ return typeof ReactDOM !== 'undefined'; },
      urls:[
        'https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js',
        'https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js'
      ]},
    { name:'PropTypes', test:function(){ return typeof PropTypes !== 'undefined'; },
      urls:[
        'https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js',
        'https://unpkg.com/prop-types@15.8.1/prop-types.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js'
      ]},
    { name:'Recharts', test:function(){ return typeof Recharts !== 'undefined'; },
      urls:[
        'https://cdn.jsdelivr.net/npm/recharts@2.10.3/umd/Recharts.js',
        'https://unpkg.com/recharts@2.10.3/umd/Recharts.js',
        'https://cdnjs.cloudflare.com/ajax/libs/Recharts/2.10.3/Recharts.js'
      ]},
    { name:'Babel', test:function(){ return typeof Babel !== 'undefined'; },
      urls:[
        'https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js',
        'https://unpkg.com/@babel/standalone@7.23.5/babel.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js'
      ]},
    { name:'Tailwind', test:function(){ return true; },
      urls:['https://cdn.tailwindcss.com'] }
  ];

  function loadOne(lib, idx) {
    idx = idx || 0;
    return new Promise(function(resolve) {
      if (idx >= lib.urls.length) {
        console.error(lib.name + ': all CDNs failed');
        resolve(false);
        return;
      }
      var s = document.createElement('script');
      s.src = lib.urls[idx];
      s.async = false; // 順序保証
      s.onload = function() {
        if (lib.test()) {
          resolve(true);
        } else {
          // 読み込めたがグローバルが見つからない → 次のCDNを試す
          resolve(loadOne(lib, idx+1));
        }
      };
      s.onerror = function() {
        resolve(loadOne(lib, idx+1));
      };
      document.head.appendChild(s);
    });
  }

  async function loadAll() {
    var results = [];
    for (var i = 0; i < LIBS.length; i++) {
      var ok = await loadOne(LIBS[i]);
      results.push({ name: LIBS[i].name, ok: ok });
    }
    // どれが読み込めて、どれが失敗したかをデバッグ用に表示
    console.log('[CDN load results]', results);
    window._cdnResults = results;

    // 必須ライブラリが揃っているか厳格チェック
    var critical = ['React','ReactDOM','Babel','Recharts'];
    var missing = critical.filter(function(name){
      return !results.find(function(r){ return r.name === name && r.ok; });
    });
    if (missing.length > 0) {
      console.error('Missing critical libraries:', missing);
      return; // 診断スクリプトがエラー画面を出す
    }

    // Babel が読み込めたら、ページ内の <script type="text/babel"> を手動コンパイル
    try {
      if (window.Babel && Babel.transformScriptTags) {
        Babel.transformScriptTags();
        console.log('[Babel] transformScriptTags executed');
      } else {
        console.error('[Babel] not available even after load');
      }
    } catch (e) {
      console.error('[Babel] transformScriptTags failed:', e);
      var errBox = document.getElementById('global-error');
      var errMsg = document.getElementById('global-error-msg');
      if (errBox && errMsg) {
        errMsg.textContent = 'Babel コンパイルに失敗しました\n\n' + (e.stack || e.message || e);
        errBox.style.display = 'block';
      }
    }
  }
  loadAll();
})();
</script>

<div id="global-error" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#0b1220;color:#fecaca;padding:24px;overflow:auto;z-index:9999;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;">

<script>
// 起動診断: CDN 読み込みを段階的にチェック
(function() {
  function setStatus(msg, pct) {
    var s = document.getElementById('boot-status');
    var p = document.getElementById('boot-progress');
    if (s) s.textContent = msg;
    if (p) p.style.width = pct + '%';
  }
  function showError(title, detail) {
    var box = document.getElementById('global-error');
    var msg = document.getElementById('global-error-msg');
    if (box && msg) {
      msg.textContent = title + '\n\n' + (detail || '');
      box.style.display = 'block';
    }
  }
  // グローバルエラーを補足
  window.addEventListener('error', function(e) {
    showError('エラー: ' + (e.message || e.error?.message || 'unknown'),
              (e.error?.stack || '') + '\n\n' + (e.filename ? 'at ' + e.filename + ':' + e.lineno : ''));
  });
  window.addEventListener('unhandledrejection', function(e) {
    showError('Promise エラー: ' + (e.reason?.message || e.reason || 'unknown'), e.reason?.stack || '');
  });
  // CDN 読み込み診断 (10秒後に確認 — 3つのCDNを順番に試すため時間がかかる)
  setStatus('起動中… (CDN読み込み)', 30);
  setTimeout(function() { setStatus('jsdelivr / unpkg / cdnjs を順次試行中…', 50); }, 3000);
  setTimeout(function() {
    var missing = [];
    if (typeof React === 'undefined')    missing.push('React');
    if (typeof ReactDOM === 'undefined') missing.push('ReactDOM');
    if (typeof Babel === 'undefined')    missing.push('Babel');
    if (typeof Recharts === 'undefined') missing.push('Recharts');
    if (missing.length > 0) {
      setStatus('CDN 読み込み失敗: ' + missing.join(', '), 100);
      showError('必要なライブラリが読み込めていません: ' + missing.join(', '),
                '3つのCDN (jsdelivr / unpkg / cdnjs) すべてに接続できませんでした。\n' +
                '・Wi-Fi/モバイル回線が一時的に不安定な可能性 → 数秒後にリロード\n' +
                '・会社/学校のネットワークが CDN をブロックしている可能性 → 別の回線で開く\n' +
                '・広告ブロッカー拡張機能が影響している可能性 → 拡張機能をオフにしてリロード');
    } else {
      setStatus('JSXコンパイル中…', 70);
    }
  }, 10000);
  // 20秒経っても起動しない場合
  setTimeout(function() {
    if (document.getElementById('boot-screen')) {
      setStatus('起動が遅延しています… 回線が遅い可能性', 85);
    }
  }, 20000);
})();
</script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;
const { LineChart, Line, BarChart, Bar, XAxis, YAxis, Tooltip, Legend, ResponsiveContainer, CartesianGrid, ReferenceLine, AreaChart, Area, RadarChart, Radar, PolarGrid, PolarAngleAxis, PolarRadiusAxis } = Recharts;

/* =========================================================
   1. サンプルデータ生成
   ========================================================= */
const VENUES = ["桐生","戸田","江戸川","平和島","多摩川","浜名湖","蒲郡","常滑","津","三国","びわこ","住之江","尼崎","鳴門","丸亀","児島","宮島","徳山","下関","若松","芦屋","福岡","唐津","大村"];
const RACER_CLASSES = ["A1","A2","B1","B2"];

function seedRand(seed) {
  let s = seed >>> 0;
  return () => {
    s = (s * 1664525 + 1013904223) >>> 0;
    return s / 0xffffffff;
  };
}
const rng = seedRand(20260427);

function randName(r) {
  const last = ["山田","鈴木","佐藤","田中","高橋","渡辺","伊藤","松本","小林","加藤","吉田","中村","斎藤","木村","林","清水","池田","橋本","山本","森"];
  const first = ["太郎","健","誠","勇","裕一","康介","翔","直樹","敦","和也","拓海","海斗","蓮","大地","蒼","駿","光","聡","純","学"];
  return last[Math.floor(r()*last.length)] + " " + first[Math.floor(r()*first.length)];
}

function generateBoats(raceSeed) {
  const r = seedRand(raceSeed);
  const boats = [];
  for (let i=1; i<=6; i++) {
    const cls = RACER_CLASSES[Math.floor(r()*4)];
    const winRate = +(3 + r()*5).toFixed(2);
    const placeRate = +(20 + r()*40).toFixed(1);
    const motor2 = +(20 + r()*30).toFixed(1);
    const boat2 = +(20 + r()*30).toFixed(1);
    const exTime = +(6.6 + r()*0.5).toFixed(2);
    const ST = +(0.10 + r()*0.18).toFixed(2);
    const courseWinPct = (() => {
      const base = [0.55, 0.16, 0.12, 0.09, 0.06, 0.02];
      return +(base[i-1]*100).toFixed(1);
    })();
    // 拡張データ (オプショナル / サンプル生成)
    const localWinRate  = +(winRate + (r()-0.5)*1.6).toFixed(2);
    const localPlaceRate= +(placeRate + (r()-0.5)*10).toFixed(1);
    const tilt          = [-0.5, 0, 0, 0, 0.5, 1.0, 1.5, 2.0][Math.floor(r()*8)];
    const partsExchange = r() < 0.10 ? ["ペラ"] : (r() < 0.05 ? ["エンジン"] : (r() < 0.05 ? ["プロペラ・キャブ"] : []));
    const prevResults   = Array.from({length: 4}, () => Math.floor(r()*6)+1);
    const seriesLen     = 2 + Math.floor(r()*4); // 2-5走
    const thisSeriesResults = Array.from({length: seriesLen}, () => Math.floor(r()*6)+1);
    const entryHistory  = Array.from({length: 5}, () => r() < 0.78 ? i : Math.floor(r()*6)+1);
    const startExhibition = +(0.10 + r()*0.18).toFixed(2);
    const lapExhibition   = +(6.6 + r()*0.5).toFixed(2);
    const exhibitionNote  = ["", "", "", "行き足◎", "ターン良", "伸び良", "重い", "出足悪", "気配良", "ピッチ良"][Math.floor(r()*10)];

    // レーサー履歴データ (オプショナル / サンプル生成)
    const regNo = 3000 + Math.floor(r() * 2000);
    // 級別変化の生成: 30%維持, 30%昇級, 30%降級, 10%大変動
    const classes = ["A1","A2","B1","B2"];
    const curIdx = classes.indexOf(cls);
    let prevClass, prevPrevClass;
    const transType = r();
    if (transType < 0.30) { prevClass = cls; prevPrevClass = cls; }
    else if (transType < 0.60) {
      const downIdx = Math.min(3, curIdx + 1);
      prevClass = classes[downIdx];
      prevPrevClass = r() < 0.5 ? classes[downIdx] : classes[Math.min(3, downIdx+1)];
    } else if (transType < 0.90) {
      const upIdx = Math.max(0, curIdx - 1);
      prevClass = classes[upIdx];
      prevPrevClass = r() < 0.5 ? classes[upIdx] : classes[Math.max(0, upIdx-1)];
    } else {
      prevClass = classes[Math.max(0, curIdx - 2)];
      prevPrevClass = classes[Math.max(0, curIdx - 2)];
    }
    const everA1 = prevClass === "A1" || prevPrevClass === "A1" || cls === "A1";
    const everA  = everA1 || ["A1","A2"].includes(prevClass) || ["A1","A2"].includes(prevPrevClass);
    const recentWinRate = +(winRate + (r()-0.5)*1.5).toFixed(2);
    const accidentRate = +(r()*0.25).toFixed(2);
    const flState = r() < 0.10 ? ["F1"] : (r() < 0.05 ? ["L1"] : (r() < 0.03 ? ["F1","F2"] : []));
    const last3SeriesResults = Array.from({length: 3+Math.floor(r()*5)}, () => Math.floor(r()*6)+1);
    // コース別成績 (1-6コース別の1着率%)
    const courseStats = {};
    for (let cn=1; cn<=6; cn++) {
      const base = [55, 16, 12, 9, 6, 2][cn-1];
      courseStats[cn] = +(Math.max(0, base + (r()-0.5)*15)).toFixed(1);
    }

    boats.push({
      boatNo: i,
      racer: randName(r),
      class: cls,
      winRate, placeRate,
      motor2, boat2,
      exTime, ST,
      courseWinPct,
      weight: +(50 + r()*8).toFixed(1),
      // 拡張データ
      localWinRate, localPlaceRate,
      tilt, partsExchange,
      prevResults, thisSeriesResults,
      entryHistory,
      startExhibition, lapExhibition, exhibitionNote,
      // レーサー履歴データ
      regNo, prevClass, prevPrevClass,
      everA1, everA,
      recentWinRate, accidentRate, flState,
      last3SeriesResults, courseStats,
      // モーター追加情報 (節内評価)
      motorNo: 50 + Math.floor(r() * 50),
      motorRanking: +(r() * 100).toFixed(0),
      motorTrend: ["上昇", "下降", "横ばい", "横ばい"][Math.floor(r() * 4)],
      motorType: ["出足型", "伸び型", "バランス型", "バランス型"][Math.floor(r() * 4)],
      avgExhibitionTime: +(6.65 + r() * 0.4).toFixed(2),
      recentUserResults: Array.from({length: 2 + Math.floor(r()*3)}, () => Math.floor(r()*6)+1),
      // 支部 (地元判定用)
      branch: ["群馬","埼玉","東京","静岡","愛知","三重","福井","滋賀","大阪","兵庫","徳島","香川","岡山","広島","山口","福岡","佐賀","長崎"][Math.floor(r() * 18)],
    });
  }
  return boats;
}

function generateRaces(date) {
  const races = [];
  let id = 1;
  const pickedVenues = [...VENUES].sort(()=> rng()-0.5).slice(0,6);
  for (const v of pickedVenues) {
    for (let rn=1; rn<=4; rn++) {
      const seed = id*1000;
      const boats = generateBoats(seed);
      const r = seedRand(seed+7);
      const weather = ["晴","曇","雨"][Math.floor(r()*3)];
      const wind = +(r()*8).toFixed(1);
      const windDir = ["追い風","向かい風","横風"][Math.floor(r()*3)];
      const wave = +(r()*15|0);
      const startHour = 10 + Math.floor(r()*8);
      const startMin = ["00","15","30","45"][Math.floor(r()*4)];
      const nowIso = new Date().toISOString();
      races.push({
        id: "R"+String(id).padStart(3,"0"),
        date, venue: v, raceNo: rn,
        startTime: `${String(startHour).padStart(2,"0")}:${startMin}`,
        weather, wind, windDir, wave,
        boats,
        // データ鮮度用タイムスタンプ
        updatedAt: nowIso,
        exhibitionUpdatedAt: nowIso,
        oddsUpdatedAt: nowIso,
        sourceMode: "sample",
      });
      id++;
    }
  }
  return races;
}

/* =========================================================
   /api/today から取得した本日スケジュールを races[] に変換
   - 会場 / レース番号 / 発走時刻 は実データ
   - 出走表 (boats) は当面サンプル合成 (今後 /api/program で置換予定)
   ========================================================= */
function buildRacesFromSchedule(scheduleJson, fallbackDate) {
  if (!scheduleJson || !Array.isArray(scheduleJson.venues) || scheduleJson.venues.length === 0) return [];
  const dateStr = scheduleJson.date || fallbackDate || new Date().toISOString().slice(0,10).replace(/-/g,"");
  // YYYYMMDD → YYYY-MM-DD
  const dateIso = (dateStr.length === 8)
    ? `${dateStr.slice(0,4)}-${dateStr.slice(4,6)}-${dateStr.slice(6,8)}`
    : dateStr;
  const races = [];
  let id = 1;
  for (const v of scheduleJson.venues) {
    for (const rr of (v.races || [])) {
      const seed = (Number(v.jcd)||0) * 100000 + (rr.raceNo||0) * 10 + Number(dateStr.slice(-4)||0);
      const boats = generateBoats(seed);
      const r = seedRand(seed+7);
      const weather = ["晴","曇","雨"][Math.floor(r()*3)];
      const wind = +(r()*8).toFixed(1);
      const windDir = ["追い風","向かい風","横風"][Math.floor(r()*3)];
      const wave = +(r()*15|0);
      const nowIso = new Date().toISOString();
      races.push({
        id: `R${v.jcd}-${String(rr.raceNo).padStart(2,"0")}`,
        date: dateIso,
        venue: v.name,
        jcd: v.jcd,
        raceNo: rr.raceNo,
        startTime: rr.startTime || "",
        weather, wind, windDir, wave,
        boats,
        updatedAt: nowIso,
        exhibitionUpdatedAt: nowIso,
        oddsUpdatedAt: nowIso,
        sourceMode: "real-schedule",
      });
      id++;
    }
  }
  return races;
}

/* /api/today を叩いて schedule を取得 (例外を投げず ok:false 形式で返す) */
async function fetchTodaySchedule() {
  try {
    const resp = await fetch("/api/today", { headers: { "Accept": "application/json" } });
    if (!resp.ok) return { ok:false, status:resp.status, error:`HTTP ${resp.status}` };

/* 既存 race.boats に /api/program で取得した実データを上書き (取れた項目のみ) */
function mergeRealBoats(syntheticBoats, apiBoats) {
  if (!Array.isArray(apiBoats) || apiBoats.length === 0) return syntheticBoats;
  return syntheticBoats.map(b => {
    const real = apiBoats.find(rb => rb.boatNo === b.boatNo);
    if (!real) return b;
    return {
      ...b,
      racer:          real.racer || b.racer,
      class:          real.class || b.class,
      winRate:        real.winRate        ?? b.winRate,
      placeRate:      real.placeRate      ?? b.placeRate,
      localWinRate:   real.localWinRate   ?? b.localWinRate,
      localPlaceRate: real.localPlaceRate ?? b.localPlaceRate,
      motor2:         real.motor2         ?? b.motor2,
      boat2:          real.boat2          ?? b.boat2,
      sourceMode:     "real",
    };
  });
}

   2. 予測エンジン (寄与度を返すよう拡張)
   ========================================================= */
/* 既定の重み (state 化可能) */
const FACTOR_KEYS = ["winRate","placeRate","motor","boat","ST","exTime","course","wind","wave"];
const FACTOR_LABELS = {
  winRate:   "全国勝率",
  placeRate: "2連対率",
  motor:     "モーター2連率",
  boat:      "ボート2連率",
  ST:        "平均ST",
  exTime:    "展示タイム",
  course:    "コース1着率",
  wind:      "風速影響",
  wave:      "波高影響",
};
const DEFAULT_WEIGHTS = {
  winRate:0.20, placeRate:0.15, motor:0.15, boat:0.05,
  ST:0.15, exTime:0.10, course:0.20, wind:0.10, wave:0.05,
};

/* =========================================================
   選手コメント分類 (主観情報なので最後の補正材料として使用)
   ========================================================= */
const COMMENT_KEYWORDS = {
  strong: [
    "足がいい","足は良い","足良し","足良","出足がいい","出足良","出足良し","出足は良い",
    "伸びがいい","伸びる","伸び良","伸び良し","伸び抜群",
    "回り足がいい","回り足良","回り足良し","ターンがいい","ターン良",
    "気配いい","気配良","良化","仕上がり良","好気配","上昇","好機","ピッチ良"
  ],
  weak: [
    "重い","重め","乗りにくい","ノリにくい","伸びられる","伸びない",
    "出足悪","出足が悪","出足弱","回り足悪","回り足弱","ターンが悪","ターン悪",
    "気配悪","気配良くない","下降","ピッチ悪","減速","モタつく","もたつく","しっくり来ない","しっくりこない","違和感","行き足悪"
  ],
};

function classifyComment(text) {
  if (!text || typeof text !== "string" || text.trim() === "") {
    return { klass: "？", label: "不明", strength: 0, hits: [] };
  }
  const t = text;
  let strong = 0, weak = 0;
  const hits = [];
  for (const k of COMMENT_KEYWORDS.strong) if (t.includes(k)) { strong++; hits.push("＋"+k); }
  for (const k of COMMENT_KEYWORDS.weak)   if (t.includes(k)) { weak++;   hits.push("−"+k); }
  if (strong === 0 && weak === 0) return { klass: "○", label: "普通", strength: 0, hits: [] };
  const net = strong - weak;
  if (net >= 1) return { klass: "◎", label: "強い", strength: net, hits };
  if (net <= -1) return { klass: "▲", label: "弱い", strength: net, hits };
  return { klass: "○", label: "普通", strength: 0, hits };
}

/* コメントによるスコア補正 (数値より弱い補正係数で適用) */
function applyCommentAdjustments(scores, race, comments) {
  const adjusted = scores.map(s => s);
  const log = []; // [{boatNo, klass, factor, comment, hits, contradiction}]
  if (!comments) return { adjusted, log };
  race.boats.forEach((b, i) => {
    const text = comments[String(b.boatNo)] ?? comments[b.boatNo];
    const c = classifyComment(text);
    // 補正係数: ◎=+5〜+10%, ▲=-5〜-10% (語数の強さで段階的)
    let factor = 1.0;
    if (c.klass === "◎") factor = Math.min(1.10, 1 + 0.05 + Math.min(0.05, c.strength*0.02));
    else if (c.klass === "▲") factor = Math.max(0.90, 1 - 0.05 - Math.min(0.05, Math.abs(c.strength)*0.02));
    adjusted[i] = adjusted[i] * factor;
    if (text != null && text !== "") {
      log.push({
        boatNo: b.boatNo, klass: c.klass, label: c.label,
        factor, percent: ((factor-1)*100), comment: text, hits: c.hits,
      });
    } else {
      log.push({ boatNo: b.boatNo, klass: "？", label: "不明", factor: 1, percent: 0, comment: "", hits: [] });
    }
  });
  return { adjusted, log };
}

/* コメントと数値データの矛盾検出 */
function detectCommentContradictions(race, comments) {
  const out = [];
  if (!comments) return out;
  race.boats.forEach(b => {
    const text = comments[String(b.boatNo)] ?? comments[b.boatNo];
    if (!text) return;
    const c = classifyComment(text);
    if (b.exTime != null && b.exTime <= 6.75 && c.klass === "▲") {
      out.push({ boatNo: b.boatNo, type: "warn", text: `${b.boatNo}号艇: 展示${b.exTime}は良いがコメント弱気 — 過信注意 (実戦では走らない可能性)` });
    }
    if (b.exTime != null && b.exTime >= 6.95 && c.klass === "◎") {
      out.push({ boatNo: b.boatNo, type: "info", text: `${b.boatNo}号艇: 展示${b.exTime}は遅いがコメント強気 — 数値に出ない良化の可能性` });
    }
    if (b.motor2 != null && b.motor2 >= 40 && c.klass === "▲") {
      out.push({ boatNo: b.boatNo, type: "warn", text: `${b.boatNo}号艇: モーター${b.motor2}%は高水準だがコメント弱気 — 仕上がり不安` });
    }
    if (b.motor2 != null && b.motor2 <= 25 && c.klass === "◎") {
      out.push({ boatNo: b.boatNo, type: "info", text: `${b.boatNo}号艇: モーター${b.motor2}%は低調だがコメント強気 — 調整成功の可能性` });
    }
    if (b.ST != null && b.ST <= 0.13 && c.klass === "▲") {
      out.push({ boatNo: b.boatNo, type: "warn", text: `${b.boatNo}号艇: ST${b.ST}は早いがコメント弱気 — 数値だけ良い可能性` });
    }
  });
  return out;
}

/* =========================================================
   拡張データの補正 (全項目オプショナル — 欠損で壊れない設計)
   - 当地勝率 / 当地2連対率
   - チルト
   - 部品交換
   - 前走成績 / 今節成績
   - 進入コース履歴
   - スタート展示 / 周回展示 / 展示気配メモ
   既存の base score → flag → comment → extension の順で乗算合成
   ========================================================= */
function applyExtensionAdjustments(scores, race) {
  const adjusted = scores.map(s => s);
  const log = []; // [{boatNo, items:[...], factor, percent}]
  if (!race?.boats) return { adjusted, log };

  race.boats.forEach((b, i) => {
    let factor = 1.0;
    const items = [];

    // ① 当地勝率 (全国勝率との差で会場適性を評価)
    if (b.localWinRate != null && !isNaN(b.localWinRate) && b.winRate != null && !isNaN(b.winRate)) {
      const diff = b.localWinRate - b.winRate;
      if (diff >= 1.0)      { factor *= 1.06; items.push({label:`当地勝率 ${b.localWinRate} (全国比 +${diff.toFixed(1)}) 会場適性◎`, pct:6}); }
      else if (diff >= 0.5) { factor *= 1.03; items.push({label:`当地勝率 ${b.localWinRate} (全国比 +${diff.toFixed(1)})`, pct:3}); }
      else if (diff <= -1.0){ factor *= 0.95; items.push({label:`当地勝率 ${b.localWinRate} (全国比 ${diff.toFixed(1)}) 当地不振`, pct:-5}); }
      else if (diff <= -0.5){ factor *= 0.98; items.push({label:`当地勝率 ${b.localWinRate} (全国比 ${diff.toFixed(1)})`, pct:-2}); }
    }

    // ② 当地2連対率 (補強的な扱い)
    if (b.localPlaceRate != null && !isNaN(b.localPlaceRate) && b.placeRate != null && !isNaN(b.placeRate)) {
      const diff = b.localPlaceRate - b.placeRate;
      if (diff >= 8)       { factor *= 1.02; items.push({label:`当地2連対率 +${diff.toFixed(0)}pt`, pct:2}); }
      else if (diff <= -8) { factor *= 0.99; items.push({label:`当地2連対率 ${diff.toFixed(0)}pt`, pct:-1}); }
    }

    // ③ チルト (高いほど伸び型 — 外艇プラス、1号艇マイナス)
    if (b.tilt != null && !isNaN(b.tilt)) {
      if (b.tilt >= 1.5) {
        if (b.boatNo >= 4)      { factor *= 1.05; items.push({label:`チルト${b.tilt} 外艇まくり伸び +5%`, pct:5}); }
        else if (b.boatNo === 1){ factor *= 0.97; items.push({label:`チルト${b.tilt} 1号艇には不利 -3%`, pct:-3}); }
        else                    { factor *= 1.02; items.push({label:`チルト${b.tilt} 中艇伸び`, pct:2}); }
      } else if (b.tilt <= -0.5) {
        if (b.boatNo === 1)     { factor *= 1.03; items.push({label:`チルト${b.tilt} 出足型 1号艇有利`, pct:3}); }
      }
    }

    // ④ 部品交換 (直後は信頼度↓、軽くスコア減)
    const parts = Array.isArray(b.partsExchange) ? b.partsExchange : (b.partsExchange ? String(b.partsExchange).split(/[,、・/]/).map(s=>s.trim()).filter(Boolean) : []);
    if (parts.length > 0) {
      let pen = 0.97; let pct = -3;
      // ペラ・エンジン交換は影響大
      if (parts.some(p => /ペラ|エンジン/.test(p))) { pen = 0.95; pct = -5; }
      factor *= pen;
      items.push({label:`部品交換あり (${parts.join("/")}) 実戦未確認`, pct});
    }

    // ⑤ 前走成績 (直近3走の平均着順)
    if (Array.isArray(b.prevResults) && b.prevResults.length > 0) {
      const recent = b.prevResults.slice(0, 3).filter(x => typeof x === "number" && x>=1 && x<=6);
      if (recent.length > 0) {
        const avg = recent.reduce((a,b)=>a+b, 0) / recent.length;
        if (avg <= 2.0)      { factor *= 1.04; items.push({label:`前走平均${avg.toFixed(1)}着 上向き`, pct:4}); }
        else if (avg <= 2.7) { factor *= 1.02; items.push({label:`前走平均${avg.toFixed(1)}着`, pct:2}); }
        else if (avg >= 4.5) { factor *= 0.95; items.push({label:`前走平均${avg.toFixed(1)}着 不振`, pct:-5}); }
      }
    }

    // ⑥ 今節成績 (前半 vs 後半比較)
    if (Array.isArray(b.thisSeriesResults) && b.thisSeriesResults.length >= 2) {
      const all = b.thisSeriesResults.filter(x => typeof x === "number" && x>=1 && x<=6);
      if (all.length >= 2) {
        const recent = all.slice(0, Math.ceil(all.length/2));
        const old = all.slice(Math.ceil(all.length/2));
        const avgRecent = recent.reduce((a,b)=>a+b,0) / recent.length;
        const avgOld    = old.length>0 ? old.reduce((a,b)=>a+b,0) / old.length : avgRecent;
        if (avgRecent > avgOld + 1.5) {
          factor *= 0.96;
          items.push({label:`今節 ${avgOld.toFixed(1)}→${avgRecent.toFixed(1)}着 悪化`, pct:-4});
        } else if (avgRecent + 1.0 < avgOld) {
          factor *= 1.03;
          items.push({label:`今節 ${avgOld.toFixed(1)}→${avgRecent.toFixed(1)}着 上昇`, pct:3});
        } else if (avgRecent <= 2.5) {
          factor *= 1.02;
          items.push({label:`今節 平均${avgRecent.toFixed(1)}着 好調`, pct:2});
        }
      }
    }

    // ⑦ 進入コース履歴 (枠なり率)
    if (Array.isArray(b.entryHistory) && b.entryHistory.length >= 3) {
      const valid = b.entryHistory.filter(c => typeof c === "number" && c>=1 && c<=6);
      if (valid.length >= 3) {
        const fixedRate = valid.filter(c => c === b.boatNo).length / valid.length;
        if (fixedRate < 0.5)       { factor *= 0.97; items.push({label:`進入枠なり率 ${(fixedRate*100).toFixed(0)}% 不安定`, pct:-3}); }
        else if (fixedRate >= 0.9) { factor *= 1.02; items.push({label:`進入枠なり率 ${(fixedRate*100).toFixed(0)}% 安定`, pct:2}); }
      }
    }

    // ⑧ スタート展示 (早いほど加点)
    if (b.startExhibition != null && !isNaN(b.startExhibition)) {
      if (b.startExhibition <= 0.10)      { factor *= 1.04; items.push({label:`スタ展${b.startExhibition} 早い`, pct:4}); }
      else if (b.startExhibition <= 0.13) { factor *= 1.02; items.push({label:`スタ展${b.startExhibition}`, pct:2}); }
      else if (b.startExhibition >= 0.20) { factor *= 0.96; items.push({label:`スタ展${b.startExhibition} 遅い`, pct:-4}); }
    }

    // ⑨ 周回展示 (ターン回り評価)
    if (b.lapExhibition != null && !isNaN(b.lapExhibition)) {
      if (b.lapExhibition <= 6.72)      { factor *= 1.03; items.push({label:`周回展示${b.lapExhibition} 良`, pct:3}); }
      else if (b.lapExhibition >= 7.00) { factor *= 0.97; items.push({label:`周回展示${b.lapExhibition} 悪`, pct:-3}); }
    }

    // ⑩ 展示気配メモ (自由記述、コメント分類関数を流用)
    if (b.exhibitionNote && typeof b.exhibitionNote === "string" && b.exhibitionNote.trim() !== "") {
      const c = classifyComment(b.exhibitionNote);
      if (c.klass === "◎")      { factor *= 1.02; items.push({label:`展示気配「${b.exhibitionNote}」(◎)`, pct:2}); }
      else if (c.klass === "▲") { factor *= 0.98; items.push({label:`展示気配「${b.exhibitionNote}」(▲)`, pct:-2}); }
    }

    if (items.length > 0) {
      adjusted[i] = adjusted[i] * factor;
      log.push({
        boatNo: b.boatNo,
        items,
        factor,
        percent: (factor - 1) * 100,
      });
    }
  });
  return { adjusted, log };
}

/* 拡張データから抽出する注意材料 */
function detectExtensionNotes(race) {
  const notes = [];
  if (!race?.boats) return notes;
  race.boats.forEach(b => {
    const parts = Array.isArray(b.partsExchange) ? b.partsExchange : (b.partsExchange ? String(b.partsExchange).split(/[,、・/]/).map(s=>s.trim()).filter(Boolean) : []);
    if (parts.length > 0) {
      notes.push({type:"warn", boatNo: b.boatNo, text:`${b.boatNo}号艇: 部品交換あり (${parts.join("/")}) — 実戦での出力が未知数`});
    }
    if (Array.isArray(b.entryHistory) && b.entryHistory.length >= 3) {
      const valid = b.entryHistory.filter(c => typeof c === "number" && c>=1 && c<=6);
      if (valid.length >= 3) {
        const fixedRate = valid.filter(c => c === b.boatNo).length / valid.length;
        if (fixedRate < 0.5) notes.push({type:"warn", boatNo: b.boatNo, text:`${b.boatNo}号艇: 進入が不安定 (枠なり ${(fixedRate*100).toFixed(0)}%) — コース読みに注意`});
      }
    }
    if (Array.isArray(b.thisSeriesResults) && b.thisSeriesResults.length >= 3) {
      const all = b.thisSeriesResults.filter(x => typeof x === "number" && x>=1 && x<=6);
      if (all.length >= 3) {
        const r = all.slice(0, Math.ceil(all.length/2));
        const o = all.slice(Math.ceil(all.length/2));
        const ar = r.reduce((a,b)=>a+b,0) / r.length;
        const ao = o.length ? o.reduce((a,b)=>a+b,0) / o.length : ar;
        if (ar > ao + 1.5) notes.push({type:"warn", boatNo: b.boatNo, text:`${b.boatNo}号艇: 今節成績が悪化傾向 (${ao.toFixed(1)}→${ar.toFixed(1)}着)`});
      }
    }
    if (b.localWinRate != null && b.winRate != null) {
      const d = b.localWinRate - b.winRate;
      if (d >= 1.0)      notes.push({type:"good", boatNo: b.boatNo, text:`${b.boatNo}号艇: 当地勝率 ${b.localWinRate} (全国比 +${d.toFixed(1)}) — 会場適性◎`});
      else if (d <= -1.0) notes.push({type:"warn", boatNo: b.boatNo, text:`${b.boatNo}号艇: 当地勝率 ${b.localWinRate} (全国比 ${d.toFixed(1)}) — 当地で結果が出ていない`});
    }
    if (b.tilt != null && b.tilt >= 1.5 && b.boatNo === 1) {
      notes.push({type:"info", boatNo: b.boatNo, text:`${b.boatNo}号艇: チルト${b.tilt} (伸び寄り) — 1号艇には逆効果の可能性`});
    }
  });
  return notes;
}

/* =========================================================
   レーサー履歴データの補正 (全項目オプショナル)
   - 登録番号 / 現在級別 / 前期級別 / 前々期級別
   - 級別変化 / A1経験 / A級経験
   - 近況勝率 / 事故率 / F/L状況
   - 過去3節成績 / コース別成績
   重視するのは「現在級別」ではなく「級別の変化と近況」
   ========================================================= */
function classRank(c) {
  return {"A1":4, "A2":3, "B1":2, "B2":1}[c] || 0;
}

function applyRacerHistoryAdjustments(scores, race) {
  const adjusted = scores.map(s => s);
  const log = [];
  if (!race?.boats) return { adjusted, log };

  race.boats.forEach((b, i) => {
    let factor = 1.0;
    const items = [];
    const cur = b.class;
    const prev = b.prevClass;
    const prevPrev = b.prevPrevClass;
    const everA1 = b.everA1 === true || prev === "A1" || prevPrev === "A1";
    const everA  = b.everA  === true || everA1 || prev === "A2" || prevPrev === "A2";
    const change = (prev != null && cur != null) ? classRank(cur) - classRank(prev) : null;

    // ① 元A1/A級で現在B級 → 過小評価候補
    if (everA1 && (cur === "B1" || cur === "B2")) {
      factor *= 1.05; items.push({label:`元A1で現在${cur} 過小評価候補`, pct:5});
    } else if (everA && !everA1 && (cur === "B1" || cur === "B2")) {
      factor *= 1.03; items.push({label:`元A級で現在${cur}`, pct:3});
    }

    // ② 昇級 (近況上昇)
    if (change != null) {
      if (change >= 2)      { factor *= 1.05; items.push({label:`大幅昇級 (${prev}→${cur})`, pct:5}); }
      else if (change === 1){ factor *= 1.03; items.push({label:`昇級 (${prev}→${cur}) 近況上昇`, pct:3}); }
    }

    // ③ A1→A2/B1 降級 → 過信注意 (人気なら危険)
    if (cur === "A2" && prev === "A1") {
      factor *= 0.97; items.push({label:`A1→A2 降級`, pct:-3});
    }
    if ((cur === "B1" || cur === "B2") && prev === "A1") {
      factor *= 0.95; items.push({label:`A1→${cur} 大幅降級 過信注意`, pct:-5});
    }

    // ④ 近況勝率 vs 級別の整合性
    if (b.recentWinRate != null && !isNaN(b.recentWinRate)) {
      const rwr = b.recentWinRate;
      if ((cur === "B1" || cur === "B2") && rwr >= 6.0) {
        factor *= 1.04; items.push({label:`${cur}だが近況${rwr} 妙味候補`, pct:4});
      }
      if (cur === "A1" && rwr < 5.5) {
        factor *= 0.95; items.push({label:`A1で近況${rwr} 悪化 危険人気`, pct:-5});
      }
      if (cur === "A2" && rwr < 5.0) {
        factor *= 0.97; items.push({label:`A2で近況${rwr} 悪化`, pct:-3});
      }
      if (cur === "A1" && rwr >= 7.5) {
        factor *= 1.02; items.push({label:`A1+近況${rwr} 好調`, pct:2});
      }
    }

    // ⑤ 事故率
    if (b.accidentRate != null && !isNaN(b.accidentRate)) {
      if (b.accidentRate >= 0.20)      { factor *= 0.95; items.push({label:`事故率${b.accidentRate} 高`, pct:-5}); }
      else if (b.accidentRate >= 0.10) { factor *= 0.98; items.push({label:`事故率${b.accidentRate}`, pct:-2}); }
    }

    // ⑥ F/L状況 (フライング・出遅れ持ち)
    const flState = Array.isArray(b.flState) ? b.flState : (b.flState ? String(b.flState).split(/[,、・/]/).map(s=>s.trim()).filter(Boolean) : []);
    const fCount = flState.filter(s => /^F/i.test(s)).length;
    const lCount = flState.filter(s => /^L/i.test(s)).length;
    if (fCount > 0) { factor *= 0.97; items.push({label:`F${fCount}持ち スタ慎重`, pct:-3}); }
    if (lCount > 0) { factor *= 0.98; items.push({label:`L${lCount}持ち 出遅れ警戒`, pct:-2}); }

    // ⑦ コース別成績 (枠なり進入想定)
    if (b.courseStats && typeof b.courseStats === "object") {
      const cs = b.courseStats[String(b.boatNo)] ?? b.courseStats[b.boatNo];
      if (cs != null && !isNaN(cs)) {
        if (cs <= 5)                       { factor *= 0.96; items.push({label:`${b.boatNo}コース成績${cs}% 弱`, pct:-4}); }
        else if (cs >= 30 && b.boatNo >= 4){ factor *= 1.03; items.push({label:`${b.boatNo}コース成績${cs}% 強`, pct:3}); }
      }
    }

    // ⑧ 過去3節成績 (補強的・控えめ)
    if (Array.isArray(b.last3SeriesResults) && b.last3SeriesResults.length >= 2) {
      const valid = b.last3SeriesResults.filter(x => typeof x === "number" && x>=1 && x<=6);
      if (valid.length >= 2) {
        const avg = valid.reduce((a,b)=>a+b,0) / valid.length;
        if (avg <= 2.5)      { factor *= 1.02; items.push({label:`過去3節平均${avg.toFixed(1)}着`, pct:2}); }
        else if (avg >= 4.5) { factor *= 0.98; items.push({label:`過去3節平均${avg.toFixed(1)}着`, pct:-2}); }
      }
    }

    if (items.length > 0) {
      adjusted[i] = adjusted[i] * factor;
      log.push({
        boatNo: b.boatNo,
        items, factor,
        percent: (factor-1)*100,
        cur, prev, prevPrev, everA1, everA, change,
      });
    }
  });
  return { adjusted, log };
}

function detectRacerHistoryNotes(race) {
  const notes = [];
  if (!race?.boats) return notes;
  race.boats.forEach(b => {
    const cur = b.class;
    const prev = b.prevClass;
    const everA1 = b.everA1 === true || prev === "A1" || b.prevPrevClass === "A1";
    const everA  = b.everA  === true || everA1 || prev === "A2" || b.prevPrevClass === "A2";
    const change = (prev != null && cur != null) ? classRank(cur) - classRank(prev) : null;

    // 過小評価候補
    if (everA1 && (cur === "B1" || cur === "B2")) {
      notes.push({type:"good", boatNo:b.boatNo, text:`${b.boatNo}号艇: 元A1で現在${cur} — 過小評価候補`});
    } else if (everA && !everA1 && (cur === "B1" || cur === "B2")) {
      notes.push({type:"good", boatNo:b.boatNo, text:`${b.boatNo}号艇: 元A級で現在${cur}`});
    }
    // A1→B級 降級で人気→過信
    if ((cur === "B1" || cur === "B2") && prev === "A1") {
      notes.push({type:"warn", boatNo:b.boatNo, text:`${b.boatNo}号艇: A1→${cur} 大幅降級 — 過去実績で人気なら過信注意`});
    }
    if (cur === "A2" && prev === "A1") {
      notes.push({type:"info", boatNo:b.boatNo, text:`${b.boatNo}号艇: A1→A2 降級`});
    }
    // 昇級
    if (change != null && change >= 1 && prev) {
      notes.push({type:"good", boatNo:b.boatNo, text:`${b.boatNo}号艇: ${prev}→${cur} 昇級中`});
    }
    // 危険人気: 級別高いが近況悪
    if (b.recentWinRate != null) {
      if ((cur === "A1") && b.recentWinRate < 5.5) {
        notes.push({type:"warn", boatNo:b.boatNo, text:`${b.boatNo}号艇: A1級だが近況勝率${b.recentWinRate} — 級別人気の罠`});
      } else if ((cur === "A2") && b.recentWinRate < 5.0) {
        notes.push({type:"warn", boatNo:b.boatNo, text:`${b.boatNo}号艇: A2級だが近況勝率${b.recentWinRate} — 危険人気`});
      }
      // 妙味 (B級だが近況高)
      if ((cur === "B1" || cur === "B2") && b.recentWinRate >= 6.0) {
        notes.push({type:"good", boatNo:b.boatNo, text:`${b.boatNo}号艇: ${cur}だが近況勝率${b.recentWinRate} — 妙味あり`});
      }
    }
    // F/L
    const flState = Array.isArray(b.flState) ? b.flState : (b.flState ? String(b.flState).split(/[,、・/]/).map(s=>s.trim()).filter(Boolean) : []);
    const fCount = flState.filter(s => /^F/i.test(s)).length;
    const lCount = flState.filter(s => /^L/i.test(s)).length;
    if (fCount > 0) notes.push({type:"warn", boatNo:b.boatNo, text:`${b.boatNo}号艇: F${fCount}持ち (${flState.join("/")}) — スタートが慎重になる可能性`});
    if (lCount > 0) notes.push({type:"warn", boatNo:b.boatNo, text:`${b.boatNo}号艇: L${lCount}持ち — 出遅れリスク`});
    // 事故率
    if (b.accidentRate != null && b.accidentRate >= 0.15) {
      notes.push({type:"warn", boatNo:b.boatNo, text:`${b.boatNo}号艇: 事故率${b.accidentRate} — 信頼度を割引`});
    }
    // コース別極端弱
    if (b.courseStats) {
      const cs = b.courseStats[String(b.boatNo)] ?? b.courseStats[b.boatNo];
      if (cs != null && cs <= 5) {
        notes.push({type:"warn", boatNo:b.boatNo, text:`${b.boatNo}号艇: ${b.boatNo}コース成績${cs}% — 枠なりでも割引`});
      } else if (cs != null && cs >= 35 && b.boatNo >= 4) {
        notes.push({type:"good", boatNo:b.boatNo, text:`${b.boatNo}号艇: ${b.boatNo}コース成績${cs}% — 当該コースで強い`});
      }
    }
  });
  return notes;
}

/* =========================================================
   地元・コース適性・水面特性
   - 各会場の地元支部マスター
   - 水面特性タイプ (inner_strong / inner_weak / rough / balanced)
   - 補正は最大±5%にクリップ (微調整役)
   ========================================================= */
const VENUE_HOME_BRANCH = {
  "桐生":"群馬","戸田":"埼玉","江戸川":"東京","平和島":"東京","多摩川":"東京",
  "浜名湖":"静岡","蒲郡":"愛知","常滑":"愛知","津":"三重","三国":"福井",
  "びわこ":"滋賀","住之江":"大阪","尼崎":"兵庫","鳴門":"徳島","丸亀":"香川",
  "児島":"岡山","宮島":"広島","徳山":"山口","下関":"山口","若松":"福岡",
  "芦屋":"福岡","福岡":"福岡","唐津":"佐賀","大村":"長崎",
};
const VENUE_TRAITS = {
  "桐生":   { type:"inner_strong", note:"インやや有利" },
  "戸田":   { type:"inner_weak",   note:"イン弱め・スリット狭い" },
  "江戸川": { type:"rough",        note:"潮汐・荒れやすい" },
  "平和島": { type:"rough",        note:"荒れやすい・外伸び" },
  "多摩川": { type:"balanced",     note:"標準" },
  "浜名湖": { type:"balanced",     note:"標準" },
  "蒲郡":   { type:"inner_strong", note:"イン強め (ナイター)" },
  "常滑":   { type:"balanced",     note:"標準" },
  "津":     { type:"balanced",     note:"標準" },
  "三国":   { type:"rough",        note:"風で荒れやすい" },
  "びわこ": { type:"rough",        note:"標高・季節差大" },
  "住之江": { type:"inner_strong", note:"イン堅実" },
  "尼崎":   { type:"inner_strong", note:"インやや有利" },
  "鳴門":   { type:"rough",        note:"潮流・荒れやすい" },
  "丸亀":   { type:"balanced",     note:"標準" },
  "児島":   { type:"rough",        note:"荒れやすい" },
  "宮島":   { type:"balanced",     note:"標準" },
  "徳山":   { type:"inner_strong", note:"イン強め (ナイター)" },
  "下関":   { type:"inner_strong", note:"インやや有利" },
  "若松":   { type:"balanced",     note:"標準" },
  "芦屋":   { type:"balanced",     note:"標準" },
  "福岡":   { type:"rough",        note:"うねり・潮汐" },
  "唐津":   { type:"balanced",     note:"標準" },
  "大村":   { type:"inner_strong", note:"イン特強 (全国屈指)" },
};
const COURSE_NATIONAL_AVG = [55, 16, 12, 9, 6, 2]; // 1〜6コース 1着率の全国平均%

function applyRegionalAdjustments(scores, race, marketObj) {
  const adjusted = scores.map(s => s);
  const log = [];
  if (!race?.boats) return { adjusted, log, venueTrait: null, homeBranch: null };

  const venueTrait = VENUE_TRAITS[race.venue] || null;
  const homeBranch = VENUE_HOME_BRANCH[race.venue] || null;

  race.boats.forEach((b, i) => {
    let factor = 1.0;
    const items = [];

    // ① 地元選手補正 (状態に応じて強弱)
    const isHome = homeBranch && b.branch === homeBranch;
    let homeDanger = false;
    let homeDangerNotes = [];
    let homeOverhyped = false;
    if (isHome) {
      // 状態評価
      const exGood = b.exTime != null && b.exTime <= 6.75;
      const exBad  = b.exTime != null && b.exTime >= 6.95;
      const stGood = b.ST != null && b.ST <= 0.13;
      const stBad  = b.ST != null && b.ST >= 0.18;
      const motorGood = b.motor2 != null && b.motor2 >= 40;
      const motorBad  = b.motor2 != null && b.motor2 <= 25;
      // 起点は +4%、状態◎で各 +1%、▲で各 -2%
      let homePct = 4;
      const stateNotes = [];
      if (exGood)    { homePct += 1; stateNotes.push("展示◎"); }
      if (exBad)     { homePct -= 2; stateNotes.push("展示▲"); homeDangerNotes.push("展示が悪い"); }
      if (stGood)    { homePct += 1; stateNotes.push("ST◎"); }
      if (stBad)     { homePct -= 2; stateNotes.push("ST▲"); homeDangerNotes.push("STが遅い"); }
      if (motorGood) { homePct += 1; stateNotes.push("機◎"); }
      if (motorBad)  { homePct -= 2; stateNotes.push("機▲"); homeDangerNotes.push("モーターが弱い"); }
      // 過剰人気時は半減
      const marketProb = marketObj?.marketProbs?.[i];
      const overhyped = marketProb != null && marketObj?.perBoat?.[i]?.label === "過剰人気";
      if (overhyped) {
        homePct = Math.floor(homePct * 0.5);
        stateNotes.push("過剰人気で弱化");
        homeOverhyped = true;
      }
      // 危険判定: 状態悪化要素2つ以上 OR (1つ以上+人気あり)
      if (homeDangerNotes.length >= 2) homeDanger = true;
      if (homeDangerNotes.length >= 1 && marketProb != null && marketProb >= 0.20) homeDanger = true;

      // 0〜+7% の範囲にクリップ
      homePct = Math.max(0, Math.min(7, homePct));
      if (homePct > 0) {
        factor *= (1 + homePct/100);
        items.push({ label:`地元 (${homeBranch})${stateNotes.length>0 ? " "+stateNotes.join("/") : ""}`, pct: homePct });
      } else {
        items.push({ label:`地元 (${homeBranch}) ${stateNotes.join("/")} 補正なし`, pct: 0 });
      }
    }

    // ② コース別適性 (枠なり進入想定)
    if (b.courseStats && typeof b.courseStats === "object") {
      const myCourse = b.boatNo;
      const myStats = b.courseStats[String(myCourse)] ?? b.courseStats[myCourse];
      const base = COURSE_NATIONAL_AVG[myCourse-1];
      if (myStats != null && !isNaN(myStats) && base != null) {
        const diff = myStats - base;
        if (diff >= 10)      { factor *= 1.04; items.push({label:`${myCourse}コース得意 (${myStats}% / 全国比+${diff.toFixed(0)})`, pct:4}); }
        else if (diff >= 5)  { factor *= 1.02; items.push({label:`${myCourse}コース好相性`, pct:2}); }
        else if (diff <= -10){ factor *= 0.96; items.push({label:`${myCourse}コース苦手`, pct:-4}); }
        else if (diff <= -5) { factor *= 0.98; items.push({label:`${myCourse}コースやや苦手`, pct:-2}); }
      }
    }

    // ③ 水面特性 (固定要素なので最大±2%に抑制 — 当日の状況を優先)
    if (venueTrait) {
      if (venueTrait.type === "inner_strong") {
        if (b.boatNo === 1)      { factor *= 1.02; items.push({label:`イン強水面で1号艇`, pct:2}); }
        else if (b.boatNo >= 5)  { factor *= 0.99; items.push({label:`イン強水面で${b.boatNo}コース`, pct:-1}); }
      } else if (venueTrait.type === "inner_weak") {
        if (b.boatNo === 1)      { factor *= 0.98; items.push({label:`イン弱水面で1号艇`, pct:-2}); }
        else if (b.boatNo >= 4)  { factor *= 1.01; items.push({label:`イン弱水面で${b.boatNo}コース`, pct:1}); }
      } else if (venueTrait.type === "rough") {
        if (b.boatNo === 1)      { factor *= 0.99; items.push({label:`荒れ水面で1号艇`, pct:-1}); }
        else if (b.boatNo >= 3)  { factor *= 1.01; items.push({label:`荒れ水面で${b.boatNo}コース`, pct:1}); }
      }
    }

    // 補正を最大±5%にクリップ
    const clipped = Math.max(0.95, Math.min(1.05, factor));
    if (items.length > 0 || isHome) {
      adjusted[i] = adjusted[i] * clipped;
      log.push({
        boatNo: b.boatNo,
        items,
        factor: clipped,
        percent: (clipped - 1) * 100,
        isHome,
        homeBranch: isHome ? homeBranch : null,
        homeDanger,
        homeDangerNotes,
        homeOverhyped,
        courseGood: items.some(it => /得意|好相性/.test(it.label)),
        courseBad:  items.some(it => /苦手/.test(it.label)),
        venueMatch: items.some(it => /水面/.test(it.label) && it.pct > 0),
      });
    } else {
      log.push({ boatNo: b.boatNo, items:[], factor:1, percent:0, isHome:false, homeDanger:false, homeDangerNotes:[], homeOverhyped:false });
    }
  });
  return { adjusted, log, venueTrait, homeBranch };
}

/* =========================================================
   モーター評価強化 (節内評価)
   - 既存の motor2 (節を跨いだ2連対率) に加え、節内ランキング・トレンド・
     使用者成績・展示タイム平均などを総合してエース機判定
   - 全項目オプショナル
   ========================================================= */
function classifyMotor(b, race) {
  const motor2 = b.motor2 ?? null;
  const ranking = b.motorRanking ?? null; // 上位 % (0=最上位, 100=最下位)
  const recentUsers = Array.isArray(b.recentUserResults) ? b.recentUserResults.filter(x => typeof x === "number") : [];
  const avgExTime = b.avgExhibitionTime ?? null;
  const trend = b.motorTrend ?? null; // 上昇 / 下降 / 横ばい
  const motorType = b.motorType ?? null; // 出足型 / 伸び型 / バランス型
  const exNote = b.exhibitionNote ?? "";
  const comment = (race.comments && race.comments[String(b.boatNo)]) || ""; // 通常は raceComments から (この場では undefined)

  // エーススコア (0〜5)
  let aceScore = 0;
  const aceReasons = [];

  if (motor2 != null) {
    if (motor2 >= 45)      { aceScore += 1.5; aceReasons.push(`モーター2連率${motor2}%`); }
    else if (motor2 >= 40) { aceScore += 1.0; aceReasons.push(`モーター2連率${motor2}%`); }
    else if (motor2 < 25)  { aceScore -= 1.0; aceReasons.push(`モーター2連率${motor2}% (低調)`); }
  }
  if (ranking != null) {
    if (ranking <= 15)      { aceScore += 1.5; aceReasons.push(`節内ランキング上位${ranking}%`); }
    else if (ranking <= 30) { aceScore += 0.5; aceReasons.push(`節内ランキング上位${ranking}%`); }
    else if (ranking >= 70) { aceScore -= 0.5; aceReasons.push(`節内ランキング下位${ranking}%`); }
  }
  if (recentUsers.length >= 2) {
    const avg = recentUsers.reduce((a,b)=>a+b,0) / recentUsers.length;
    if (avg <= 2.5)      { aceScore += 1.0; aceReasons.push(`直近使用者平均${avg.toFixed(1)}着`); }
    else if (avg <= 3.0) { aceScore += 0.5; aceReasons.push(`直近使用者平均${avg.toFixed(1)}着`); }
    else if (avg >= 4.5) { aceScore -= 0.5; aceReasons.push(`直近使用者平均${avg.toFixed(1)}着 (不振)`); }
  }
  if (avgExTime != null) {
    if (avgExTime <= 6.72)      { aceScore += 1.0; aceReasons.push(`節内展示平均${avgExTime} (上位)`); }
    else if (avgExTime <= 6.78) { aceScore += 0.5; aceReasons.push(`節内展示平均${avgExTime}`); }
    else if (avgExTime >= 6.92) { aceScore -= 0.5; aceReasons.push(`節内展示平均${avgExTime} (下位)`); }
  }
  if (b.exTime != null && avgExTime != null) {
    const exDiff = avgExTime - b.exTime;
    if (exDiff >= 0.05)      aceReasons.push(`今日の展示${b.exTime}は節平均より +${(exDiff*100|0)/100}良い`);
    else if (exDiff <= -0.05) aceReasons.push(`今日の展示${b.exTime}は節平均より ${(exDiff*100|0)/100}悪い`);
  }
  // トレンド
  if (trend === "上昇") { aceScore += 0.5; aceReasons.push("近況上昇トレンド"); }
  else if (trend === "下降") { aceScore -= 1.0; aceReasons.push("近況下降トレンド"); }
  // コメント評価との一致
  const c = exNote ? classifyComment(exNote) : null;
  if (c) {
    if (c.klass === "◎")      { aceScore += 0.3; aceReasons.push(`気配メモ◎`); }
    else if (c.klass === "▲") { aceScore -= 0.3; aceReasons.push(`気配メモ▲`); }
  }

  // エース判定
  let aceLevel;
  if (aceScore >= 3.5) aceLevel = "エース機";
  else if (aceScore >= 2.0) aceLevel = "準エース";
  else if (aceScore <= -1.5 || trend === "下降") aceLevel = "下降モーター";
  else aceLevel = "普通";

  return {
    aceScore: +aceScore.toFixed(2), aceLevel, aceReasons,
    motor2, ranking, recentUsers, avgExTime, trend, motorType,
    exNote,
  };
}

function applyMotorAdjustments(scores, race) {
  const adjusted = scores.map(s => s);
  const log = [];
  if (!race?.boats) return { adjusted, log };
  race.boats.forEach((b, i) => {
    const m = classifyMotor(b, race);
    let factor = 1.0; let pct = 0;
    if (m.aceLevel === "エース機")        { factor *= 1.08; pct = 8; }
    else if (m.aceLevel === "準エース")    { factor *= 1.04; pct = 4; }
    else if (m.aceLevel === "下降モーター") { factor *= 0.95; pct = -5; }
    if (factor !== 1.0) {
      adjusted[i] *= factor;
      log.push({ boatNo: b.boatNo, ...m, factor, percent: pct });
    } else {
      log.push({ boatNo: b.boatNo, ...m, factor, percent: 0 });
    }
  });
  return { adjusted, log };
}

/* モーターと人気・展示の不整合を検出 */
function detectMotorMismatches(race, motorLog, marketObj) {
  const out = [];
  if (!motorLog || !race?.boats) return out;
  race.boats.forEach((b, i) => {
    const m = motorLog.find(x => x.boatNo === b.boatNo);
    if (!m) return;
    const marketProb = marketObj?.marketProbs?.[i];
    // モーター良いのに人気ない
    if (m.aceLevel === "エース機" && marketProb != null && marketProb < 0.10) {
      out.push({type:"good", boatNo:b.boatNo, text:`${b.boatNo}号艇: エース機判定だが市場人気${(marketProb*100).toFixed(0)}% — 妙味あり`});
    } else if (m.aceLevel === "準エース" && marketProb != null && marketProb < 0.07) {
      out.push({type:"good", boatNo:b.boatNo, text:`${b.boatNo}号艇: 準エースモーターだが人気薄${(marketProb*100).toFixed(0)}%`});
    }
    // モーター悪いのに人気
    if (m.aceLevel === "下降モーター" && marketProb != null && marketProb >= 0.30) {
      out.push({type:"warn", boatNo:b.boatNo, text:`${b.boatNo}号艇: 下降モーターだが市場人気${(marketProb*100).toFixed(0)}% — 過信注意`});
    }
    // 展示とモーター評価のズレ
    if (m.aceLevel === "エース機" && b.exTime != null && b.exTime >= 6.95) {
      out.push({type:"info", boatNo:b.boatNo, text:`${b.boatNo}号艇: エース機だが今日の展示${b.exTime}が遅い — ズレに注意`});
    }
    if (m.aceLevel === "下降モーター" && b.exTime != null && b.exTime <= 6.72) {
      out.push({type:"info", boatNo:b.boatNo, text:`${b.boatNo}号艇: 下降モーター判定だが今日の展示${b.exTime}が良い — 持ち直しの可能性`});
    }
  });
  return out;
}

/* =========================================================
   実運用のデータ取得・更新フロー
   各レースの "データ準備状態" をチェックし、何が足りないかを返す
   ========================================================= */
function checkRaceReadiness(race, raceComments, results) {
  const comments = raceComments?.[race.id] || {};
  const has = (cond) => !!cond;

  const groups = {
    morning: {
      label:"🌅 朝データ", time:"朝 (出走表公開時)",
      items: [
        { key:"boats",     label:"出走表 (6艇)", ok: race.boats?.length === 6 },
        { key:"racerInfo", label:"選手情報 (勝率/級別)", ok: !!(race.boats?.every(b => b.winRate != null && b.class)) },
        { key:"motor",     label:"モーター情報 (2連率)", ok: !!(race.boats?.every(b => b.motor2 != null)) },
        { key:"boatInfo",  label:"ボート情報 (2連率)", ok: !!(race.boats?.every(b => b.boat2 != null)) },
        { key:"history",   label:"レーサー履歴 (近況/級別変化)", ok: !!(race.boats?.some(b => b.recentWinRate != null || b.prevClass != null)) },
      ],
    },
    exhibition: {
      label:"🏁 展示後データ", time:"展示終了後",
      items: [
        { key:"exTime",    label:"展示タイム",     ok: !!(race.boats?.every(b => b.exTime != null)) },
        { key:"ST",        label:"平均ST",         ok: !!(race.boats?.every(b => b.ST != null)) },
        { key:"tilt",      label:"チルト",         ok: !!(race.boats?.some(b => b.tilt != null)) },
        { key:"parts",     label:"部品交換情報",   ok: !!(race.boats?.some(b => Array.isArray(b.partsExchange))) },
        { key:"comments",  label:"選手コメント",   ok: Object.values(comments).filter(c => c && c.trim() !== "").length >= 4 },
        { key:"exUpdated", label:"直前情報の更新時刻", ok: !!race.exhibitionUpdatedAt },
      ],
    },
    odds: {
      label:"💴 オッズ更新", time:"締切 15/10/5/3 分前",
      items: [
        { key:"oddsUpdated", label:"オッズ最終更新時刻", ok: !!race.oddsUpdatedAt },
        { key:"oddsRecent",  label:"オッズが10分以内", ok: !!race.oddsUpdatedAt && (Date.now() - new Date(race.oddsUpdatedAt).getTime())/60000 <= 10 },
        { key:"oddsHistory", label:"オッズ変動履歴 (前回オッズ)", ok: !!race.prevOdds },
      ],
    },
    result: {
      label:"🏆 結果", time:"レース終了後",
      items: [
        { key:"result",  label:"確定着順", ok: !!(results?.some(r => r.raceId === race.id)) },
        { key:"payout",  label:"払戻金",   ok: !!(results?.find(r => r.raceId === race.id)?.payouts) },
      ],
    },
  };

  // 買える状態か (結果は除く / 朝・展示・オッズが揃っていれば READY)
  const preRaceGroups = ["morning","exhibition","odds"];
  const missing = [];
  preRaceGroups.forEach(g => {
    groups[g].items.forEach(it => { if (!it.ok) missing.push({phase:g, label:`${groups[g].label}: ${it.label}`}); });
  });
  // クリティカル: morning の boats/racerInfo/motor、exhibition の exTime/exUpdated、odds の oddsUpdated/oddsRecent
  const critical = ["boats","racerInfo","motor","exTime","exUpdated","oddsUpdated","oddsRecent"];
  const criticalMissing = missing.filter(m => critical.some(k => groups[m.phase].items.find(i=>i.key===k && !i.ok)));
  // 簡略: ratio
  const totalItems = preRaceGroups.reduce((s,g)=>s+groups[g].items.length, 0);
  const okItems = preRaceGroups.reduce((s,g)=>s+groups[g].items.filter(i=>i.ok).length, 0);
  const completeness = totalItems ? okItems/totalItems : 0;

  let level;
  if (completeness >= 0.90 && criticalMissing.length === 0) level = "READY";
  else if (completeness >= 0.60 && criticalMissing.length <= 1) level = "PARTIAL";
  else level = "INSUFFICIENT";

  // 次に更新すべきフェーズ
  let nextPhase = null;
  for (const p of preRaceGroups) {
    if (groups[p].items.some(i => !i.ok)) { nextPhase = p; break; }
  }

  return { groups, missing, criticalMissing, completeness, level, nextPhase };
}

/* =========================================================
   今やること判定 (考えなくても使える行動指示)
   - 1レースに対して「次に何をすべきか」を1行のテキスト+1ボタンで返す
   - SKIPは "何もしない"、WAIT(データ)は "更新" ボタン、GOはタイミング別
   ========================================================= */
/* 1行の理由を返す (専門用語禁止・短い・「+」区切りで2-3要素) */
function buildShortReason(race, evalRes) {
  if (!evalRes) return "—";
  const gate = evalRes.conditionGate?.level;
  const market = evalRes.market;
  const odds = evalRes.oddsMovement;
  const conf = evalRes.confidence;
  const readiness = evalRes.readiness;
  const fresh = evalRes.freshness;
  const parts = [];

  if (gate === "SKIP") {
    if (market?.dangerLevel === "高") parts.push("過剰人気");
    if (market?.strongButNoValue) parts.push("妙味なし");
    if (odds?.valueScoreLabel === "低") parts.push("直前で妙味消失");
    // 地元危険を最後の枠に入れる
    const reg = evalRes.pred?.regionalLog || [];
    const homeDanger = reg.find(r => r.homeDanger);
    const homeOverhyped = reg.find(r => r.isHome && r.homeOverhyped && !r.homeDanger);
    if (homeDanger && parts.length < 3) parts.push("地元だが状態悪い");
    else if (homeOverhyped && parts.length < 3) parts.push("地元人気で買われすぎ");
    if (parts.length === 0) parts.push("条件が悪い");
    return parts.slice(0,3).join(" + ");
  }
  if (gate === "WAIT") {
    if (readiness?.level === "INSUFFICIENT") return "データ不足";
    if (["古い","危険"].includes(fresh?.level)) return "情報が古い";
    if (conf?.level === "低") return "信頼できない";
    return "確認待ち";
  }
  if (gate === "GO") {
    parts.push("条件良好");
    if ((market?.valueBoats?.length || 0) > 0) parts.push("妙味あり");
    if ((market?.dangerLevel === "低") && ((market?.overhypeIndex ?? 1) < 1.10)) parts.push("危険要素なし");
    if (odds?.valueScoreLabel === "高" && parts.length < 3) parts.push("オッズ余裕");
    // 地元・コース・水面 (上位艇に該当があれば)
    const reg = evalRes.pred?.regionalLog || [];
    const aiTopIdx = evalRes.pred?.winProbs?.indexOf(Math.max(...(evalRes.pred?.winProbs || [0])));
    const topReg = reg.find(x => x.boatNo === (aiTopIdx+1));
    if (topReg && parts.length < 3) {
      if (topReg.isHome) parts.push("地元");
      else if (topReg.courseGood) parts.push("コース得意");
      else if (topReg.venueMatch) parts.push("水面一致");
    }
    return parts.slice(0,3).join(" + ");
  }
  if (gate === "CAUTION") {
    parts.push("条件やや弱い");
    if (market?.dangerLevel === "中") parts.push("やや過剰人気");
    if (odds?.valueScoreLabel === "中" && parts.length < 3) parts.push("妙味薄");
    // 地元危険があれば追加
    const reg = evalRes.pred?.regionalLog || [];
    const homeDanger = reg.find(r => r.homeDanger);
    if (homeDanger && parts.length < 3) parts.push("地元だが状態悪い");
    return parts.slice(0,3).join(" + ");
  }
  return "—";
}

function computeNextAction(race, evalRes, timing) {
  if (!race || !evalRes || !timing) {
    return { kind:"UNKNOWN", headline:"—", subtext:"", reason:"—", tone:"skip", urgency:null, btn:null };
  }
  const gate = evalRes.conditionGate?.level;
  const minutes = timing.minutesToStart;
  const reason = buildShortReason(race, evalRes);

  // 緊急度ラベル
  let urgency = null;
  if (minutes != null && !timing.finished) {
    if (minutes <= 5) urgency = "今すぐ";
    else if (minutes <= 10) urgency = "5分以内";
    else if (minutes <= 15) urgency = "10分以内";
  }

  if (timing.finished) {
    return { kind:"FINISHED", headline:"✅ 終了", subtext:"結果を入力できます", reason:"レース終了",
             tone:"skip", urgency:null, btn:{ label:"結果入力", target:"results" } };
  }
  if (gate === "SKIP") {
    return { kind:"SKIP", headline:"🔴 何もしない", subtext:"勝負条件外。買わない。", reason,
             tone:"skip", urgency:null, btn:null };
  }
  if (gate === "WAIT" && evalRes.readiness?.level === "INSUFFICIENT") {
    const next = evalRes.readiness.nextPhase;
    const label = next === "morning" ? "朝データ" : next === "exhibition" ? "展示情報" : "オッズ";
    return { kind:"WAIT_DATA", headline:`📊 ${label}を入れる`, subtext:"データを入れたら再判定します", reason,
             tone:"warn", urgency, btn:{ label:"データ更新へ", target:"datasource" } };
  }
  if (gate === "WAIT") {
    return { kind:"WAIT", headline:"⏳ まだ触らない", subtext:"確認待ち", reason,
             tone:"wait", urgency:null, btn:null };
  }
  if (gate === "GO" || gate === "CAUTION") {
    const isGo = gate === "GO";
    if (minutes != null && minutes <= 5 && minutes > 0) {
      return { kind:"FINAL_CHECK",
               headline: isGo ? "🟢 今が買い時です" : "🟡 慎重に最終確認",
               subtext:`あと${Math.round(minutes)}分で締切`, reason,
               tone: isGo ? "go" : "caution",
               urgency, btn:{ label:"レースを開く", race:true } };
    }
    if (minutes != null && minutes <= 10 && minutes > 5) {
      return { kind:"RECHECK",
               headline: isGo ? "🟢 もうすぐ買い時" : "🟡 もうすぐ判断",
               subtext:`あと${Math.round(minutes)}分。オッズ更新→再確認`, reason,
               tone: isGo ? "go" : "caution",
               urgency, btn:{ label:"レースを開く", race:true } };
    }
    if (minutes != null && minutes <= 15 && minutes > 10) {
      return { kind:"FIRST_CHECK",
               headline:"⏰ オッズを入れる",
               subtext: isGo ? "GO候補。15分前に更新" : "CAUTION候補。15分前に更新", reason,
               tone:"warn",
               urgency, btn:{ label:"オッズ更新へ", target:"datasource" } };
    }
    if (minutes != null && minutes > 15) {
      return { kind:"WAIT_TIME",
               headline: isGo ? "🟢 GO候補 (待機)" : "🟡 CAUTION候補 (待機)",
               subtext:`あと${Math.round(minutes)}分後に確認開始`, reason,
               tone:"wait", urgency:null, btn:null };
    }
    return { kind:"GO_NOW",
             headline: isGo ? "🟢 GO候補" : "🟡 CAUTION",
             subtext:"", reason,
             tone: isGo ? "go" : "caution",
             urgency, btn:{ label:"レースを開く", race:true } };
  }
  return { kind:"UNKNOWN", headline:"—", subtext:"", reason:"—", tone:"skip", urgency:null, btn:null };
}

/* =========================================================
   レース時刻ベースのタイミング状態
   待機中 → 確認開始(15分前) → 再確認(10分前) → 最終確認(5分前) → 終了
   GO/WAIT/SKIP の判定と組み合わせて「今、何をすべきか」を返す
   ========================================================= */
function calcRaceTiming(race, evalRes) {
  if (!race?.startTime || !race?.date) {
    return { phase:"unknown", minutesToStart:null, action:"確認", urgency:0 };
  }
  // startTime "HH:MM" + date "YYYY-MM-DD" → Date
  const [h, m] = race.startTime.split(":").map(Number);
  const d = new Date(race.date + "T00:00:00");
  d.setHours(h, m, 0, 0);
  const now = Date.now();
  const minutesToStart = (d.getTime() - now) / 60000;

  let phase, urgency = 0;
  if (minutesToStart > 60)      { phase = "待機中";   urgency = 0; }
  else if (minutesToStart > 15) { phase = "予想準備"; urgency = 1; }
  else if (minutesToStart > 10) { phase = "確認開始"; urgency = 2; }
  else if (minutesToStart > 5)  { phase = "再確認";   urgency = 3; }
  else if (minutesToStart > 0)  { phase = "最終確認"; urgency = 4; }
  else                          { phase = "終了";     urgency = 0; }

  // 締切後は強制 SKIP
  if (minutesToStart <= 0) {
    return { phase, minutesToStart, action:"締切済", urgency:0, finished:true };
  }

  // タイミング × 判定の統合
  const gateLevel = evalRes?.conditionGate?.level || "WAIT";
  let action = "確認";
  if (gateLevel === "SKIP") action = "見送り (SKIP)";
  else if (gateLevel === "WAIT") action = "確認待ち (WAIT)";
  else if (gateLevel === "GO" && phase === "最終確認") action = "🟢 最終確認 → 購入検討";
  else if (gateLevel === "GO" && phase === "再確認") action = "🟢 GO候補 (10分前再確認)";
  else if (gateLevel === "GO" && phase === "確認開始") action = "🟢 GO候補 (15分前)";
  else if (gateLevel === "GO") action = "🟢 GO候補";
  else if (gateLevel === "CAUTION") action = "🟡 慎重判断";

  return { phase, minutesToStart, action, urgency, gateLevel, finished:false };
}

/* =========================================================
   勝てる条件抽出 (過去データから "勝負条件" を学習)
   - 過去の bets+races の組み合わせを多次元で集計
   - 各条件バケットで ROI / 的中率 / 件数を算出
   - 現在のレースが該当するか matchRaceConditions で判定
   - 結果は GO / CAUTION / SKIP / WAIT の4段階
   ========================================================= */
function analyzeWinningConditions(bets, races, results) {
  const settled = bets.filter(b => b.result === "hit" || b.result === "miss");
  if (settled.length === 0 || races.length === 0) {
    return { hasData: false, sampleSize: 0, dims: {} };
  }
  const racesById = {};
  races.forEach(r => { racesById[r.id] = r; });

  // 1bet = 1サンプル
  const samples = settled.map(b => {
    const race = racesById[b.raceId];
    if (!race) return null;
    const winProbsApprox = (() => {
      // 簡易: 過去のレース予想再計算は重いので、保存されている stake/odds/prob から再構築
      return null;
    })();
    // race-mode 判定 (本命戦 / 荒れ戦 / 中間戦) — 簡易判定
    let raceMode = "中間戦";
    const b1 = race.boats[0];
    if (b1) {
      if (b1.class === "A1" && b1.winRate >= 6.5 && race.wind <= 4) raceMode = "本命戦";
      else if ((b1.class === "B1" || b1.class === "B2") || race.wind > 5 || race.wave > 8) raceMode = "荒れ戦";
    }
    return {
      bet: b, race, win: b.result === "hit",
      stake: b.stake, ret: b.result === "hit" ? b.stake*b.odds : 0,
      raceMode,
    };
  }).filter(Boolean);

  // 集計対象の次元
  const dimensions = {
    venue:        s => s.race.venue,
    wind:         s => bucketWind(s.race.wind),
    wave:         s => bucketWave(s.race.wave),
    weather:      s => s.race.weather || "—",
    raceMode:     s => s.raceMode,
    boat1Reliab:  s => bucketBoat1(s.race.boats[0]),
    oddsClass:    s => classifyTicket(s.bet.odds).label,
    strategy:     s => s.bet.strategy || "—",
    kind:         s => s.bet.kind,
    virtualOnly:  s => s.bet.virtual ? "仮想" : "本購入",
  };

  const dims = {};
  for (const [dim, fn] of Object.entries(dimensions)) {
    const buckets = {};
    samples.forEach(s => {
      const k = fn(s);
      if (!k) return;
      if (!buckets[k]) buckets[k] = {key:k, n:0, hits:0, stake:0, ret:0, lossStreak:0, maxLossStreak:0};
      buckets[k].n++;
      if (s.win) { buckets[k].hits++; buckets[k].lossStreak = 0; }
      else { buckets[k].lossStreak++; buckets[k].maxLossStreak = Math.max(buckets[k].maxLossStreak, buckets[k].lossStreak); }
      buckets[k].stake += s.stake;
      buckets[k].ret += s.ret;
    });
    dims[dim] = Object.values(buckets).map(b => ({
      ...b,
      hitRate: b.n ? b.hits/b.n : 0,
      roi: b.stake ? b.ret/b.stake : 0,
    })).sort((a,b)=>b.roi-a.roi);
  }

  // 戦略別の効きやすさ
  const strategyConditions = {};
  for (const sname of ["steady", "balanced", "aggressive"]) {
    const subset = samples.filter(s => s.bet.strategy === sname);
    if (subset.length === 0) continue;
    strategyConditions[sname] = {
      n: subset.length,
      stake: subset.reduce((a,b)=>a+b.stake,0),
      ret: subset.reduce((a,b)=>a+b.ret,0),
      hits: subset.filter(s=>s.win).length,
    };
  }

  return { hasData: true, sampleSize: samples.length, dims, strategyConditions };
}

/* 現在レースが勝負条件に該当するか判定: GO / CAUTION / SKIP / WAIT */
function matchRaceConditions(race, evalRes, analysis, opts={minN:3, hotROI:1.10, coldROI:0.90}) {
  // データが不足している場合は WAIT
  if (!analysis || !analysis.hasData || analysis.sampleSize < 8) {
    return { level:"WAIT", icon:"⏳", reasons:["仮想テストのサンプルが不足 (8件未満)"], score:0, matches:[] };
  }
  // 鮮度が危険なら WAIT
  if (evalRes.freshness?.level === "危険") {
    return { level:"WAIT", icon:"⏳", reasons:["データ鮮度が危険レベル — 確認待ち"], score:0, matches:[] };
  }
  if (evalRes.confidence?.level === "低") {
    return { level:"WAIT", icon:"⏳", reasons:["AI信頼度が低 — 様子見"], score:0, matches:[] };
  }

  const matches = [];
  let totalDelta = 0;
  let weights = 0;

  function check(dim, label, key, weight=1) {
    if (!analysis.dims[dim]) return;
    const bucket = analysis.dims[dim].find(b => b.key === key);
    if (!bucket || bucket.n < opts.minN) return;
    const delta = (bucket.roi - 1) * 100; // % over breakeven
    matches.push({ dim:label, key, n: bucket.n, roi:bucket.roi, hitRate:bucket.hitRate, delta });
    totalDelta += delta * weight;
    weights += weight;
  }

  check("venue",        "会場",        race.venue, 1.5);
  check("wind",         "風速",        bucketWind(race.wind), 1.0);
  check("wave",         "波高",        bucketWave(race.wave), 1.0);
  check("weather",      "天候",        race.weather, 0.5);
  // raceMode (現在レースの判定)
  let raceMode = "中間戦";
  const b1 = race.boats[0];
  if (b1) {
    if (b1.class === "A1" && b1.winRate >= 6.5 && race.wind <= 4) raceMode = "本命戦";
    else if ((b1.class === "B1" || b1.class === "B2") || race.wind > 5 || race.wave > 8) raceMode = "荒れ戦";
  }
  check("raceMode",     "レース種別",   raceMode, 1.5);
  check("boat1Reliab",  "1号艇信頼度", bucketBoat1(race.boats[0]), 1.0);

  if (weights === 0) {
    return { level:"WAIT", icon:"⏳", reasons:["過去サンプルとマッチする条件なし — データ不足"], score:0, matches:[] };
  }

  const score = totalDelta / weights; // 平均 ROI 余地 (%)
  // 過剰人気 / 鮮度 / 信頼度のクロス強化
  let level, icon, reasons = [];
  if (evalRes.market?.dangerScore >= 60) {
    level = "SKIP"; icon = "🔴"; reasons.push("本命危険度 高 — 「買ってはいけない本命」");
  } else if (evalRes.skip) {
    level = "SKIP"; icon = "🔴"; reasons.push("既存ロジックで見送り推奨: " + (evalRes.skipReasons[0] || ""));
  } else if (score <= -10) {
    level = "SKIP"; icon = "🔴"; reasons.push(`過去ROI余地 ${score.toFixed(1)}% — 勝負条件外 (損失予想)`);
  } else if (score < 0) {
    level = "CAUTION"; icon = "🟡"; reasons.push(`過去ROI余地 ${score.toFixed(1)}% — 条件は弱い (見送り寄り)`);
  } else if (score < 5) {
    level = "CAUTION"; icon = "🟡"; reasons.push(`過去ROI余地 +${score.toFixed(1)}% — 微妙な条件 (要慎重)`);
  } else {
    level = "GO"; icon = "🟢"; reasons.push(`過去ROI余地 +${score.toFixed(1)}% — 勝負条件に一致`);
  }

  // 危険条件の追加チェック
  const venueMatch = matches.find(m => m.dim === "会場");
  if (venueMatch && venueMatch.roi < 0.8 && venueMatch.n >= 5) {
    if (level === "GO") level = "CAUTION";
    else if (level === "CAUTION") level = "SKIP";
    icon = level === "GO" ? "🟢" : (level === "CAUTION" ? "🟡" : "🔴");
    reasons.push(`会場 ${venueMatch.key} の過去ROI ${(venueMatch.roi*100).toFixed(0)}% (${venueMatch.n}サンプル) — 苦手会場`);
  }

  return { level, icon, reasons, score, matches };
}

/* =========================================================
   直前オッズ変動の高度判定
   - 急落 / 急上昇 / 横ばいの分類
   - 妙味消失・妙味残存・市場急変・不自然変動の検出
   - 直前妙味スコア (0-100) を算出
   - 買い目ごとに「妙味消失/直前確認/妙味維持」のタグを付与
   既存の prevOdds / currentWinOdds (DataSourceView から更新) を入力
   ========================================================= */
function analyzeOddsMovement(race, pred, sortedTickets, market) {
  if (!race?.prevOdds || !race?.currentWinOdds) {
    return { hasHistory: false };
  }
  const prevOdds = race.prevOdds;
  const currOdds = race.currentWinOdds;

  // 単勝オッズの変動
  const winMoves = race.boats.map((b, i) => {
    const prev = prevOdds[i];
    const curr = currOdds[i] || pred.winOdds[i];
    if (!prev || !curr || prev <= 0 || curr <= 0) return null;
    const change = (curr - prev) / prev;
    return {
      boatNo: b.boatNo, racer: b.racer,
      prev: +prev.toFixed(1), curr: +curr.toFixed(1),
      changePct: change * 100,
      aiProb: pred.winProbs[i],
      // 直前EV (current odds 基準)
      currEV: pred.winProbs[i] * curr,
      // 過去EV (prev odds 基準)
      prevEV: pred.winProbs[i] * prev,
      direction: change <= -0.20 ? "急落" : (change <= -0.10 ? "下落" : (change >= 0.20 ? "急上昇" : (change >= 0.10 ? "上昇" : "横ばい"))),
    };
  }).filter(Boolean);

  // 急激に売れた艇 (オッズ20%以上下落)
  const rushed = winMoves.filter(m => m.changePct <= -20).sort((a,b)=>a.changePct-b.changePct);
  // オッズが残った艇 (10%以上上昇 — 売れていない)
  const remaining = winMoves.filter(m => m.changePct >= 10).sort((a,b)=>b.changePct-a.changePct);
  // 市場が急に評価を変えた艇 (絶対値30%以上)
  const dramaticShift = winMoves.filter(m => Math.abs(m.changePct) >= 30);

  // 妙味消失艇 (prevEV ≥ 1.10 → currEV < 1.0)
  const valueLost = winMoves.filter(m => m.prevEV >= 1.10 && m.currEV < 1.0);
  // 妙味維持艇 (currEV ≥ 1.15 かつ オッズが大きく下がっていない)
  const valueKept = winMoves.filter(m => m.currEV >= 1.15 && m.changePct >= -10);
  // オッズが残っている穴 (currOdds≥10、AI確率6%以上、EV高め)
  const remainingSleepers = winMoves.filter(m => m.curr >= 10 && m.aiProb >= 0.06 && m.currEV >= 1.20);

  // 不自然なオッズ変動の検出
  const anomalies = [];
  // 市場本命の急落 (過剰人気の強化)
  const popFavIdx = currOdds.reduce((minI, o, i) => (o>0 && (currOdds[minI]<=0 || o<currOdds[minI]))?i:minI, 0);
  const popFavMove = winMoves.find(m => m.boatNo === popFavIdx+1);
  if (popFavMove && popFavMove.changePct <= -20) {
    anomalies.push({type:"warn", text:`本命${popFavIdx+1}号艇のオッズが急落 (${popFavMove.prev}→${popFavMove.curr} / ${popFavMove.changePct.toFixed(0)}%) — 過剰人気がさらに強化`});
  }
  // 同レースで複数艇が同時急落 (典型的な不自然変動)
  if (rushed.length >= 3) {
    anomalies.push({type:"warn", text:`同時に${rushed.length}艇のオッズが急落 — 不自然なオッズ移動 / 締切間際の偏り`});
  }
  // 全体的に評価が反転 (本命急落 + 穴急落の同時発生)
  const oo = race.boats.length;
  const dropCount = winMoves.filter(m => m.changePct <= -15).length;
  const riseCount = winMoves.filter(m => m.changePct >= 15).length;
  if (dropCount >= 2 && riseCount >= 2) {
    anomalies.push({type:"info", text:`オッズが大きく反転 (${dropCount}艇下落 / ${riseCount}艇上昇) — 直前情報で市場評価が変動した可能性`});
  }
  // AIが本命視している艇のオッズだけ残っている (=見落とされている)
  const aiTopIdx = pred.winProbs.indexOf(Math.max(...pred.winProbs));
  const aiTopMove = winMoves.find(m => m.boatNo === aiTopIdx+1);
  if (aiTopMove && aiTopMove.changePct >= 10 && aiTopMove.currEV >= 1.10) {
    anomalies.push({type:"good", text:`AI本命${aiTopIdx+1}号艇のオッズが残存 (${aiTopMove.prev}→${aiTopMove.curr}) — 市場が評価を引き上げる前の妙味`});
  }

  // 買い目ごとの妙味タグ (sortedTickets を再走査)
  const ticketTags = {}; // key: kind|combo → tag
  function tagFor(kind, combo, prob) {
    // 単勝のみ簡易対応 (2連単/3連単は艇の代表値で)
    if (kind === "単勝") {
      const i = parseInt(combo) - 1;
      const m = winMoves[i];
      if (!m) return null;
      if (m.prevEV >= 1.10 && m.currEV < 1.0) return {tag:"妙味消失", level:"warn"};
      if (m.currEV >= 1.15 && m.changePct >= -10) return {tag:"妙味維持", level:"good"};
      if (m.changePct <= -20) return {tag:"直前売れ過ぎ", level:"warn"};
      if (m.changePct >= 20) return {tag:"オッズ残存", level:"good"};
    }
    // 2連単/3連単: 1着艇のオッズ変動から代理判定
    const firstBoat = parseInt(combo.split("-")[0]) - 1;
    if (firstBoat >= 0) {
      const m = winMoves[firstBoat];
      if (m) {
        if (m.changePct <= -20) return {tag:"1着候補が直前売れ過ぎ", level:"warn"};
        if (m.changePct >= 15) return {tag:"1着候補のオッズ残存", level:"good"};
      }
    }
    return null;
  }
  sortedTickets.slice(0, 50).forEach(t => {
    const tag = tagFor(t.kind, t.combo, t.prob);
    if (tag) ticketTags[`${t.kind}|${t.combo}`] = tag;
  });

  // 直前妙味スコア (0-100)
  // 平均EV変化、妙味消失/維持の数、不自然変動の数を総合
  const avgEvChange = winMoves.reduce((s,m)=>s+(m.currEV - m.prevEV),0) / Math.max(1, winMoves.length);
  let valueScore = 50 + avgEvChange * 80;
  valueScore += valueKept.length * 6;
  valueScore -= valueLost.length * 8;
  valueScore -= anomalies.filter(a=>a.type==="warn").length * 6;
  valueScore += anomalies.filter(a=>a.type==="good").length * 6;
  valueScore = Math.max(0, Math.min(100, valueScore));
  let valueScoreLabel;
  if (valueScore >= 65) valueScoreLabel = "高";
  else if (valueScore >= 40) valueScoreLabel = "中";
  else valueScoreLabel = "低";

  // オッズ更新の鮮度 (古ければ確認待ちフラグ)
  const oddsAgeMin = race.oddsUpdatedAt ? (Date.now() - new Date(race.oddsUpdatedAt).getTime())/60000 : null;
  const oddsStale = oddsAgeMin == null || oddsAgeMin > 15;

  return {
    hasHistory: true,
    winMoves,
    rushed, remaining, dramaticShift, anomalies,
    valueLost, valueKept, remainingSleepers,
    valueScore, valueScoreLabel, avgEvChange,
    ticketTags,
    oddsAgeMin, oddsStale,
  };
}

/* =========================================================
   データ鮮度スコア
   - 最新: 5分以内 / やや古い: 5-15分 / 古い: 15分以上
   - 危険: 直前情報・オッズが未取得
   ========================================================= */
function calcFreshness(race) {
  const now = Date.now();
  const min = (ts) => ts ? (now - new Date(ts).getTime()) / 60000 : null;
  const oddsAge = min(race.oddsUpdatedAt);
  const exAge   = min(race.exhibitionUpdatedAt);
  const genAge  = min(race.updatedAt);
  const ages = [oddsAge, exAge, genAge].filter(a => a != null);
  const maxStale = ages.length ? Math.max(...ages) : 9999;

  let level, score, message;
  if (race.oddsUpdatedAt == null || race.exhibitionUpdatedAt == null) {
    level = "危険";
    score = 0;
    message = "直前情報またはオッズが未取得 — 確認待ち推奨";
  } else if (maxStale > 15) {
    level = "古い";
    score = 30;
    message = `最終更新 ${maxStale.toFixed(0)}分前 (15分以上経過)`;
  } else if (maxStale > 5) {
    level = "やや古い";
    score = 65;
    message = `最終更新 ${maxStale.toFixed(0)}分前`;
  } else {
    level = "最新";
    score = 100;
    message = `最終更新 ${maxStale.toFixed(1)}分前`;
  }
  // オッズ変動警告 (前回スナップショットがあれば)
  const oddsAlerts = [];
  if (race.prevOdds && race.boats) {
    race.boats.forEach((b,i) => {
      const prev = race.prevOdds[i];
      const curr = race.currentWinOdds ? race.currentWinOdds[i] : null;
      if (prev && curr && prev > 0 && curr > 0) {
        const dropRatio = (prev - curr) / prev;
        if (dropRatio >= 0.20) oddsAlerts.push(`${i+1}号艇: ${prev}→${curr} (${(dropRatio*100).toFixed(0)}%下落) — 直前で買われた`);
        if (dropRatio <= -0.20) oddsAlerts.push(`${i+1}号艇: ${prev}→${curr} (${(-dropRatio*100).toFixed(0)}%上昇) — 直前で売れていない`);
      }
    });
  }
  return {
    level, score, message,
    oddsAge, exAge, genAge, maxStale,
    awaiting: level === "危険",
    oddsAlerts,
  };
}
