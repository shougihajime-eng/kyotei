/* ========== 更新バー (3つの目立つボタン + 自動更新トグル + 完了トースト) ========== */
function RefreshBar({ lastRefreshAt, refreshing, recalcing, refreshMsg, onRefreshAll, onRecalc, onGoResults, autoRefresh, setAutoRefresh }) {
  const [now, setNow] = useState(Date.now());
  useEffect(() => { const id = setInterval(() => setNow(Date.now()), 5000); return () => clearInterval(id); }, []);
  const ageSec = lastRefreshAt ? Math.max(0, Math.round((now - new Date(lastRefreshAt).getTime())/1000)) : null;
  const ageLabel = ageSec == null ? "未取得"
                 : ageSec < 5 ? "たった今"
                 : ageSec < 60 ? `${ageSec}秒前`
                 : `${Math.round(ageSec/60)}分前`;
  return (
    <section className="card p-3 mb-3" style={{borderWidth:2, borderColor:"#22d3ee"}}>
      <div className="flex flex-wrap items-center gap-2 justify-between">
        <div className="flex items-center gap-2 flex-wrap">
          <span className="text-xs uppercase tracking-widest opacity-80">🔄 更新</span>
          <span className={"hint text-xs " + ((ageSec!=null && ageSec>180) ? "ev-neg" : "")}>
            最終更新 {ageLabel}
            {refreshing && " — 取得中…"}
            {recalcing  && " — 再計算中…"}
          </span>
        </div>
        <div className="flex gap-2 flex-wrap items-center">
          <button className="btn btn-primary text-sm" disabled={refreshing}
            style={{minWidth:160, opacity: refreshing ? 0.65 : 1}}
            onClick={onRefreshAll}>
            {refreshing ? "🔄 更新中…" : "🔄 最新データに更新"}
          </button>
          <button className="btn btn-success text-sm" disabled={recalcing}
            style={{minWidth:140, opacity: recalcing ? 0.65 : 1}}
            onClick={onRecalc}>
            {recalcing ? "🧮 再計算中…" : "🧮 予想を再計算"}
          </button>
          <button className="btn btn-ghost text-sm" onClick={onGoResults}>🏁 結果を取得</button>
          <label className="flex items-center gap-1 text-xs hint cursor-pointer ml-1">
            <input type="checkbox" checked={!!autoRefresh} onChange={e => setAutoRefresh(e.target.checked)}/>
            自動更新 (60秒毎)
          </label>
        </div>
      </div>
      {refreshMsg && (
        <div className={"mt-2 text-sm " + (refreshMsg.startsWith("✅") ? "ok" : "info")}>{refreshMsg}</div>
      )}
    </section>
  );
}

/* ========== 結論カード: 「買う or 見送り」を全画面で示す ==========
   設計思想: 開いた瞬間に「答え」だけが目に入る。考えなくても判断できる。
   ・買う場合: 巨大な "🟢 買う" + 本命/押さえ/穴 の3ボックス + 合計 + 1ボタン
   ・見送り場合: 巨大な "🔴 見送り" + 1行の理由 + 次の判定
============================================================ */
function BuyDecisionCard({ headline, settings, lossStreak, money, remainingDaily, onPick, onQuickRecord, onGoTab }) {
  const [msg, setMsg] = useState("");
  const [busy, setBusy] = useState(false);

  if (!headline) {
    return (
      <section style={{padding:"40px 24px", borderRadius:20, textAlign:"center",
        background:"linear-gradient(135deg,#1e293b,#0f1830)", border:"3px solid #475569", color:"#fff"}}>
        <div style={{fontSize:64}}>🤖</div>
        <div style={{fontSize:36, fontWeight:900, marginTop:8}}>本日対象なし</div>
        <div className="hint text-sm mt-2 opacity-80">レース情報の取得待ち / 開催終了</div>
      </section>
    );
  }

  const { race, ev, timing } = headline;
  const rec = buildBuyRecommendation(race, ev, settings, lossStreak, money, remainingDaily);
  const verdict = rec.verdict;
  const showItems = (verdict === "buy" || verdict === "caution") && rec.items.length > 0 && rec.total > 0;
  // 表示上は2状態に集約: 「買う」 (showItems=true) または 「見送り」 (それ以外)
  const isBuy = showItems && !rec.lock;

  const theme = isBuy
    ? { bg:"linear-gradient(135deg,#065f46,#053527)", border:"#10b981", title:"🟢 買う", color:"#a7f3d0" }
    : { bg:"linear-gradient(135deg,#7f1d1d,#3b1d1d)", border:"#ef4444", title:"🔴 見送り", color:"#fecaca" };

  // 見送り理由を 1 行で
  const skipReason =
    rec.lock                                  ? "強制見送り (損失上限 / 連敗 / 日次予算到達)"
    : verdict === "skip"                      ? "勝負条件外 — 買うべきレースではありません"
    : verdict === "wait"                      ? "データ不足・確認待ち — 直前情報を取込んでください"
    : verdict === "caution"                   ? "EV閾値を満たす買い目がないため見送り"
    : verdict === "buy" && rec.raceCap <= 0   ? "1日予算 / 1レース上限が 0 のため買い目を出せません"
    : verdict === "buy" && !showItems         ? "推奨買い目が0件 (条件未達)"
    : "判定中";

  function quickRecordAll() {
    if (busy || !isBuy) return;
    setBusy(true);
    const n = onQuickRecord(race, rec.items);
    setMsg(`✅ 記録完了 (${n}件 / 合計 ¥${rec.total.toLocaleString()})`);
    setTimeout(() => { setMsg(""); setBusy(false); }, 3500);
  }

  return (
    <section style={{padding:"28px 24px 22px", borderRadius:20,
      background: theme.bg, border:`3px solid ${theme.border}`, color:"#fff",
      boxShadow:`0 0 32px -8px ${theme.border}`}}>

      {/* 上部: レース情報 (小さく) */}
      <div className="flex items-center justify-between flex-wrap gap-2 mb-2">
        <div className="text-sm opacity-90">
          <b>{race.venue} {race.raceNo}R</b>
          <span className="ml-2 opacity-80">{race.startTime}発走</span>
          {timing.minutesToStart != null && timing.minutesToStart > 0 && (
            <span className="ml-2 opacity-80">あと{Math.round(timing.minutesToStart)}分</span>
          )}
        </div>
        {settings.virtualMode && <span className="pill" style={{background:"rgba(0,0,0,0.3)", color:"#fff", fontSize:11}}>🧪 仮想モード</span>}
      </div>

      {/* メインの判定表示 (極大) */}
      <div style={{fontSize:"min(64px,14vw)", fontWeight:900, lineHeight:1.05,
        color:theme.color, letterSpacing:"-0.02em", marginTop:4}}>
        {theme.title}
      </div>

      {/* === 買う: 3ボックス + 合計 + 1ボタン === */}
      {isBuy && (
        <>
          <div className="grid grid-cols-3 gap-2 md:gap-3 mt-4">
            {rec.items.map((it, i) => {
              const roleColor = i === 0 ? "#dcfce7" : i === 1 ? "#fef3c7" : "#fecaca";
              return (
                <div key={i} className="text-center" style={{background:"rgba(0,0,0,0.32)", borderRadius:14, padding:"14px 8px"}}>
                  <div style={{fontSize:11, opacity:0.85, color:roleColor, fontWeight:700, letterSpacing:"0.05em"}}>{it.role}</div>
                  <div className="font-mono" style={{fontSize:"min(28px,7vw)", fontWeight:900, marginTop:4, lineHeight:1.1}}>{it.combo}</div>
                  <div style={{fontSize:11, opacity:0.75, marginTop:2}}>{it.kind} {it.odds.toFixed(1)}倍</div>
                  <div className="num" style={{fontSize:"min(22px,5.5vw)", fontWeight:800, marginTop:6}}>¥{(it.stake||0).toLocaleString()}</div>
                </div>
              );
            })}
          </div>

          <div className="text-center mt-4" style={{fontSize:14, opacity:0.85}}>合計</div>
          <div className="text-center" style={{fontSize:"min(38px,9vw)", fontWeight:900, color:theme.color}}>
            ¥{rec.total.toLocaleString()}
          </div>

          <div className="mt-4 flex justify-center">
            <button onClick={quickRecordAll} disabled={busy}
              style={{background:"#fff", color:"#0b1220", padding:"14px 28px",
                borderRadius:14, fontWeight:800, fontSize:18, border:"none", cursor:"pointer",
                opacity: busy ? 0.65 : 1, minWidth:240, boxShadow:"0 4px 12px rgba(0,0,0,0.25)"}}>
              {busy ? "✅ 記録中…" : "✅ この買い目で記録"}
            </button>
          </div>
        </>
      )}

      {/* === 見送り: 理由 1 行 + 詳細リンク === */}
      {!isBuy && (
        <>
          <div className="mt-3 text-center" style={{fontSize:18, fontWeight:600, opacity:0.95, lineHeight:1.5}}>
            {skipReason}
          </div>
          <div className="mt-4 flex justify-center">
            <button onClick={() => onGoTab && onGoTab("weekly")}
              style={{background:"rgba(255,255,255,0.15)", color:"#fff", padding:"12px 22px",
                borderRadius:12, fontWeight:700, fontSize:14, border:"1px solid rgba(255,255,255,0.3)", cursor:"pointer"}}>
              📅 週次成績を見る
            </button>
          </div>
        </>
      )}

      {/* 完了トースト */}
      {msg && (
        <div className="mt-4 text-center" style={{
          background:"#fff", color:"#065f46", padding:"10px 16px", borderRadius:10,
          fontWeight:700, fontSize:14
        }}>{msg}</div>
      )}

      {/* 最下段: 小さく付帯情報 (詳細リンクのみ・他はノイズ削除) */}
      <div className="mt-4 flex justify-end" style={{paddingTop:10, borderTop:"1px solid rgba(255,255,255,0.15)"}}>
        <button onClick={() => onPick(race.id)} style={{
          background:"transparent", color:"rgba(255,255,255,0.7)", fontSize:12,
          border:"none", cursor:"pointer", textDecoration:"underline"
        }}>
          このレースの詳細を見る →
        </button>
      </div>
    </section>
  );
}

/* ========== 今やること: 行動指示カード (最上部) ========== */
function MainActionCard({ races, evals, onPick, onGoTab }) {
  const [tick, setTick] = useState(0);
  useEffect(() => { const id = setInterval(()=>setTick(x=>x+1), 60000); return ()=>clearInterval(id); }, []);

  const enriched = useMemo(() => races.map(r => {
    const ev = evals[r.id];
    const timing = calcRaceTiming(r, ev);
    const action = computeNextAction(r, ev, timing);
    return { race:r, ev, timing, action };
  }).filter(x => x.ev), [races, evals, tick]);

  // 優先順位: 5分前GO > 5分前CAUTION > 10分前GO > 15分前GO > 直近WAIT > その他
  function priority(item) {
    const k = item.action.kind;
    const m = item.timing.minutesToStart ?? 9999;
    if (item.timing.finished) return -1;
    const score = {
      "FINAL_CHECK": 100, "RECHECK": 90, "FIRST_CHECK": 80,
      "WAIT_DATA": 70, "GO_NOW": 60,
      "WAIT_TIME": 30, "WAIT_FAR": 20, "WAIT": 25,
      "FINISHED": 5, "SKIP": 0, "UNKNOWN": 0,
    }[k] ?? 0;
    // 直近のレースほど優先
    return score * 1000 - Math.max(0, m);
  }
  const sorted = [...enriched].sort((a,b) => priority(b) - priority(a));
  const top = sorted[0];

  if (!top || (top.timing?.finished === true && enriched.every(x=>x.timing.finished))) {
    return (
      <section className="mb-4" style={{padding:"40px 20px", borderRadius:18, background:"linear-gradient(135deg,#1e293b,#0f1830)", border:"2px solid #1f2a44", textAlign:"center"}}>
        <div style={{fontSize:64}}>😴</div>
        <div style={{fontSize:32, fontWeight:900, marginTop:8}}>今は触らない</div>
        <div className="hint text-sm mt-2">本日のレースは終了 / 該当レースなし</div>
      </section>
    );
  }

  // 状態別の濃い背景グラデと枠色
  const toneStyle = {
    go:      { bg:"linear-gradient(135deg,#065f46,#053527)", border:"#10b981" },
    caution: { bg:"linear-gradient(135deg,#854d0e,#3a2d0a)", border:"#f59e0b" },
    warn:    { bg:"linear-gradient(135deg,#9a3412,#3a2d0a)", border:"#f97316" },
    wait:    { bg:"linear-gradient(135deg,#1e3a8a,#0e2440)", border:"#3b82f6" },
    skip:    { bg:"linear-gradient(135deg,#7f1d1d,#3b1d1d)", border:"#ef4444" },
  }[top.action.tone] || { bg:"#1e293b", border:"#475569" };

  function handleAction() {
    if (top.action.btn?.race) onPick(top.race.id);
    else if (top.action.btn?.target) onGoTab(top.action.btn.target);
  }

  // 件数サマリ (内訳)
  const counts = {
    GO: enriched.filter(x => x.ev?.conditionGate?.level === "GO" && !x.timing.finished).length,
    WAIT: enriched.filter(x => x.ev?.conditionGate?.level === "WAIT" && !x.timing.finished).length,
    SKIP: enriched.filter(x => x.ev?.conditionGate?.level === "SKIP" && !x.timing.finished).length,
    CAUTION: enriched.filter(x => x.ev?.conditionGate?.level === "CAUTION" && !x.timing.finished).length,
  };

  // 緊急度バッジの色
  const urgencyStyle = top.action.urgency === "今すぐ"
    ? { bg:"#ef4444", color:"#fff", animate:"pulse" }
    : top.action.urgency === "5分以内"
    ? { bg:"#f59e0b", color:"#1e293b" }
    : top.action.urgency === "10分以内"
    ? { bg:"#3b82f6", color:"#fff" }
    : null;

  return (
    <section className="mb-4" style={{
      padding:"24px 24px 20px", borderRadius:18, background: toneStyle.bg,
      border: `3px solid ${toneStyle.border}`, color:"#ffffff",
      boxShadow: top.action.tone === "go" || top.action.tone === "skip"
        ? `0 0 32px -8px ${toneStyle.border}` : "none"
    }}>
      <div className="flex items-start justify-between mb-3 flex-wrap gap-2">
        <div className="text-xs uppercase tracking-widest opacity-80">📍 今やること</div>
        {urgencyStyle && (
          <div style={{
            background: urgencyStyle.bg, color: urgencyStyle.color,
            padding:"6px 14px", borderRadius:999, fontSize:13, fontWeight:800,
            animation: urgencyStyle.animate === "pulse" ? "pulse 1.5s infinite" : "none"
          }}>
            ⚡ {top.action.urgency}
          </div>
        )}
      </div>

      <div className="flex flex-col md:flex-row md:items-center gap-4">
        <div className="flex-1">
          {/* 大見出し */}
          <div style={{fontSize:"min(40px,9vw)", fontWeight:900, lineHeight:1.15, letterSpacing:"-0.01em"}}>
            {top.action.headline}
          </div>
          {/* 理由 (1行) */}
          {top.action.reason && top.action.reason !== "—" && (
            <div style={{fontSize:15, marginTop:8, fontWeight:600, opacity:0.95,
              background:"rgba(0,0,0,0.18)", padding:"6px 12px", borderRadius:8, display:"inline-block"}}>
              👉 {top.action.reason}
            </div>
          )}
          {top.action.subtext && (
            <div style={{fontSize:14, marginTop:6, opacity:0.85}}>{top.action.subtext}</div>
          )}
          <div style={{fontSize:13, marginTop:10, opacity:0.85}}>
            👉 <b>{top.race.venue} {top.race.raceNo}R</b> ({top.race.startTime}発走
            {top.timing.minutesToStart != null && top.timing.minutesToStart > 0 ?
              ` / あと${Math.round(top.timing.minutesToStart)}分` : ""})
          </div>
        </div>
        {top.action.btn && (
          <button onClick={handleAction} style={{
            fontSize:18, fontWeight:800, padding:"16px 28px", borderRadius:14,
            background:"#fff", color:"#0b1220", border:"none", cursor:"pointer",
            whiteSpace:"nowrap", flexShrink:0
          }}>
            {top.action.btn.label} →
          </button>
        )}
      </div>

      {/* 件数バー */}
      <div className="flex gap-2 mt-4 text-xs flex-wrap" style={{paddingTop:14, borderTop:"1px solid rgba(255,255,255,0.15)"}}>
        <span className="pill badge-buy">🟢 GO {counts.GO}</span>
        <span className="pill badge-warn">🟡 CAUTION {counts.CAUTION}</span>
        <span className="pill" style={{background:"#1e3a8a", color:"#bfdbfe"}}>⏳ WAIT {counts.WAIT}</span>
        <span className="pill badge-skip">🔴 SKIP {counts.SKIP}</span>
      </div>
    </section>
  );
}

/* ========== 今日のフォーカス (ダッシュボード上部用) ========== */
function TodayFocus({ races, evals, onPick }) {
  const [tick, setTick] = useState(0);
  useEffect(() => { const id = setInterval(()=>setTick(x=>x+1), 30000); return ()=>clearInterval(id); }, []);

  const enriched = races.map(r => {
    const ev = evals[r.id];
    const timing = calcRaceTiming(r, ev);
    return { race:r, ev, timing };
  });
  // 今すぐ確認すべき: 5分前以内
  const urgent  = enriched.filter(x => x.timing.urgency === 4 && !x.timing.finished);
  // 5-15分前 (確認開始/再確認)
  const soon    = enriched.filter(x => (x.timing.urgency === 2 || x.timing.urgency === 3) && !x.timing.finished);
  // GO候補
  const goNow   = enriched.filter(x => x.ev?.conditionGate?.level === "GO" && !x.timing.finished)
                          .sort((a,b)=> (a.timing.minutesToStart ?? 9999) - (b.timing.minutesToStart ?? 9999));

  const buckets = [
    { label:"⏰ 今すぐ確認 (5分前)", items: urgent, cls:"border-rose-500 bg-[#3b1d1d]", emoji:"🚨" },
    { label:"⏳ もうすぐ確認 (10-15分前)", items: soon, cls:"border-amber-500 bg-[#3a2d0a]", emoji:"⏳" },
    { label:"🟢 GO候補", items: goNow.slice(0,5), cls:"border-emerald-500 bg-[#053527]", emoji:"🟢" },
  ];

  if (urgent.length + soon.length + goNow.length === 0) {
    return null; // 表示するものがなければ非表示
  }

  return (
    <section className="card p-4 mb-4" style={{borderWidth:2, borderColor:"#22d3ee"}}>
      <h2 className="text-lg font-bold mb-3">📡 今日のフォーカス (買い時アラート)</h2>
      <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
        {buckets.map((b,i) => (
          <div key={i} className={"p-3 rounded border-2 " + b.cls}>
            <div className="font-bold mb-2 text-sm">{b.label} ({b.items.length})</div>
            {b.items.length === 0 ? <div className="hint text-xs">該当なし</div> :
              <ul className="text-xs space-y-1">
                {b.items.slice(0,5).map(({race,ev,timing}) => (
                  <li key={race.id} className="flex items-center justify-between cursor-pointer hover:bg-[#162241] p-1 rounded" onClick={()=>onPick(race.id)}>
                    <span>
                      <span className="font-bold">{race.venue} {race.raceNo}R</span>
                      <span className="hint ml-1">{race.startTime}</span>
                      {ev?.conditionGate?.level && (
                        <span className={"pill ml-1 " + (
                          ev.conditionGate.level==="GO"?"badge-buy":
                          ev.conditionGate.level==="CAUTION"?"badge-warn":
                          ev.conditionGate.level==="SKIP"?"badge-ooana":"badge-skip"
                        )}>{ev.conditionGate.level}</span>
                      )}
                    </span>
                    <span className="hint">{timing.minutesToStart != null ? `${Math.max(0,Math.round(timing.minutesToStart))}分` : "—"}</span>
                  </li>
                ))}
              </ul>}
          </div>
        ))}
      </div>
      <div className="hint text-xs mt-3">
        ⚠️ 締切5分前にデータが古い・WAIT判定なら買わないでください。<b>買うべきタイミングを逃さず、危ないタイミングで買わない</b>ための表示です。
      </div>
    </section>
  );
}

/* ========== 地元・コース適性・水面特性 表示 ========== */
function RegionalView({ race, regionalLog, venueTrait, homeBranch }) {
  if (!race?.boats || !regionalLog) return null;

  const traitLabel = {
    inner_strong: { icon:"🛟", label:"イン有利水面", cls:"badge-honmei" },
    inner_weak:   { icon:"⚡", label:"イン弱め水面", cls:"badge-warn" },
    rough:        { icon:"🌊", label:"荒れやすい水面", cls:"badge-ooana" },
    balanced:     { icon:"⚖️", label:"標準水面", cls:"badge-skip" },
  }[venueTrait?.type] || null;

  const homeBoats = regionalLog.filter(r => r.isHome);
  const goodCourseBoats = regionalLog.filter(r => r.courseGood);
  const badCourseBoats = regionalLog.filter(r => r.courseBad);
  const homeDangers = regionalLog.filter(r => r.isHome && r.homeDanger);
  const homeOverhypeds = regionalLog.filter(r => r.isHome && r.homeOverhyped);

  return (
    <section className="card p-4">
      <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
        <h3 className="font-bold">🏁 地元・コース・水面</h3>
        <div className="flex items-center gap-2 flex-wrap">
          {traitLabel && (
            <span className={"pill " + traitLabel.cls}>{traitLabel.icon} {traitLabel.label}</span>
          )}
          {venueTrait?.note && <span className="hint text-xs">{venueTrait.note}</span>}
          {homeBranch && <span className="hint text-xs">地元支部: <b>{homeBranch}</b></span>}
        </div>
      </div>

      {/* サマリ (該当艇のバッジ) */}
      <div className="grid grid-cols-1 md:grid-cols-3 gap-2 mb-3">
        <div className="p-2 rounded bg-[#0e2440] border border-blue-700">
          <div className="text-xs hint">🏠 地元選手</div>
          <div className="text-sm mt-1">
            {homeBoats.length === 0 ? <span className="hint">いません</span> :
              homeBoats.map(b => <span key={b.boatNo} className="pill badge-honmei mr-1">{b.boatNo}号艇</span>)}
          </div>
        </div>
        <div className="p-2 rounded bg-[#053527] border border-emerald-700">
          <div className="text-xs hint">🎯 コース得意</div>
          <div className="text-sm mt-1">
            {goodCourseBoats.length === 0 ? <span className="hint">なし</span> :
              goodCourseBoats.map(b => <span key={b.boatNo} className="pill badge-buy mr-1">{b.boatNo}号艇</span>)}
          </div>
        </div>
        <div className="p-2 rounded bg-[#3b1d1d] border border-rose-700">
          <div className="text-xs hint">⚠ コース苦手</div>
          <div className="text-sm mt-1">
            {badCourseBoats.length === 0 ? <span className="hint">なし</span> :
              badCourseBoats.map(b => <span key={b.boatNo} className="pill badge-ooana mr-1">{b.boatNo}号艇</span>)}
          </div>
        </div>
      </div>

      {/* 地元の危険警告 */}
      {(homeDangers.length > 0 || homeOverhypeds.length > 0) && (
        <div className="mb-3">
          {homeDangers.map(r => (
            <div key={"d"+r.boatNo} className="reason-neg">
              ⚠️ <b>{r.boatNo}号艇 ({r.homeBranch}) 地元だが状態が悪い</b> — {r.homeDangerNotes.join(" / ")}
              {r.homeOverhyped && " / 過剰人気で買われすぎ"}
            </div>
          ))}
          {homeOverhypeds.filter(r => !r.homeDanger).map(r => (
            <div key={"o"+r.boatNo} className="reason-neg">
              ⚠️ <b>{r.boatNo}号艇 ({r.homeBranch}) 地元人気で買われすぎ</b> — オッズ妙味なし
            </div>
          ))}
        </div>
      )}

      {/* 詳細テーブル */}
      <div className="overflow-x-auto scrollbar">
        <table>
          <thead><tr>
            <th>艇</th><th>選手</th><th>支部</th><th>地元</th>
            <th>{race.boats[0]?.boatNo ?? 1}コース成績</th>
            <th>水面適性</th><th>合計補正</th>
          </tr></thead>
          <tbody>
            {race.boats.map(b => {
              const r = regionalLog.find(x => x.boatNo === b.boatNo);
              const cs = b.courseStats ? (b.courseStats[String(b.boatNo)] ?? b.courseStats[b.boatNo]) : null;
              const baseAvg = COURSE_NATIONAL_AVG[b.boatNo-1];
              return (
                <tr key={b.boatNo}>
                  <td className="font-bold">{b.boatNo}</td>
                  <td className="hint text-xs">{b.racer}</td>
                  <td className="text-xs">{b.branch ?? "—"}</td>
                  <td>{r?.isHome
                    ? (r.homeDanger
                        ? <span className="pill badge-ooana text-xs">⚠️ 地元(危険)</span>
                        : r.homeOverhyped
                        ? <span className="pill badge-warn text-xs">⚠️ 地元(人気)</span>
                        : <span className="pill badge-honmei text-xs">🏠 地元</span>)
                    : <span className="hint text-xs">—</span>}</td>
                  <td className="num text-xs">
                    {cs != null ? `${cs}%` : "—"}
                    {cs != null && baseAvg != null && (
                      <span className={"ml-1 " + (cs-baseAvg>=5?"text-emerald-400":cs-baseAvg<=-5?"text-rose-400":"hint")}>
                        ({cs-baseAvg>=0?"+":""}{(cs-baseAvg).toFixed(0)})
                      </span>
                    )}
                  </td>
                  <td className="text-xs">
                    {r?.venueMatch ? <span className="pill badge-buy text-xs">水面◎</span> :
                     r?.items?.some(it => /水面/.test(it.label) && it.pct < 0) ? <span className="pill badge-ooana text-xs">水面△</span> : "—"}
                  </td>
                  <td className={"num font-bold " + (r?.percent>=0?"ev-pos":"ev-neg")}>
                    {r?.percent ? (r.percent>=0?"+":"") + r.percent.toFixed(1)+"%" : "—"}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* 補正の内訳 */}
      {regionalLog.some(r => r.items?.length > 0) && (
        <div className="mt-3">
          <h4 className="text-sm font-bold mb-2">📋 補正の内訳</h4>
          {regionalLog.filter(r => r.items?.length > 0).map(r => (
            <div key={r.boatNo} className="text-xs mb-1">
              <b>{r.boatNo}号艇</b>:
              {r.items.map((it,i) => (
                <span key={i} className={"pill ml-1 " + (it.pct>=0?"badge-buy":"badge-ooana")}>
                  {it.label} {it.pct>=0?"+":""}{it.pct}%
                </span>
              ))}
            </div>
          ))}
        </div>
      )}

      <div className="hint text-xs mt-3">
        補正は最大±5%にクリップ。<b>あくまで補助要素</b>として、ベース予想 (展示・モーター・選手成績) を微調整する役割です。
      </div>
    </section>
  );
}

/* ========== モーター評価 表示 ========== */
function MotorEvaluationView({ race, motorLog, mismatches }) {
  if (!race?.boats || !motorLog) return null;

  function aceColor(level) {
    if (level === "エース機")     return "badge-buy";
    if (level === "準エース")     return "badge-honmei";
    if (level === "下降モーター") return "badge-ooana";
    return "badge-skip";
  }
  function trendColor(trend) {
    if (trend === "上昇") return "text-emerald-400";
    if (trend === "下降") return "text-rose-400";
    return "hint";
  }

  return (
    <section className="card p-4">
      <div className="flex items-center justify-between mb-2">
        <h3 className="font-bold">⚙️ モーター評価 (節内)</h3>
        <span className="hint text-xs">節内ランキング・トレンド・直近使用者成績などを統合してエース判定。</span>
      </div>

      <div className="overflow-x-auto scrollbar mb-3">
        <table>
          <thead><tr>
            <th>艇</th><th>モーター#</th><th>2連率</th><th>節内順位</th>
            <th>型</th><th>トレンド</th><th>節内展示平均</th><th>直近使用者</th>
            <th>エース判定</th><th>補正</th>
          </tr></thead>
          <tbody>
            {motorLog.map(m => {
              const b = race.boats.find(x => x.boatNo === m.boatNo);
              return (
                <tr key={m.boatNo}>
                  <td className="font-bold">{m.boatNo}</td>
                  <td className="num text-xs">{b?.motorNo ?? "—"}</td>
                  <td className="num">{m.motor2 ?? "—"}{m.motor2!=null?"%":""}</td>
                  <td className={"num " + (m.ranking != null && m.ranking <= 15 ? "text-emerald-400" : m.ranking != null && m.ranking >= 70 ? "text-rose-400" : "")}>
                    {m.ranking != null ? `上位${m.ranking}%` : "—"}
                  </td>
                  <td className="text-xs">{m.motorType ?? "—"}</td>
                  <td className={"text-xs " + trendColor(m.trend)}>
                    {m.trend === "上昇" ? "↗ 上昇" : m.trend === "下降" ? "↘ 下降" : m.trend === "横ばい" ? "→ 横ばい" : "—"}
                  </td>
                  <td className="num text-xs">
                    {m.avgExTime ?? "—"}
                    {m.avgExTime != null && b?.exTime != null && (
                      <span className={"ml-1 " + ((m.avgExTime-b.exTime)>=0.05?"text-emerald-400":(m.avgExTime-b.exTime)<=-0.05?"text-rose-400":"hint")}>
                        ({(b.exTime - m.avgExTime).toFixed(2)})
                      </span>
                    )}
                  </td>
                  <td className="font-mono text-xs">
                    {Array.isArray(m.recentUsers) && m.recentUsers.length>0 ? m.recentUsers.join("-") : "—"}
                  </td>
                  <td><span className={"pill " + aceColor(m.aceLevel)}>{m.aceLevel}</span></td>
                  <td className={"num font-bold " + (m.percent>=0?"ev-pos":(m.percent<0?"ev-neg":""))}>
                    {m.percent>=0?"+":""}{m.percent}%
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* エース判定の理由 (上位艇のみ表示) */}
      {motorLog.some(m => m.aceLevel === "エース機" || m.aceLevel === "準エース" || m.aceLevel === "下降モーター") && (
        <div className="mb-3">
          <h4 className="text-sm font-bold mb-2">判定理由</h4>
          {motorLog.filter(m => m.aceLevel !== "普通" && m.aceReasons.length > 0).map((m, i) => (
            <div key={i} className={
              m.aceLevel==="エース機"?"reason-pos":
              m.aceLevel==="準エース"?"reason-pos":
              m.aceLevel==="下降モーター"?"reason-neg":"reason-neutral"
            }>
              <b>{m.boatNo}号艇 {m.aceLevel}</b> (スコア {m.aceScore}): {m.aceReasons.join(" / ")}
            </div>
          ))}
        </div>
      )}

      {/* モーター × 人気のミスマッチ */}
      {mismatches && mismatches.length > 0 && (
        <div>
          <h4 className="text-sm font-bold mb-2">⚖️ モーター × 人気・展示の不整合</h4>
          {mismatches.map((m, i) => (
            <div key={i} className={m.type==="warn"?"reason-neg":(m.type==="good"?"reason-pos":"reason-neutral")}>
              {m.type==="warn"?"⚠️":(m.type==="good"?"💎":"💡")} {m.text}
            </div>
          ))}
        </div>
      )}

      <div className="hint text-xs mt-3">
        <b>判定基準:</b> モーター2連率/節内ランキング/直近使用者平均/節内展示平均/トレンド/コメント評価を総合スコア化。スコア≧3.5でエース機(+8%)、≧2.0で準エース(+4%)、≦-1.5または下降トレンドで下降モーター(-5%)。
      </div>
    </section>
  );
}

/* ========== レーサー履歴データ 表示 ========== */
function RacerHistoryView({ race, historyLog, historyNotes }) {
  if (!race?.boats) return null;
  const hasAny = race.boats.some(b => (
    b.regNo != null || b.prevClass != null || b.prevPrevClass != null ||
    b.everA1 != null || b.everA != null ||
    b.recentWinRate != null || b.accidentRate != null ||
    (Array.isArray(b.flState) && b.flState.length>0) ||
    (Array.isArray(b.last3SeriesResults) && b.last3SeriesResults.length>0) ||
    (b.courseStats && typeof b.courseStats === "object")
  ));
  if (!hasAny) {
    return (
      <section className="card p-4">
        <h3 className="font-bold mb-2">👤 レーサー履歴データ</h3>
        <div className="info text-xs">
          このレースには履歴データが取り込まれていません。CSV/JSON 取込で <code>regNo / prevClass / prevPrevClass / everA1 / everA / recentWinRate / accidentRate / flState / last3SeriesResults / courseStats</code> を含めると、級別変化・近況・F持ちなどが予想に反映されます。<b>現在級別だけで判断せず、級別の変化と近況を重視します。</b>
        </div>
      </section>
    );
  }

  function classChangeBadge(b) {
    if (!b.prevClass || !b.class) return null;
    const ch = classRank(b.class) - classRank(b.prevClass);
    if (ch >= 1) return { label:`${b.prevClass}→${b.class} 昇級`, cls:"badge-buy" };
    if (ch <= -1) return { label:`${b.prevClass}→${b.class} 降級`, cls:"badge-ooana" };
    return { label:`${b.prevClass}→${b.class} 維持`, cls:"badge-skip" };
  }

  function flBadge(flState) {
    const arr = Array.isArray(flState) ? flState : (flState ? [flState] : []);
    if (arr.length === 0) return null;
    return arr.join("/");
  }

  return (
    <section className="card p-4">
      <div className="flex items-center justify-between mb-2">
        <h3 className="font-bold">👤 レーサー履歴データ (級別変化・近況・F/L)</h3>
        <span className="hint text-xs">補正は控えめ。現在級別より「変化」と「近況」を重視します。</span>
      </div>

      {/* レーサー履歴表 */}
      <div className="overflow-x-auto scrollbar mb-3">
        <table>
          <thead><tr>
            <th>艇</th><th>選手</th><th>登録番号</th><th>級別変化</th>
            <th>A1経験</th><th>近況勝率</th><th>事故率</th><th>F/L</th>
            <th>過去3節</th><th>1コース</th><th>{race.boats[0].boatNo}コース成績</th>
          </tr></thead>
          <tbody>
            {race.boats.map(b => {
              const cb = classChangeBadge(b);
              const fl = flBadge(b.flState);
              const csOwn = b.courseStats ? (b.courseStats[String(b.boatNo)] ?? b.courseStats[b.boatNo]) : null;
              const cs1 = b.courseStats ? (b.courseStats["1"] ?? b.courseStats[1]) : null;
              return (
                <tr key={b.boatNo}>
                  <td className="font-bold">{b.boatNo}</td>
                  <td className="hint">{b.racer} <span className="text-xs">({b.class})</span></td>
                  <td className="num text-xs">{b.regNo ?? "—"}</td>
                  <td>
                    {cb ? <span className={"pill text-xs " + cb.cls}>{cb.label}</span> : "—"}
                    {b.prevPrevClass && <span className="hint text-xs ml-1">前々:{b.prevPrevClass}</span>}
                  </td>
                  <td>
                    {b.everA1 ? <span className="pill badge-honmei text-xs">A1経験</span> :
                     b.everA  ? <span className="pill badge-warn text-xs">A級経験</span> : "—"}
                  </td>
                  <td className="num">
                    {b.recentWinRate != null ? b.recentWinRate.toFixed(2) : "—"}
                    {b.recentWinRate != null && b.winRate != null && (
                      <span className={"text-xs ml-1 " + ((b.recentWinRate-b.winRate)>=0.3?"text-emerald-400":(b.recentWinRate-b.winRate)<=-0.3?"text-rose-400":"hint")}>
                        ({(b.recentWinRate-b.winRate)>=0?"+":""}{(b.recentWinRate-b.winRate).toFixed(1)})
                      </span>
                    )}
                  </td>
                  <td className={"num " + (b.accidentRate>=0.15?"text-rose-400":b.accidentRate>=0.10?"text-amber-400":"")}>
                    {b.accidentRate != null ? (b.accidentRate*100).toFixed(0)+"%" : "—"}
                  </td>
                  <td>{fl ? <span className="pill badge-ooana text-xs">{fl}</span> : "—"}</td>
                  <td className="font-mono text-xs">
                    {Array.isArray(b.last3SeriesResults) && b.last3SeriesResults.length>0 ? b.last3SeriesResults.join("-") : "—"}
                  </td>
                  <td className="num text-xs">{cs1 != null ? cs1.toFixed(0)+"%" : "—"}</td>
                  <td className={"num text-xs " + (csOwn!=null && csOwn<=5?"text-rose-400":csOwn!=null && csOwn>=30?"text-emerald-400":"")}>
                    {csOwn != null ? csOwn.toFixed(0)+"%" : "—"}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* 補正の内訳 */}
      <div className="mb-3">
        <h4 className="text-sm font-bold mb-2">🧮 履歴データによる補正</h4>
        {historyLog.length === 0 ? (
          <div className="hint text-xs">履歴データから判定可能な補正はありませんでした。</div>
        ) : (
          <div className="overflow-x-auto scrollbar">
          <table>
            <thead><tr><th>艇</th><th>合計補正</th><th>内訳</th></tr></thead>
            <tbody>
              {historyLog.sort((a,b)=>Math.abs(b.percent)-Math.abs(a.percent)).map(entry => (
                <tr key={entry.boatNo}>
                  <td className="font-bold">{entry.boatNo}</td>
                  <td className={"num font-bold " + (entry.percent>=0?"ev-pos":"ev-neg")}>
                    {entry.percent>=0?"+":""}{entry.percent.toFixed(1)}%
                  </td>
                  <td>
                    <div className="flex flex-wrap gap-1">
                      {entry.items.map((it,i) => (
                        <span key={i} className={"pill " + (it.pct>=0?"badge-buy":"badge-ooana")} style={{whiteSpace:"normal"}}>
                          {it.label} {it.pct>=0?"+":""}{it.pct}%
                        </span>
                      ))}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          </div>
        )}
      </div>

      {/* 注意点 / 妙味候補 / 危険人気 */}
      {historyNotes.length > 0 && (
        <div>
          <h4 className="text-sm font-bold mb-2">📌 注意点・妙味候補・危険人気</h4>
          {historyNotes.map((n,i) => (
            <div key={i} className={n.type==="warn"?"reason-neg":(n.type==="good"?"reason-pos":"reason-neutral")}>
              {n.type==="warn"?"⚠️":(n.type==="good"?"💎":"💡")} {n.text}
            </div>
          ))}
        </div>
      )}

      <div className="hint text-xs mt-3">
        <b>補正レイヤーの順序:</b> ベーススコア → 文脈フラグ → 選手コメント → 拡張データ → <b>レーサー履歴</b>。級別変化と近況を最後に乗せ、本予想を逆転させない範囲で調整します。
      </div>
    </section>
  );
}

/* ========== 拡張データ表示 ========== */
function ExtensionDataView({ race, extensionLog, extensionNotes }) {
  if (!race?.boats) return null;
  const hasAny = race.boats.some(b => (
    b.localWinRate != null || b.localPlaceRate != null || b.tilt != null ||
    (Array.isArray(b.partsExchange) && b.partsExchange.length>0) ||
    (Array.isArray(b.prevResults) && b.prevResults.length>0) ||
    (Array.isArray(b.thisSeriesResults) && b.thisSeriesResults.length>0) ||
    (Array.isArray(b.entryHistory) && b.entryHistory.length>0) ||
    b.startExhibition != null || b.lapExhibition != null || (b.exhibitionNote && b.exhibitionNote.trim() !== "")
  ));
  if (!hasAny) {
    return (
      <section className="card p-4">
        <h3 className="font-bold mb-2">📚 拡張データ</h3>
        <div className="info text-xs">
          このレースには拡張データが取り込まれていません。CSV/JSON 取込で <code>localWinRate / tilt / partsExchange / prevResults / thisSeriesResults / entryHistory / startExhibition / lapExhibition / exhibitionNote</code> を含めると、当地適性・チルト・部品交換・前走/今節成績・進入安定性・スタ展/周回展示・展示メモが予想に反映されます。
        </div>
      </section>
    );
  }

  function fmtArr(arr) {
    return Array.isArray(arr) && arr.length>0 ? arr.join("-") : "—";
  }
  function fmtParts(p) {
    if (!p) return "—";
    if (Array.isArray(p)) return p.length===0 ? "—" : p.join("/");
    return String(p);
  }
  function entryStability(b) {
    if (!Array.isArray(b.entryHistory) || b.entryHistory.length === 0) return null;
    const valid = b.entryHistory.filter(c => typeof c === "number");
    if (valid.length === 0) return null;
    const fixed = valid.filter(c => c === b.boatNo).length / valid.length;
    return { rate: fixed, label: fixed>=0.9?"安定":(fixed>=0.7?"概ね安定":(fixed>=0.5?"やや不安定":"不安定")) };
  }

  return (
    <section className="card p-4">
      <div className="flex items-center justify-between mb-2">
        <h3 className="font-bold">📚 拡張データ (会場適性・整備・展示・節成績)</h3>
        <span className="hint text-xs">予想精度を上げる補助情報。欠損は無視されます。</span>
      </div>

      {/* 拡張データ表 */}
      <div className="overflow-x-auto scrollbar mb-3">
        <table>
          <thead><tr>
            <th>艇</th><th>当地勝率</th><th>当地2連</th>
            <th>チルト</th><th>部品交換</th>
            <th>前走</th><th>今節</th>
            <th>進入</th><th>スタ展</th><th>周回展</th><th>気配メモ</th>
          </tr></thead>
          <tbody>
            {race.boats.map(b => {
              const stab = entryStability(b);
              const localDiff = (b.localWinRate != null && b.winRate != null) ? b.localWinRate - b.winRate : null;
              return (
                <tr key={b.boatNo}>
                  <td className="font-bold">{b.boatNo}</td>
                  <td className="num">
                    {b.localWinRate != null ? b.localWinRate.toFixed(2) : "—"}
                    {localDiff != null && (
                      <span className={"text-xs ml-1 " + (localDiff>=0.5?"text-emerald-400":localDiff<=-0.5?"text-rose-400":"hint")}>
                        ({localDiff>=0?"+":""}{localDiff.toFixed(1)})
                      </span>
                    )}
                  </td>
                  <td className="num">{b.localPlaceRate != null ? b.localPlaceRate.toFixed(1)+"%" : "—"}</td>
                  <td className="num">
                    {b.tilt != null ? b.tilt.toFixed(1) : "—"}
                    {b.tilt != null && (
                      <span className="text-xs hint ml-1">
                        {b.tilt >= 1.5 ? "(伸び)" : b.tilt <= -0.5 ? "(出足)" : ""}
                      </span>
                    )}
                  </td>
                  <td className={fmtParts(b.partsExchange)!=="—" ? "text-amber-400" : ""}>{fmtParts(b.partsExchange)}</td>
                  <td className="font-mono text-xs">{fmtArr(b.prevResults)}</td>
                  <td className="font-mono text-xs">{fmtArr(b.thisSeriesResults)}</td>
                  <td>
                    {stab ? (
                      <span className={"pill " + (stab.rate>=0.9?"badge-buy":stab.rate>=0.5?"badge-warn":"badge-ooana")}>
                        {(stab.rate*100).toFixed(0)}% {stab.label}
                      </span>
                    ) : "—"}
                  </td>
                  <td className="num">{b.startExhibition != null ? b.startExhibition.toFixed(2) : "—"}</td>
                  <td className="num">{b.lapExhibition != null ? b.lapExhibition.toFixed(2) : "—"}</td>
                  <td className="text-xs">{b.exhibitionNote || "—"}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* 拡張データによる加点/減点 */}
      <div className="mb-3">
        <h4 className="text-sm font-bold mb-2">🧮 拡張データによる加点・減点</h4>
        {extensionLog.length === 0 ? (
          <div className="hint text-xs">拡張データから判定可能な補正はありませんでした。</div>
        ) : (
          <div className="overflow-x-auto scrollbar">
          <table>
            <thead><tr><th>艇</th><th>合計補正</th><th>内訳</th></tr></thead>
            <tbody>
              {extensionLog.sort((a,b)=>Math.abs(b.percent)-Math.abs(a.percent)).map(entry => (
                <tr key={entry.boatNo}>
                  <td className="font-bold">{entry.boatNo}</td>
                  <td className={"num font-bold " + (entry.percent>=0?"ev-pos":"ev-neg")}>
                    {entry.percent>=0?"+":""}{entry.percent.toFixed(1)}%
                  </td>
                  <td>
                    <div className="flex flex-wrap gap-1">
                      {entry.items.map((it,i) => (
                        <span key={i} className={"pill " + (it.pct>=0?"badge-buy":"badge-ooana")} style={{whiteSpace:"normal"}}>
                          {it.label} {it.pct>=0?"+":""}{it.pct}%
                        </span>
                      ))}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          </div>
        )}
      </div>

      {/* 注意すべき変化 */}
      {extensionNotes.length > 0 && (
        <div>
          <h4 className="text-sm font-bold mb-2">⚠️ 注意すべき変化・予想への影響</h4>
          {extensionNotes.map((n,i) => (
            <div key={i} className={
              n.type==="warn"?"reason-neg":
              n.type==="good"?"reason-pos":
              "reason-neutral"
            }>
              {n.type==="warn"?"⚠️":n.type==="good"?"✅":"💡"} {n.text}
            </div>
          ))}
        </div>
      )}

      <div className="hint text-xs mt-3">
        <b>拡張データの位置づけ:</b> 既存の予測 (ベーススコア → 文脈フラグ → 選手コメント → 拡張データ) の最後に乗算合成。各項目の影響は控えめに設計し、本予想を逆転させない範囲で調整に使います。
      </div>
    </section>
  );
}

/* ========== 選手コメント・エディタ ========== */
function RaceCommentsEditor({ race, raceComments, setRaceComments, commentLog, contradictions }) {
  const current = raceComments[race.id] || {};
  function setComment(boatNo, text) {
    setRaceComments({...raceComments, [race.id]: {...current, [String(boatNo)]: text}});
  }
  function clearAll() { setRaceComments({...raceComments, [race.id]: {}}); }
  const filledCount = race.boats.filter(b => {
    const t = current[String(b.boatNo)] ?? current[b.boatNo];
    return t != null && t !== "";
  }).length;

  function badge(klass) {
    if (klass === "◎") return "badge-buy";
    if (klass === "▲") return "badge-ooana";
    if (klass === "○") return "badge-honmei";
    return "badge-skip";
  }

  return (
    <section className="card p-4">
      <div className="flex items-center justify-between mb-2 flex-wrap gap-2">
        <h3 className="font-bold">💬 選手コメント (主観情報)</h3>
        <div className="flex gap-2">
          <span className="hint text-xs">取得 {filledCount}/{race.boats.length}艇</span>
          {filledCount>0 && <button className="btn btn-ghost text-xs" onClick={clearAll}>すべて消去</button>}
        </div>
      </div>
      <div className="hint text-xs mb-3">
        当日の選手コメントを入れると <b>◎ 強い / ○ 普通 / ▲ 弱い / ？ 不明</b> に自動分類され、スコアが ±5〜10% 補正されます。<b>コメントは主観なので数値より優先しません</b> — 最後の補正材料です。
        キーワード例: <span className="text-emerald-400">「足がいい」「伸びる」「出足良」「気配良」</span> →◎ /
        <span className="text-rose-400">「重い」「乗りにくい」「伸びられる」「ターン悪」</span> →▲
      </div>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
        {race.boats.map(b => {
          const text = current[String(b.boatNo)] ?? current[b.boatNo] ?? "";
          const c = classifyComment(text);
          const log = commentLog?.find(l => l.boatNo === b.boatNo);
          return (
            <div key={b.boatNo} className="p-3 rounded bg-[#0f1830] border border-[#1f2a44]">
              <div className="flex items-center justify-between mb-2">
                <div className="font-bold">
                  {b.boatNo}号艇 <span className="hint font-normal">{b.racer}</span>
                </div>
                <div className="flex items-center gap-2">
                  <span className={"pill " + badge(c.klass)}>{c.klass} {c.label}</span>
                  {log && log.factor !== 1 && (
                    <span className={"text-xs num font-bold " + (log.percent>=0?"text-emerald-400":"text-rose-400")}>
                      {log.percent>=0?"+":""}{log.percent.toFixed(1)}%
                    </span>
                  )}
                </div>
              </div>
              <input className="input text-sm" placeholder="例: 出足良、伸びもいい / 重い、ターン回りが悪い"
                value={text} onChange={e=>setComment(b.boatNo, e.target.value)}/>
              {c.hits.length > 0 && (
                <div className="hint text-xs mt-1">検出ワード: {c.hits.join(" ")}</div>
              )}
              <div className="hint text-xs mt-1">
                展示 {b.exTime ?? "?"} / モーター {b.motor2 ?? "?"}% / ST {b.ST ?? "?"}
              </div>
            </div>
          );
        })}
      </div>

      {/* 矛盾警告 */}
      {contradictions && contradictions.length > 0 && (
        <div className="mt-3">
          <h4 className="text-sm font-bold mb-2">⚖️ コメントと数値データの矛盾検出</h4>
          {contradictions.map((c,i)=>(
            <div key={i} className={c.type==="warn" ? "reason-neg" : "reason-neutral"}>
              {c.type==="warn"?"⚠️":"💡"} {c.text}
            </div>
          ))}
          <div className="hint text-xs mt-2">
            <b>注意:</b> コメントは主観情報なので、矛盾があっても数値データを優先するのが基本。コメント過信は禁物です。
          </div>
        </div>
      )}
    </section>
  );
}

/* ========== データ更新画面 ========== */
function DataSourceView({ races, setRaces }) {
  const [json, setJson] = useState("");
  const [msg, setMsg] = useState("");
  const now = Date.now();

  function ageMin(ts) {
    if (!ts) return null;
    return (now - new Date(ts).getTime()) / 60000;
  }

  function ageLabel(min) {
    if (min == null) return "未取得";
    if (min < 5) return `${min.toFixed(1)}分前 (最新)`;
    if (min < 15) return `${min.toFixed(0)}分前 (やや古い)`;
    return `${min.toFixed(0)}分前 (古い)`;
  }

  // 全レース横断のサマリ
  const summary = useMemo(() => {
    const exMins = races.map(r => ageMin(r.exhibitionUpdatedAt)).filter(x=>x!=null);
    const oddsMins = races.map(r => ageMin(r.oddsUpdatedAt)).filter(x=>x!=null);
    const genMins = races.map(r => ageMin(r.updatedAt)).filter(x=>x!=null);
    const fresh = races.filter(r => calcFreshness(r).level === "最新").length;
    const old = races.filter(r => ["古い","危険"].includes(calcFreshness(r).level)).length;
    return {
      exAvg: exMins.length ? exMins.reduce((a,b)=>a+b,0)/exMins.length : null,
      oddsAvg: oddsMins.length ? oddsMins.reduce((a,b)=>a+b,0)/oddsMins.length : null,
      genAvg: genMins.length ? genMins.reduce((a,b)=>a+b,0)/genMins.length : null,
      fresh, old, total: races.length,
    };
  }, [races, now]);

  function refreshAll() {
    const ts = new Date().toISOString();
    setRaces(prev => prev.map(r => ({...r,
      updatedAt: ts, exhibitionUpdatedAt: ts, oddsUpdatedAt: ts,
    })));
    setMsg(`✅ ${races.length}レースのタイムスタンプを更新しました (発走前の手動取込済み相当)`);
  }

  function refreshOddsOnly() {
    const ts = new Date().toISOString();
    setRaces(prev => prev.map(r => ({...r, oddsUpdatedAt: ts})));
    setMsg(`✅ オッズのタイムスタンプを更新しました`);
  }

  function importOddsJson() {
    try {
      const obj = JSON.parse(json);
      if (typeof obj !== "object" || Array.isArray(obj)) throw new Error("オブジェクト形式の JSON ({raceId: {boatNo: odds}}) を入力してください");
      const ts = new Date().toISOString();
      setRaces(prev => prev.map(r => {
        if (!obj[r.id]) return r;
        const oddsMap = obj[r.id];
        const newWinOdds = r.boats.map(b => +oddsMap[b.boatNo] || null);
        return {
          ...r,
          oddsUpdatedAt: ts,
          updatedAt: ts,
          prevOdds: r.currentWinOdds || null,
          currentWinOdds: newWinOdds,
        };
      }));
      setMsg(`✅ ${Object.keys(obj).length}レースのオッズを取り込みました`);
      setJson("");
    } catch(e) {
      setMsg(`❌ ${e.message}`);
    }
  }

  return (
    <div className="space-y-4 mt-4">
      <section className="card p-4">
        <h2 className="text-lg font-bold mb-2">🔄 データ更新</h2>
        <div className="info text-sm">
          <b>設計方針:</b> CSV/JSON 取り込みを基本とし、将来 BOAT RACE 公式の公開情報からの取得に拡張可能な構造にしてあります。
          <ul className="list-disc pl-6 mt-2 text-sm space-y-1">
            <li>規約に違反する取得・高頻度アクセス・ログイン必要情報の取得は<b>実装しません</b></li>
            <li>自動ログイン・自動購入・パスワード保存は<b>実装しません</b></li>
            <li>更新タイミング: 出走表 (朝)、直前情報 (締切15-5分前)、オッズ (15/10/5/3分前)、結果 (レース終了後) を想定</li>
          </ul>
        </div>
      </section>

      <section className="card p-4">
        <h3 className="font-bold mb-3">全レース 鮮度サマリ</h3>
        <div className="grid-cards">
          <Kpi label="解析対象レース" value={`${summary.total}件`}/>
          <Kpi label="最新 (5分以内)" value={`${summary.fresh}件`} highlight={summary.fresh>0}/>
          <Kpi label="古い・危険" value={`${summary.old}件`} highlight={summary.old>0}/>
          <Kpi label="出走表 平均年齢" value={summary.genAvg!=null ? `${summary.genAvg.toFixed(0)}分` : "—"}/>
          <Kpi label="直前情報 平均年齢" value={summary.exAvg!=null ? `${summary.exAvg.toFixed(0)}分` : "—"}/>
          <Kpi label="オッズ 平均年齢" value={summary.oddsAvg!=null ? `${summary.oddsAvg.toFixed(0)}分` : "—"}/>
        </div>
      </section>

      <section className="card p-4">
        <h3 className="font-bold mb-3">手動更新 (タイムスタンプを「今」に)</h3>
        <div className="hint text-xs mb-3">
          公式サイトで自分で確認した情報を反映する想定の操作です。<b>実際のデータを引き直すわけではない</b>ので、出走表自体の差し替えは「データ取込」タブから JSON/CSV を投入してください。
        </div>
        <div className="flex gap-2 flex-wrap">
          <button className="btn btn-primary" onClick={refreshAll}>全レース 鮮度を更新</button>
          <button className="btn btn-ghost" onClick={refreshOddsOnly}>オッズのみ鮮度を更新</button>
        </div>
      </section>

      <section className="card p-4">
        <h3 className="font-bold mb-3">直前オッズの取り込み (JSON)</h3>
        <div className="hint text-xs mb-2">
          形式: <code>{'{ "R001": { "1": 1.4, "2": 5.2, ... }, "R002": {...} }'}</code>
          <br/>取り込み後、<b>前回オッズ vs 今回オッズ</b>の変動が20%以上ある場合は警告が出ます。
        </div>
        <textarea className="input" rows="6" value={json} onChange={e=>setJson(e.target.value)} placeholder='{ "R001": {"1": 1.4, "2": 5.2, ...} }'/>
        <div className="mt-2 flex gap-2">
          <button className="btn btn-primary" onClick={importOddsJson}>オッズを取り込み (鮮度も更新)</button>
        </div>
      </section>

      <section className="card p-4">
        <h3 className="font-bold mb-3">レース別 鮮度状況</h3>
        <div className="overflow-x-auto scrollbar">
          <table>
            <thead><tr>
              <th>会場/R</th><th>発走</th><th>出走表</th><th>直前情報</th><th>オッズ</th><th>鮮度</th>
            </tr></thead>
            <tbody>
              {races.map(r => {
                const f = calcFreshness(r);
                return (
                  <tr key={r.id}>
                    <td>{r.venue} {r.raceNo}R</td>
                    <td className="num">{r.startTime}</td>
                    <td className="hint">{ageLabel(ageMin(r.updatedAt))}</td>
                    <td className="hint">{ageLabel(ageMin(r.exhibitionUpdatedAt))}</td>
                    <td className="hint">{ageLabel(ageMin(r.oddsUpdatedAt))}</td>
                    <td>
                      <span className={"pill " + (f.level==="最新"?"badge-buy":f.level==="やや古い"?"badge-warn":f.level==="古い"?"badge-chuana":"badge-ooana")}>
                        {f.level}
                      </span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </section>

      {msg && <div className="ok">{msg}</div>}
    </div>
  );
}

/* ========== 市場 vs AI ダイバージェンス表示 ========== */
function MarketDivergenceView({ race, market }) {
  if (!market) return null;
  const dangerColor = market.dangerLevel === "高" ? "warn" : (market.dangerLevel === "中" ? "alert" : "info");
  const overhypeBadge = market.overhypeIndex >= 1.30 ? "warn" : (market.overhypeIndex >= 1.15 ? "alert" : "ok");
  const chartData = market.perBoat.map(b => ({
    name: b.boatNo+"号",
    AI予測: +(b.aiProb*100).toFixed(1),
    市場推定: +(b.marketProb*100).toFixed(1),
  }));

  return (
    <section className="card p-4">
      <div className="flex items-center gap-3 mb-3 flex-wrap">
        <h3 className="font-bold">📉 市場 vs AI — 過剰人気・買ってはいけない本命の判定</h3>
        <span className="hint text-xs">市場 (オッズ) から逆算した implied 確率と AI 予測の乖離を見ます。「当たる艇を探す」ではなく「買ってはいけない人気を見抜く」ためのレイヤーです。</span>
      </div>

      {/* サマリカード */}
      <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
        <div className={"p-3 rounded border " + (overhypeBadge==="warn"?"border-rose-700 bg-[#3b1d1d]":(overhypeBadge==="alert"?"border-amber-700 bg-[#3a2d0a]":"border-emerald-700 bg-[#053527]"))}>
          <div className="text-xs hint">過剰人気指数</div>
          <div className="text-2xl font-bold num">{market.overhypeIndex.toFixed(2)}<span className="text-sm font-normal ml-1">×</span></div>
          <div className="text-xs mt-1">
            {market.overhypeIndex >= 1.30 ? "市場が AI の見立てを大きく超えて買っている" :
             market.overhypeIndex >= 1.15 ? "やや過剰人気" : "市場とAIの見立てがほぼ一致"}
          </div>
        </div>
        <div className={"p-3 rounded border " + (market.dangerLevel==="高"?"border-rose-700 bg-[#3b1d1d]":(market.dangerLevel==="中"?"border-amber-700 bg-[#3a2d0a]":"border-emerald-700 bg-[#053527]"))}>
          <div className="text-xs hint">本命危険度</div>
          <div className="text-2xl font-bold">{market.dangerLevel} <span className="text-sm num font-normal">({market.dangerScore}/100)</span></div>
          <div className="text-xs mt-1">
            {market.dangerLevel === "高" ? "「買ってはいけない本命」の典型" :
             market.dangerLevel === "中" ? "本命に飛びつかない方が良い" : "通常の本命評価"}
          </div>
        </div>
        <div className="p-3 rounded border border-slate-600 bg-[#0f1830]">
          <div className="text-xs hint">市場本命 / AI本命</div>
          <div className="text-lg font-bold">
            市場: {market.popFavIdx+1}号艇 ({(market.marketProbs[market.popFavIdx]*100).toFixed(0)}%)
            <span className="hint mx-2">/</span>
            AI: {market.aiTopIdx+1}号艇
          </div>
          <div className="text-xs mt-1">
            {market.popFavIdx === market.aiTopIdx ? "本命が一致しています" : "市場とAIで本命がズレています"}
          </div>
        </div>
      </div>

      {/* 本命危険度の理由 */}
      {market.dangerReasons.length > 0 && (
        <div className={dangerColor + " mb-3"}>
          <b>「買ってはいけない本命」の理由 ({market.dangerReasons.length}件):</b>
          <ul className="list-disc pl-5 mt-1 text-sm">
            {market.dangerReasons.map((r,i)=><li key={i}>{r}</li>)}
          </ul>
        </div>
      )}

      {/* 比較チャート */}
      <div style={{height:240}} className="mb-3">
        <ResponsiveContainer>
          <BarChart data={chartData}>
            <CartesianGrid strokeDasharray="3 3" stroke="#1f2a44"/>
            <XAxis dataKey="name" stroke="#9fb0c9"/>
            <YAxis stroke="#9fb0c9" unit="%"/>

          <div className="text-sm font-bold text-rose-300">🚨 過剰人気艇 (買ってはいけない)</div>
          {market.overhypedBoats.length === 0 ? <div className="hint text-xs mt-1">該当なし</div> :
            <ul className="text-sm mt-2 space-y-1">
              {market.overhypedBoats.map((b,i)=>(
                <li key={i}>
                  <b>{b.boatNo}号艇</b> {b.racer}<br/>
                  <span className="hint text-xs">AI {(b.aiProb*100).toFixed(0)}% / 市場 {(b.marketProb*100).toFixed(0)}% (×{b.ratio.toFixed(2)}) — オッズ {b.odds.toFixed(1)} EV {b.ev.toFixed(2)}</span>

            <ul className="text-sm mt-2 space-y-1">
              {market.sleepers.map((b,i)=>(
                <li key={i}>
                  <b>{b.boatNo}号艇</b> {b.racer}<br/>

                </li>

      </div>

      {/* 妙味なし買い目 */}
      {market.noValueTickets.length > 0 && (
        <div className="mt-4">

              <tbody>
                {market.noValueTickets.map((t,i)=>(
                  <tr key={i}>
                    <td>{t.kind}</td>

      )}

      {market.strongButNoValue && (
        <div className="alert mt-3">
          ⚠ <b>本命は強いが妙味なしレース</b>: {market.popFavIdx+1}号艇のAI勝率は{(market.marketProbs[market.popFavIdx]>0?market.perBoat[market.popFavIdx].aiProb*100:0).toFixed(0)}%と高いものの、単勝EV {market.perBoat[market.popFavIdx].ev.toFixed(2)} で控除率を超えられません。「当たりそう」だけで買うと長期回収率はマイナス確実です。
        </div>
      )}
    </section>
  );
}

/* ========== 文脈フラグ・エディタ (RaceView 内で使用) ========== */
function RaceFlagsEditor({ race, raceFlags, setRaceFlags, flagLog }) {
  const current = raceFlags[race.id] || [];
  function toggle(key) {
    const next = current.includes(key) ? current.filter(k => k !== key) : [...current, key];
    setRaceFlags({...raceFlags, [race.id]: next});
  }
  function clearAll() { setRaceFlags({...raceFlags, [race.id]: []}); }

  // フラグ間の整合性ヒント
  const conflictHints = [];
  if (current.includes("inner_friendly") && current.includes("makuri_caution")) {
    conflictHints.push("「イン有利水面」と「まくり警戒水面」が両方ON — 最終的なスコア補正が打ち消される傾向");
  }
  if (current.includes("yusho") && current.includes("shouka")) {
    conflictHints.push("「優勝戦」と「消化レース」は両立しません — どちらか一方を外してください");
  }

  return (
    <section className="card p-4">
      <div className="flex items-center justify-between mb-2">
        <h3 className="font-bold">🏁 文脈フラグ (このレースの設定)</h3>
        {current.length>0 && <button className="btn btn-ghost text-xs" onClick={clearAll}>すべて解除</button>}
      </div>
      <div className="hint mb-3 text-xs">
        各レースの状況を反映して、予想スコア・AI信頼度・買い/見送り判断に補正を入れます。<b>選手心理や水面特性などデータだけでは見えない要素を、AIに教えてあげる役割</b>です。複数同時ON可能。
      </div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
        {Object.entries(CONTEXT_FLAGS).map(([k, def])=>{
          const active = current.includes(k);
          return (
            <button key={k}
              className={"btn text-left " + (active?"btn-primary":"btn-ghost")}
              style={{whiteSpace:"normal", lineHeight:1.3}}
              onClick={()=>toggle(k)}>
              <div className="flex items-center gap-2">
                <span style={{fontSize:18}}>{def.icon}</span>
                <span className="font-bold text-sm">{def.label}</span>
              </div>
              <div className="text-xs opacity-80 mt-1">{def.desc}</div>
            </button>
          );
        })}
      </div>

      {conflictHints.length>0 && (
        <div className="alert mt-3 text-xs">
          {conflictHints.map((c,i)=><div key={i}>⚠ {c}</div>)}
        </div>
      )}

      {/* 適用中のフラグ詳細 */}
      {current.length>0 && (
        <div className="mt-4">
          <h4 className="text-sm font-bold mb-2">適用中のフラグと補正内容</h4>
          {flagLog.length === 0 ? (
            <div className="hint text-xs">スコア補正の対象艇はいません (信頼度のみ補正されている可能性)</div>
          ) : (
            <div className="overflow-x-auto scrollbar">
            <table>
              <thead><tr><th>フラグ</th><th>補正対象艇</th><th>補正率</th></tr></thead>
              <tbody>
                {flagLog.map((entry,i)=>(
                  <tr key={i}>
                    <td className="font-bold">{CONTEXT_FLAGS[entry.flag]?.icon} {entry.label}</td>
                    <td>
                      {Object.entries(entry.perBoat).map(([boatNo, pct])=>(
                        <span key={boatNo} className={"pill mr-1 " + (pct>=0?"badge-buy":"badge-ooana")}>
                          {boatNo}号艇 {pct>=0?"+":""}{pct.toFixed(1)}%
                        </span>
                      ))}
                    </td>
                    <td className="text-xs hint">
                      {Object.values(entry.perBoat).length>0
                        ? `平均 ${(Object.values(entry.perBoat).reduce((a,b)=>a+b,0)/Object.values(entry.perBoat).length).toFixed(1)}%`
                        : "—"}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            </div>
          )}
          {/* 信頼度・スキップへの影響を文章で */}
          <div className="info text-xs mt-3">
            {current.includes("shouka") && <div>💤 消化レース: AI信頼度 -20 / EV&lt;1.20 で見送り推奨を強化</div>}
            {current.includes("yusho") && <div>🏆 優勝戦: AI信頼度 +8 / 攻め型のEV閾値を1.20以上に引上げ・大穴(オッズ50倍超)を除外</div>}
            {current.includes("junyusho") && <div>🥈 準優勝戦: 攻め型を中穴中心 (EV≧1.15、オッズ7倍以上) に再構築</div>}
            {current.includes("volatile") && <div>🌊 荒れやすい会場: 信頼度 -8 / 上位艇スコア -8%, 下位艇 +5〜10%</div>}
            {current.includes("fixed_lane") && <div>🔒 進入固定: 信頼度 +5 / 1号艇のスコア +7%</div>}
            {current.includes("makuri_caution") && <div>⚡ まくり警戒: 信頼度 -4 / 2-4号艇のスコア +8〜10%</div>}
          </div>
        </div>
      )}
    </section>
  );
}

/* ========== レース予想画面 (大幅強化) ========== */
function RaceView({ race, evalRes, races, onSelect, selectedId, settings, bankroll, lossStreak, decisions, setDecisions, bets, setBets, remainingDaily, money, raceFlags, setRaceFlags, raceComments, setRaceComments, setRaces }) {
  if (!race || !evalRes) return <div className="mt-4 hint">レースが見つかりません。</div>;
  const { pred, sorted, recommended, reasons, skip, skipReasons, maxEV, strategies } = evalRes;
  const winProbsPct = pred.winProbs.map(p => +(p*100).toFixed(1));

  /* 実データ (jcd 付き) のレースを開いたとき、出走表とオッズを並列取得して反映 */
  useEffect(() => {
    if (!race || !race.jcd) return;
    let cancelled = false;
    Promise.all([fetchRaceProgram(race), fetchRaceOdds(race)]).then(([prog, odds]) => {
      if (cancelled) return;
      const ts = new Date().toISOString();
      setRaces && setRaces(prev => prev.map(r => {
        if (r.id !== race.id) return r;
        let next = {...r, updatedAt: ts};
        // 出走表 (選手・勝率・モーター/ボート 2連率) を実データで上書き
        if (prog && Array.isArray(prog.boats) && prog.boats.length > 0) {
          next = {
            ...next,
            boats: mergeRealBoats(r.boats, prog.boats),
            weather: prog.weather || r.weather,
            wind:    prog.wind ?? r.wind,
            windDir: prog.windDir || r.windDir,
            wave:    prog.wave ?? r.wave,
            startTime: prog.startTime || r.startTime,
            apiProgram: prog,
            exhibitionUpdatedAt: ts,
            sourceMode: "real",
          };
        }
        // オッズ (前回比較用に prevOdds に退避してから currentWinOdds 更新)
        if (odds && odds.win && Object.keys(odds.win).length > 0) {
          const arr = next.boats.map(b => +odds.win[String(b.boatNo)] || null);
          next = {
            ...next,
            prevOdds: r.currentWinOdds || r.prevOdds || null,
            currentWinOdds: arr,
            apiOdds: odds,
            oddsUpdatedAt: ts,
          };
        }
        return next;
      }));
    });
    return () => { cancelled = true; };
  }, [race?.id]);

  const positives = reasons.filter(r=>r.type==="pos");
  const negatives = reasons.filter(r=>r.type==="neg");
  const neutrals  = reasons.filter(r=>r.type==="neutral");

  function decide(combo, kind, accept, stake, odds, prob, ev, strategy) {
    const key = `${race.id}|${kind}|${combo}|${strategy}`;
    setDecisions({...decisions, [key]: accept ? "bought" : "skip"});
    if (accept) {
      setBets([...bets, {
        id: Math.random().toString(36).slice(2,10),
        date: race.date, raceId: race.id, venue: race.venue, raceNo: race.raceNo,
        kind, combo, stake, odds, prob, ev, strategy, result:"pending",
        virtual: !!settings.virtualMode,  // 仮想モード ON なら virtual: true で記録
      }]);
    }
  }

  // 寄与度比較用 (本命艇)
  const top1Idx = pred.winProbs.indexOf(Math.max(...pred.winProbs));
  const topBreakdown = pred.breakdown[top1Idx].factors;
  const factorChartData = Object.entries(topBreakdown).map(([k,v])=>({factor:k, 寄与度:+v.toFixed(3)}));

  const cg = evalRes.conditionGate || { level:"WAIT", icon:"⏳", reasons:[], score:0, matches:[] };
  const cgColor = cg.level==="GO" ? "bg-[#053527] border-emerald-500" :
                  cg.level==="CAUTION" ? "bg-[#3a2d0a] border-amber-500" :
                  cg.level==="SKIP" ? "bg-[#3b1d1d] border-rose-500" :
                  "bg-[#0e2440] border-blue-500";
  const [showDetails, setShowDetails] = useState(false);
  const timing = calcRaceTiming(race, evalRes);
  const action = computeNextAction(race, evalRes, timing);

  return (
    <div className="space-y-4 mt-4">
      {/* 勝負条件AI 大判定バッジ */}
      <section className={"card p-4 border-2 " + cgColor}>
        <div className="flex items-center gap-4 flex-wrap">
          <div style={{fontSize:48}}>{cg.icon}</div>
          <div className="flex-1">
            <div className="text-xs uppercase tracking-widest opacity-80">勝負条件AI 判定</div>
            <div className="text-3xl font-black">{cg.level}
              <span className="text-base font-normal opacity-80 ml-2">
                {cg.level==="GO"      && "勝負条件に一致"}
                {cg.level==="CAUTION" && "条件は弱い (要慎重)"}
                {cg.level==="SKIP"    && "勝負条件外 (見送り)"}
                {cg.level==="WAIT"    && "データ不足・鮮度不足 (確認待ち)"}
              </span>
            </div>
            {cg.reasons.length>0 && <div className="text-sm mt-1 opacity-90">{cg.reasons.join(" / ")}</div>}
            {cg.matches.length>0 && (
              <div className="text-xs mt-2 flex flex-wrap gap-1">
                {cg.matches.map((m,i) => (
                  <span key={i} className={"pill " + (m.roi>=1.10?"badge-buy":(m.roi<=0.90?"badge-ooana":"badge-warn"))}>
                    {m.dim}={m.key} ROI {(m.roi*100).toFixed(0)}% (n={m.n})
                  </span>
                ))}
              </div>
            )}
          </div>
        </div>
        {/* 今やること (1行・大きめ) */}
        <div className="mt-4 p-4 rounded-lg" style={{background:"rgba(0,0,0,0.3)"}}>
          <div className="flex items-center justify-between mb-1 flex-wrap gap-2">
            <div className="text-xs uppercase tracking-widest opacity-80">📍 今やること</div>
            {action.urgency && (
              <span style={{
                background: action.urgency==="今すぐ"?"#ef4444":action.urgency==="5分以内"?"#f59e0b":"#3b82f6",
                color: action.urgency==="5分以内"?"#1e293b":"#fff",
                padding:"3px 10px", borderRadius:999, fontSize:11, fontWeight:800,
                animation: action.urgency==="今すぐ"?"pulse 1.5s infinite":"none"
              }}>⚡ {action.urgency}</span>
            )}
          </div>
          <div style={{fontSize:24, fontWeight:900, lineHeight:1.2}}>{action.headline}</div>
          {action.reason && action.reason !== "—" && (
            <div style={{fontSize:13, marginTop:6, fontWeight:600, opacity:0.95}}>
              👉 {action.reason}
            </div>
          )}
          {action.subtext && <div className="text-sm opacity-80 mt-1">{action.subtext}</div>}
        </div>
        <div className="hint text-xs mt-3">
          このAIの目的は「当てること」ではなく、長期回収率が高い条件だけを選ぶこと。<b>SKIP判定のレースは、たとえ当たりそうでも見送り</b>になります。
        </div>
      </section>

      {/* 詳しく見る切替 */}
      <div className="text-center">
        <button className="btn btn-ghost text-sm" onClick={()=>setShowDetails(!showDetails)}>
          {showDetails ? "🔼 シンプル表示に戻す" : "🔽 詳しく見る (出走表/分析データ/補正値)"}
        </button>
      </div>

      <section className="card p-4">
        <div className="flex flex-wrap items-center gap-3 justify-between">
          <div>
            <h2 className="text-lg font-bold">{race.venue} {race.raceNo}R <span className="text-slate-400 font-normal">{race.startTime} 発走 / {race.date}</span></h2>
            <div className="hint mt-1">{race.weather} ・ 風 {race.wind}m {race.windDir} ・ 波高 {race.wave}cm</div>
          </div>
          <select className="select max-w-xs" value={selectedId} onChange={e=>onSelect(e.target.value)}>
            {races.map(r => <option key={r.id} value={r.id}>{r.venue} {r.raceNo}R ({r.startTime})</option>)}
          </select>
        </div>

        {/* AI信頼度バッジ */}
        <div className="mt-4 flex items-center gap-3 flex-wrap">
          <span className="hint">AI信頼度:</span>
          <span className={"pill conf-"+evalRes.confidence.level + " text-sm px-3"}>
            {evalRes.confidence.level} ({evalRes.confidence.score}/100)
          </span>
          <div className="flex-1 hint text-xs">
            {evalRes.confidence.reasons.slice(0,4).map((r,i)=>(
              <span key={i} className={"mr-2 " + (r.type==="pos"?"text-emerald-400":(r.type==="neg"?"text-rose-400":""))}>
                {r.type==="pos"?"✅":(r.type==="neg"?"⚠️":"・")} {r.text}
              </span>
            ))}
          </div>
        </div>

        {/* データ鮮度バッジ + リフレッシュ */}
        <div className="mt-3 flex items-center gap-3 flex-wrap p-2 rounded bg-[#0f1830] border border-[#243154]">
          <span className="hint text-xs">データ鮮度:</span>
          <span className={"pill " + (
            evalRes.freshness.level==="最新"?"badge-buy":
            evalRes.freshness.level==="やや古い"?"badge-warn":
            evalRes.freshness.level==="古い"?"badge-chuana":
            "badge-ooana")}>
            {evalRes.freshness.level} ({evalRes.freshness.score}/100)
          </span>
          <span className="hint text-xs">{evalRes.freshness.message}</span>
          <span className="hint text-xs ml-auto">
            {race.exhibitionUpdatedAt && <>直前情報: {new Date(race.exhibitionUpdatedAt).toLocaleTimeString()} </>}
            {race.oddsUpdatedAt && <>/ オッズ: {new Date(race.oddsUpdatedAt).toLocaleTimeString()}</>}
          </span>
          <button className="btn btn-ghost text-xs" onClick={()=>{
            // 直前情報・オッズのタイムスタンプだけを「今」に更新 (ユーザーが手動で更新したことを記録)
            setRaces(prev => prev.map(r => r.id===race.id ? {
              ...r,
              exhibitionUpdatedAt: new Date().toISOString(),
              oddsUpdatedAt: new Date().toISOString(),
              updatedAt: new Date().toISOString(),
              prevOdds: race.currentWinOdds || (evalRes.pred.winOdds),
              currentWinOdds: evalRes.pred.winOdds,
            } : r));
          }}>🔄 直前情報を取込済にする</button>
        </div>

        {evalRes.freshness.oddsAlerts.length > 0 && (
          <div className="alert mt-2 text-xs">
            ⚠ 直前オッズ変動警告:
            <ul className="list-disc pl-5 mt-1">
              {evalRes.freshness.oddsAlerts.map((a,i)=><li key={i}>{a}</li>)}
            </ul>
          </div>
        )}

        {/* 総合判定 */}
        <div className="mt-4">
          {money.forcedSkip ? (
            <div className="lock-banner">🔒 本日は強制見送りモード: {money.reasons.join(" / ")}</div>
          ) : evalRes.awaiting ? (
            <div className="alert">
              <b>⏳ このレースは「確認待ち」です</b> — 直前情報またはオッズが未取得 ({evalRes.freshness.message})。
              データを更新してから再判定してください。購入候補としては推奨しません。
            </div>
          ) : skip ? (
            <div className="warn">
              <b>このレースは「見送り」推奨です</b>
              <ul className="list-disc pl-5 mt-1">{skipReasons.map((r,i)=><li key={i}>{r}</li>)}</ul>
            </div>
          ) : (
            <div className="ok">
              <b>このレースは「候補あり」</b> — 最高EV {maxEV.toFixed(2)}。下記の戦略から人間が最終判断してください。
            </div>
          )}
        </div>
      </section>

      {showDetails && (<>
      {/* 文脈フラグ */}
      <RaceFlagsEditor race={race} raceFlags={raceFlags} setRaceFlags={setRaceFlags} flagLog={pred.flagLog}/>

      {/* 選手コメント */}
      <RaceCommentsEditor race={race} raceComments={raceComments} setRaceComments={setRaceComments}

function StrategyCard({ sKey, s, race, settings, bankroll, lossStreak, money, remainingDaily, decisions, onDecide, gateLevel, awaiting }) {
  // 勝負条件AIによる強制制御
  const blocked = gateLevel === "SKIP" || awaiting === true;
  const blockReason = gateLevel === "SKIP" ? "🔴 SKIP — 勝負条件外につき買い目は提示しません"
                    : awaiting             ? "⏳ WAIT — データ不足/鮮度不足。確認待ちです"
                    : null;
  return (
    <div className={"strategy-card " + sKey}>
      <div className="font-bold text-base mb-1">{s.label}</div>
      <div className="hint mb-3">{s.desc}</div>
      {blocked ? <div className="warn text-xs">{blockReason}</div>
      : s.picks.length===0 ? <div className="info text-xs">条件を満たす買い目はありません</div> : (
        <div className="space-y-2">
          {s.picks.map((t,i)=>{
            const cls = classifyTicket(t.odds);
            const stake = recommendStake(bankroll, settings, lossStreak, t.ev, t.prob, s.allocPct, money);
            const cap = Math.min(stake, remainingDaily, settings.perRaceLimit);
            const risks = ticketRisk(t, race);
            const key = `${race.id}|${t.kind}|${t.combo}|${sKey}`;
            const status = decisions[key];
            return (
              <div key={i} className="p-2 rounded bg-[#0f1830] border border-[#1f2a44]">
                <div className="flex items-center justify-between mb-1">
                  <div className="text-xs hint">{t.kind}</div>
                  <span className={"pill "+cls.cls}>{cls.label}</span>
                </div>
                <div className="font-mono text-lg font-bold">{t.combo}</div>
                <div className="text-xs hint">確率 {(t.prob*100).toFixed(2)}% / オッズ {t.odds.toFixed(1)}</div>
                <div className={"text-sm font-bold " + (t.ev>=1?"ev-pos":"ev-neg")}>EV {t.ev.toFixed(2)}</div>
                <div className="text-xs mt-1">推奨 <span className="num font-bold">¥{cap.toLocaleString()}</span> {money.forcedSkip && <span className="pill badge-skip ml-1">強制見送り</span>}</div>
                {risks.length>0 && (
                  <div className="alert mt-1 text-xs">
                    ⚠ {risks.join(" / ")}
                  </div>
                )}
                <div className="mt-2">
                  {status === "bought" ? <span className="pill badge-buy">購入予定 (要手動操作)</span>
                  : status === "skip"  ? <span className="pill badge-skip">見送り</span>
                  : (
                    <div className="flex gap-1">
                      <button className={"btn text-xs " + (settings.virtualMode?"btn-primary":"btn-success")} disabled={cap<=0||money.forcedSkip||blocked}
                        onClick={()=>onDecide(t.combo, t.kind, true, cap, t.odds, t.prob, t.ev, sKey)}>
                        {settings.virtualMode ? "🧪 仮想で記録" : "購入候補"}
                      </button>
                      <button className="btn btn-ghost text-xs"
                        onClick={()=>onDecide(t.combo, t.kind, false, 0, t.odds, t.prob, t.ev, sKey)}>見送り</button>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}
