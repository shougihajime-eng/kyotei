function PreviewStakeCalc({ settings, lossStreak, money }) {
  const cases = [
    {label:"本命・低EV (p=40%, ev=0.95)", p:0.40, ev:0.95, alloc:0.7},
    {label:"本命・適正EV (p=35%, ev=1.20)", p:0.35, ev:1.20, alloc:0.7},
    {label:"中穴 (p=8%, ev=1.40)", p:0.08, ev:1.40, alloc:0.45},
    {label:"大穴 (p=2%, ev=1.60)", p:0.02, ev:1.60, alloc:0.25},
  ];
  return (
    <table>
      <thead><tr><th>ケース</th><th>戦略配分</th><th>推奨ベット</th><th>備考</th></tr></thead>
      <tbody>
      {cases.map((c,i)=>{
        const stake = recommendStake(settings.bankroll, settings, lossStreak, c.ev, c.p, c.alloc, money);
        let note = "半ケリー × 戦略配分 × 連敗ペナルティ × 上限";
        if (c.ev<settings.evMin) note = "EV不足のためゼロ";
        if (money.forcedSkip) note = "強制見送り中のためゼロ";
        return <tr key={i}><td>{c.label}</td><td>×{c.alloc}</td><td className="num">¥{stake.toLocaleString()}</td><td className="hint">{note}</td></tr>;
      })}
      </tbody>
    </table>
  );
}

/* ========== 収支管理 ========== */
function LedgerView({ bets, setBets, setLossStreak }) {
  function remove(id) { setBets(bets.filter(b => b.id!==id)); }
  function settle(id, hit) {
    setBets(prev => prev.map(b => b.id===id ? {...b, result: hit?"hit":"miss"} : b));
    setLossStreak(prev => hit ? 0 : prev+1);
  }
  const summary = useMemo(()=>{
    const s = {stake:0, ret:0, count:0, hits:0};
    bets.forEach(b => { s.stake+=b.stake; s.ret += (b.result==="hit"?b.stake*b.odds:0); s.count++; s.hits+=(b.result==="hit"?1:0); });
    s.roi = s.stake? s.ret/s.stake : 0;
    s.hitRate = s.count? s.hits/s.count : 0;
    return s;
  },[bets]);

  const cum = useMemo(()=>{
    const sorted = [...bets].sort((a,b)=>a.date.localeCompare(b.date));
    let cumPnL = 0;
    return sorted.map((b,i)=>{
      const pnl = (b.result==="hit"? b.stake*b.odds - b.stake : -b.stake);
      cumPnL += pnl;
      return { idx: i+1, 日付: b.date, 累計収支: Math.round(cumPnL) };
    });
  }, [bets]);

  return (
    <div className="space-y-4 mt-4">
      <div className="grid-cards">
        <Kpi label="累計購入額" value={`¥${summary.stake.toLocaleString()}`} />
        <Kpi label="累計払戻" value={`¥${Math.round(summary.ret).toLocaleString()}`} />
        <Kpi label="回収率 ROI" value={summary.stake? (summary.roi*100).toFixed(1)+"%" : "—"}
             sub={summary.roi>=1 ? "プラス収支" : "マイナス収支 (公営の構造上、通常)"}/>
        <Kpi label="的中率" value={summary.count? (summary.hitRate*100).toFixed(1)+"%" : "—"} />
      </div>

      <section className="card p-4">
        <h3 className="font-bold mb-3">累計収支の推移</h3>
        <div style={{height:240}}>
          <ResponsiveContainer>
            <AreaChart data={cum}>
              <defs><linearGradient id="g" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stopColor="#22d3ee" stopOpacity={0.6}/><stop offset="100%" stopColor="#22d3ee" stopOpacity={0}/></linearGradient></defs>
              <CartesianGrid stroke="#1f2a44" strokeDasharray="3 3"/>
              <XAxis dataKey="idx" stroke="#9fb0c9"/><YAxis stroke="#9fb0c9"/>
              <Tooltip contentStyle={{background:"#121a2c",border:"1px solid #243154"}}/>
              <ReferenceLine y={0} stroke="#f87171"/>
              <Area type="monotone" dataKey="累計収支" stroke="#22d3ee" fill="url(#g)"/>
            </AreaChart>
          </ResponsiveContainer>
        </div>
      </section>

      <section className="card p-4">
        <div className="flex items-center justify-between mb-3">
          <h3 className="font-bold">購入記録</h3>
          <span className="hint">「的中/外れ」を入力すると累計と連敗カウンタが更新されます。</span>
        </div>
        {bets.length===0 ? <div className="info">まだ記録がありません。レース予想画面で「購入候補」した後、実購入後に結果を入力してください。</div>
        : (
        <div className="overflow-x-auto scrollbar">
        <table>
          <thead><tr>
            <th>日付</th><th>会場/R</th><th>戦略</th><th>種別</th><th>買い目</th><th>金額</th><th>オッズ</th><th>EV</th><th>結果</th><th></th>
          </tr></thead>
          <tbody>
            {bets.map(b=>(
              <tr key={b.id}>
                <td className="num">{b.date}</td>
                <td>{b.venue} {b.raceNo}R</td>
                <td className="hint">{b.strategy||"—"}</td>
                <td>{b.kind}</td>
                <td className="font-mono">{b.combo}</td>
                <td className="num">¥{b.stake.toLocaleString()}</td>
                <td className="num">{b.odds}</td>
                <td className={"num " + (b.ev>=1?"ev-pos":"ev-neg")}>{b.ev.toFixed(2)}</td>
                <td>
                  {b.result==="hit" && <span className="pill badge-buy">的中</span>}
                  {b.result==="miss" && <span className="pill badge-ooana">外れ</span>}
                  {b.result==="pending" && <span className="pill badge-skip">未確定</span>}
                </td>
                <td className="flex gap-1">
                  <button className="btn btn-success" onClick={()=>settle(b.id,true)}>的中</button>
                  <button className="btn btn-danger"  onClick={()=>settle(b.id,false)}>外れ</button>
                  <button className="btn btn-ghost"   onClick={()=>remove(b.id)}>削除</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        </div>
        )}
      </section>
    </div>
  );
}

/* ========== バックテスト (強化) ========== */
function BacktestView({ weights }) {
  const [iter, setIter] = useState(500);
  const [evMin, setEvMin] = useState(1.10);
  const [perBet, setPerBet] = useState(500);
  const [strategy, setStrategy] = useState("balanced");
  const [result, setResult] = useState(null);
  const [running, setRunning] = useState(false);

  function run() {
    setRunning(true);
    setTimeout(()=>{
      const r = seedRand(Date.now() & 0xffffffff);
      let stake=0, ret=0, count=0, hits=0;
      let cum = 0; const curve = [];
      let maxDD = 0, peak = 0;
      let lossStreak = 0, maxLossStreak = 0;
      let racesAnalyzed = 0, racesSkipped = 0, racesPlayed = 0;
      let raceStakes = 0, raceRets = 0; // 買ったレースだけの集計

      for (let i=0;i<iter;i++) {
        const race = generateRaces("BT")[Math.floor(r()*24)];
        const e = evaluateRace(race, {evMin, weights: weights||DEFAULT_WEIGHTS});
        racesAnalyzed++;
        if (e.skip) { racesSkipped++; continue; }
        const tickets = e.strategies[strategy].picks.filter(t => t.ev >= evMin);
        if (tickets.length === 0) { racesSkipped++; continue; }
        racesPlayed++;
        let raceStake=0, raceRet=0;
        for (const t of tickets) {
          // ノイズを加えて真確率を生成
          const trueP = Math.max(0.001, Math.min(0.99, t.prob * (0.7 + r()*0.6)));
          const win = r() < trueP;
          stake += perBet; raceStake += perBet; count++;
          if (win) { ret += perBet*t.odds; raceRet += perBet*t.odds; hits++; lossStreak=0; }
          else     { lossStreak++; maxLossStreak = Math.max(maxLossStreak, lossStreak); }
          cum = ret - stake;
          peak = Math.max(peak, cum);
          maxDD = Math.min(maxDD, cum - peak);
          curve.push({n: count, 累計収支: Math.round(cum)});
        }
        raceStakes += raceStake; raceRets += raceRet;
      }
      setResult({
        stake, ret, count, hits,
        roi: stake?ret/stake:0, hitRate: count?hits/count:0, curve, maxDD, maxLossStreak,
        racesAnalyzed, racesSkipped, racesPlayed,
        raceROI: raceStakes? raceRets/raceStakes : 0,
        avgPerRace: racesPlayed? Math.round(raceStakes/racesPlayed) : 0,
      });
      setRunning(false);
    }, 30);
  }

  return (
    <div className="space-y-4 mt-4">
      <section className="card p-4">
        <h2 className="text-lg font-bold mb-3">バックテスト (合成データ)</h2>
        <div className="info mb-3">「EV閾値・買い目戦略・1点ベットを変えると、ランダムノイズ込みの長期収支がどう変わるか」を体感するためのシミュレータです。本MVPはサンプルデータのため、結果は厳密な実証ではなく感覚値です。実データを取り込めば本物の検証が可能になります。</div>
        <div className="grid grid-cols-1 md:grid-cols-4 gap-3">
          <div><label className="hint">試行レース数</label><input className="input" type="number" value={iter} onChange={e=>setIter(+e.target.value)}/></div>
          <div><label className="hint">EV閾値</label><input className="input" type="number" step="0.05" value={evMin} onChange={e=>setEvMin(+e.target.value)}/></div>
          <div><label className="hint">1点あたり購入額</label><input className="input" type="number" value={perBet} onChange={e=>setPerBet(+e.target.value)}/></div>
          <div><label className="hint">戦略</label>
            <select className="select" value={strategy} onChange={e=>setStrategy(e.target.value)}>
              <option value="steady">堅実型</option>
              <option value="balanced">バランス型</option>
              <option value="aggressive">攻め型</option>
            </select>
          </div>
        </div>
        <div className="mt-3"><button className="btn btn-primary" onClick={run} disabled={running}>{running?"実行中...":"バックテスト実行"}</button></div>
      </section>
      {result && (
        <section className="card p-4">
          <h3 className="font-bold mb-3">結果サマリ</h3>
          <div className="grid-cards">
            <Kpi label="解析レース数" value={result.racesAnalyzed.toLocaleString()}/>
            <Kpi label="買ったレース数" value={result.racesPlayed.toLocaleString()} sub={`実購入 ${result.count}件`}/>
            <Kpi label="見送ったレース数" value={result.racesSkipped.toLocaleString()} sub={`見送り率 ${(result.racesSkipped/result.racesAnalyzed*100).toFixed(0)}%`}/>
            <Kpi label="購入総額" value={`¥${result.stake.toLocaleString()}`}/>
            <Kpi label="払戻総額" value={`¥${Math.round(result.ret).toLocaleString()}`}/>
            <Kpi label="回収率 ROI (全体)" value={(result.roi*100).toFixed(1)+"%"} sub={result.roi>=1?"理論上プラス":"理論上マイナス"} highlight={result.roi>=1}/>
            <Kpi label="買ったレース基準 ROI" value={(result.raceROI*100).toFixed(1)+"%"} sub={`1レース平均 ¥${result.avgPerRace.toLocaleString()}`}/>
            <Kpi label="的中率" value={(result.hitRate*100).toFixed(1)+"%"}/>
            <Kpi label="最大連敗" value={`${result.maxLossStreak} 連敗`} highlight={result.maxLossStreak>=8}/>
            <Kpi label="最大ドローダウン" value={`¥${Math.round(result.maxDD).toLocaleString()}`} highlight={result.maxDD<-result.stake*0.3}/>
          </div>
          <div style={{height:280}} className="mt-4">
            <ResponsiveContainer>
              <LineChart data={result.curve}>
                <CartesianGrid stroke="#1f2a44" strokeDasharray="3 3"/>
                <XAxis dataKey="n" stroke="#9fb0c9"/><YAxis stroke="#9fb0c9"/>
                <Tooltip contentStyle={{background:"#121a2c",border:"1px solid #243154"}}/>
                <ReferenceLine y={0} stroke="#f87171"/>
                <Line type="monotone" dataKey="累計収支" stroke="#22d3ee" dot={false}/>
              </LineChart>
            </ResponsiveContainer>
          </div>
          <div className="info mt-3 text-xs">
            読み方: <b>買ったレース基準ROI</b>は「見送らずに買ったレースだけ」での回収率です。<b>全体ROI</b>と乖離が大きければ、見送り判定が機能しています。最大連敗・最大DDは「実際にいくら失う覚悟が必要か」の感覚値です。
          </div>
        </section>
      )}
    </div>
  );
}

/* ========== データ取込 ========== */
function ImportView({ setRaces }) {
  const [json, setJson] = useState("");
  const [err, setErr] = useState("");
  const [ok, setOk] = useState("");
  const [validation, setValidation] = useState(null); // {errors,warnings,proposedData}

  function loadSample() {
    setRaces(generateRaces(TODAY));
    setOk("サンプルデータを再生成しました。"); setErr(""); setValidation(null);
  }

  function tryLoadJson() {
    setErr(""); setOk(""); setValidation(null);
    let data;
    try { data = JSON.parse(json); }
    catch(e) { setErr("JSON のパースに失敗: " + e.message); return; }
    const v = validateRaces(data);
    setValidation({...v, proposedData:data, source:"JSON"});
  }

  function tryLoadCsvFile(ev) {
    setErr(""); setOk(""); setValidation(null);
    const f = ev.target.files[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const text = reader.result;
        const rows = text.split(/\r?\n/).filter(Boolean);
        const head = rows.shift().split(",");
        const idx = {}; head.forEach((h,i)=> idx[h.trim()] = i);
        const grouped = {};
        rows.forEach(line => {
          const c = line.split(",");
          const id = c[idx.race_id];
          if (!grouped[id]) grouped[id] = {
            id, date: TODAY, venue: c[idx.venue], raceNo: +c[idx.raceNo],
            startTime: c[idx.startTime], weather: c[idx.weather],
            wind: +c[idx.wind], windDir: c[idx.windDir], wave: +c[idx.wave], boats: []
          };
          // 任意の拡張カラム (空欄なら未入力扱い)
          const opt = (key, conv = v => +v) => idx[key] != null && c[idx[key]] != null && c[idx[key]] !== "" ? conv(c[idx[key]]) : null;
          const optArr = (key) => idx[key] != null && c[idx[key]] != null && c[idx[key]] !== "" ? String(c[idx[key]]).split(/[|;]/).map(s => +s).filter(n=>!isNaN(n)) : null;
          const optList = (key) => idx[key] != null && c[idx[key]] != null && c[idx[key]] !== "" ? String(c[idx[key]]).split(/[|;]/) : null;

          grouped[id].boats.push({
            boatNo: +c[idx.boatNo], racer: c[idx.racer], class: c[idx.class],
            winRate: +c[idx.winRate], placeRate: +c[idx.placeRate],
            motor2: +c[idx.motor2], boat2: +c[idx.boat2],
            exTime: +c[idx.exTime], ST: +c[idx.ST],
            courseWinPct: +c[idx.courseWinPct], weight: +(c[idx.weight]||0),
            // 拡張データ (任意 — 空欄ならnull)
            localWinRate:    opt("localWinRate"),
            localPlaceRate:  opt("localPlaceRate"),
            tilt:            opt("tilt"),
            partsExchange:   optList("partsExchange") || [],
            prevResults:     optArr("prevResults"),
            thisSeriesResults: optArr("thisSeriesResults"),
            entryHistory:    optArr("entryHistory"),
            startExhibition: opt("startExhibition"),
            lapExhibition:   opt("lapExhibition"),
            exhibitionNote:  idx.exhibitionNote != null ? c[idx.exhibitionNote] : "",
            // レーサー履歴データ (任意)
            regNo:           opt("regNo"),
            prevClass:       idx.prevClass != null && c[idx.prevClass] ? c[idx.prevClass] : null,
            prevPrevClass:   idx.prevPrevClass != null && c[idx.prevPrevClass] ? c[idx.prevPrevClass] : null,
            everA1:          idx.everA1 != null ? (c[idx.everA1]==="true" || c[idx.everA1]==="1") : null,
            everA:           idx.everA != null ? (c[idx.everA]==="true" || c[idx.everA]==="1") : null,
            recentWinRate:   opt("recentWinRate"),
            accidentRate:    opt("accidentRate"),
            flState:         optList("flState") || [],
            last3SeriesResults: optArr("last3SeriesResults"),
            branch:          idx.branch != null && c[idx.branch] ? c[idx.branch] : null,
            courseStats:     idx.courseStats != null && c[idx.courseStats] ? (() => {
              try {
                const v = c[idx.courseStats];
                if (v.includes(":") || v.includes("=")) {
                  // "1:55|2:16|3:12|..." 形式
                  const obj = {};
                  v.split(/[|;]/).forEach(pair => {
                    const [k,val] = pair.split(/[:=]/);
                    if (k && val) obj[k.trim()] = +val;
                  });
                  return obj;
                }
                return JSON.parse(v);
              } catch(e) { return null; }
            })() : null,
          });
        });
        const arr = Object.values(grouped);
        arr.forEach(r => r.boats.sort((a,b)=>a.boatNo-b.boatNo));
        const v = validateRaces(arr);
        setValidation({...v, proposedData:arr, source:"CSV"});
      } catch(e) { setErr("CSV解析に失敗: " + e.message); }
    };
    reader.readAsText(f);
  }

  function applyImport(force) {
    if (!validation) return;
    if (validation.errors.length > 0 && !force) {
      setErr("致命的エラーがあります。修正してください。");
      return;
    }
    setRaces(validation.proposedData);
    setOk(`${validation.proposedData.length} レースを取り込みました (${validation.source})${validation.warnings.length>0?` ※警告 ${validation.warnings.length}件あり`:""}`);
    setValidation(null);
  }

  const sampleSchema = `[
  {
    "id": "R001",
    "date": "${TODAY}",
    "venue": "尼崎",
    "raceNo": 1,
    "startTime": "10:30",
    "weather": "晴",
    "wind": 2.1,
    "windDir": "追い風",
    "wave": 3,
    "boats": [
      {"boatNo":1,"racer":"鈴木 太郎","class":"A1","winRate":7.05,"placeRate":48.2,"motor2":42.1,"boat2":36.0,"exTime":6.74,"ST":0.14,"courseWinPct":55.0,"weight":52.0}
    ]
  }
]`;

  return (
    <div className="space-y-4 mt-4">
      <section className="card p-4">
        <h2 className="text-lg font-bold mb-2">データ取込</h2>
        <div className="info mb-3">
          実データを取り込む方法は3通りです。取り込む前に<b>データ品質チェック</b>が自動実行され、致命的エラー (id 重複・艇番欠落など) があれば取り込みをブロックします。
          <ol className="list-decimal pl-6 mt-2 space-y-1">
            <li><b>サンプル再生成</b> — 動作確認用</li>
            <li><b>JSON / CSV 取り込み</b> — 公式サイトから自分でダウンロード・整形して投入。規約違反のスクレイピング処理は含みません。</li>
            <li><b>(将来) 公式API or スクレイパ</b> — 規約・法令を遵守できる範囲で別途モジュール化。利用判断はユーザー責任。</li>
          </ol>
        </div>
        <button className="btn btn-ghost" onClick={loadSample}>サンプルデータ再生成</button>
      </section>

      <section className="card p-4">
        <h3 className="font-bold mb-2">JSON 取り込み</h3>
        <textarea className="input" rows="8" placeholder="JSON を貼り付け" value={json} onChange={e=>setJson(e.target.value)}/>
        <div className="mt-2 flex gap-2">
          <button className="btn btn-primary" onClick={tryLoadJson}>品質チェックして取り込み</button>
          <button className="btn btn-ghost" onClick={()=>setJson(sampleSchema)}>スキーマ例を入れる</button>
        </div>
      </section>

      <section className="card p-4">
        <h3 className="font-bold mb-2">CSV 取り込み (1行=1艇)</h3>
        <div className="hint mb-2">
          <b>必須列:</b> race_id,venue,raceNo,startTime,weather,wind,windDir,wave,boatNo,racer,class,winRate,placeRate,motor2,boat2,exTime,ST,courseWinPct,weight<br/>
          <b>任意列 (拡張データ・空欄OK):</b> localWinRate,localPlaceRate,tilt,partsExchange,prevResults,thisSeriesResults,entryHistory,startExhibition,lapExhibition,exhibitionNote<br/>
          <b>任意列 (レーサー履歴・空欄OK):</b> regNo,prevClass,prevPrevClass,everA1,everA,recentWinRate,accidentRate,flState,last3SeriesResults,courseStats,branch<br/>
          <span className="text-xs">配列項目 (prevResults / thisSeriesResults / entryHistory / partsExchange / flState / last3SeriesResults) は <code>|</code> 区切りで複数値: 例 <code>1|3|2|1</code> / courseStats は <code>1:55|2:16|3:12|4:9|5:6|6:2</code> 形式 / everA1, everA は <code>true</code> または <code>1</code></span>
        </div>
        <input type="file" accept=".csv" onChange={tryLoadCsvFile}/>
      </section>

      {/* データ品質チェックの結果 */}
      {validation && (
        <section className="card p-4">
          <h3 className="font-bold mb-3">🛡️ データ品質チェック結果 ({validation.source} / {validation.proposedData.length}レース)</h3>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
            <Kpi label="検出件数" value={`${validation.proposedData.length}レース`}/>
            <Kpi label="致命的エラー" value={`${validation.errors.length}件`} highlight={validation.errors.length>0}/>
            <Kpi label="警告" value={`${validation.warnings.length}件`} highlight={validation.warnings.length>0}/>
          </div>
          {validation.errors.length === 0 && validation.warnings.length === 0 && (
            <div className="ok">問題は検出されませんでした。安心して取り込めます。</div>
          )}
          {validation.errors.length > 0 && (
            <div className="warn">
              <b>致命的エラー (取り込み不可):</b>
              <ul className="list-disc pl-6 mt-1">
                {validation.errors.slice(0,30).map((e,i)=><li key={i}>{e}</li>)}
                {validation.errors.length>30 && <li className="hint">…他 {validation.errors.length-30} 件</li>}
              </ul>
            </div>
          )}
          {validation.warnings.length > 0 && (
            <div className="alert mt-3">
              <b>警告 (取り込み可、要確認):</b>
              <ul className="list-disc pl-6 mt-1">
                {validation.warnings.slice(0,30).map((w,i)=><li key={i}>{w}</li>)}
                {validation.warnings.length>30 && <li className="hint">…他 {validation.warnings.length-30} 件</li>}
              </ul>
            </div>
          )}
          <div className="mt-3 flex gap-2 flex-wrap">
            <button className="btn btn-success" disabled={validation.errors.length>0} onClick={()=>applyImport(false)}>
              {validation.errors.length>0 ? "致命エラーがあるため取り込み不可" : "取り込みを確定"}
            </button>
            {validation.errors.length>0 && (
              <button className="btn btn-danger" onClick={()=>applyImport(true)}>強制取り込み (非推奨)</button>
            )}
            <button className="btn btn-ghost" onClick={()=>setValidation(null)}>キャンセル</button>
          </div>
        </section>
      )}

      {err && <div className="warn">{err}</div>}
      {ok && <div className="ok">{ok}</div>}
    </div>
  );
}

/* =========================================================
   反省コメント生成: 予想 vs 結果 を比較してルールベースで指摘
   ========================================================= */
function generateReflections(race, evalRes, result) {
  const out = [];
  const winProbs = evalRes.pred.winProbs;
  const predTop = winProbs.indexOf(Math.max(...winProbs));
  const a1 = result.first - 1, a2 = result.second - 1, a3 = result.third - 1;
  const predHit = predTop === a1;
  const winnerBoat = race.boats[a1];
  const winnerProb = winProbs[a1];
  const predBoat = race.boats[predTop];

  if (predHit) {
    out.push({type:"good", text:`本命予想 ${predTop+1}号艇が的中 — 確率 ${(winProbs[predTop]*100).toFixed(1)}% の信頼度は妥当`});
  } else {
    if (winnerProb < 0.05) {
      out.push({type:"miss", text:`実際の1着 ${a1+1}号艇 ${winnerBoat.racer} は予想確率 ${(winnerProb*100).toFixed(1)}% の大穴 — 穴目を取り逃がした`});
    } else if (winnerProb < 0.15) {
      out.push({type:"miss", text:`実際の1着 ${a1+1}号艇は予想確率 ${(winnerProb*100).toFixed(1)}% の中穴 — 中穴の評価を引き上げる余地あり`});
    } else {
      out.push({type:"miss", text:`本命${predTop+1}号艇予想が外れ、実際は${a1+1}号艇が勝利`});
    }
  }

  // 1号艇信頼度
  if (predTop === 0 && a1 !== 0) {
    const b1 = race.boats[0];
    if (b1.class === "B1" || b1.class === "B2") {
      out.push({type:"learn", text:`1号艇が${b1.class}級だったが本命にしてしまった — 級別を重視するルールを強化すべき`});
    } else if (b1.ST > 0.18) {
      out.push({type:"learn", text:`1号艇の平均ST(${b1.ST})が遅かったが本命にしていた — 1号艇の信頼度判定が甘かった`});
    } else if (b1.motor2 < 30) {
      out.push({type:"learn", text:`1号艇のモーター2連率(${b1.motor2}%)が低調だったが本命にしていた — 機力評価のウェイトを見直すべき`});
    } else if (race.wind > 5) {
      out.push({type:"learn", text:`風速${race.wind}mの荒れ条件で1号艇本命にしていた — 強風時のイン信頼度を下げるべき`});
    } else {
      out.push({type:"learn", text:`1号艇本命が崩れた — 級別だけでは見えない要因を分析する必要あり`});
    }
  }

  // 1号艇が勝ったのに本命にしていなかった
  if (predTop !== 0 && a1 === 0) {
    out.push({type:"learn", text:`1号艇が勝ったのに本命にしていなかった — イン有利の基本配点を上げる検討余地あり`});
  }

  // 風の影響
  if (race.wind > 4 && !predHit) {
    out.push({type:"learn", text:`風速${race.wind}m (${race.windDir}) と荒れ要因がありながら予想に反映しきれていなかった — 風の影響を軽視していた`});
  }
  if (race.wave >= 8 && !predHit) {
    out.push({type:"learn", text:`波高${race.wave}cmで荒れやすい状況だったが予想に反映できていなかった — 波高の重みを上げる検討`});
  }

  // 展示タイム
  if (!predHit && predBoat.exTime < winnerBoat.exTime - 0.05) {
    out.push({type:"learn", text:`本命の展示タイム(${predBoat.exTime})は良かったが、展示で劣る ${a1+1}号艇(${winnerBoat.exTime}) が勝利 — 展示タイムを過大評価していた可能性`});
  }

  // モーター評価
  if (!predHit && winnerBoat.motor2 >= 40 && winProbs[a1] < 0.15) {
    out.push({type:"learn", text:`勝った${a1+1}号艇はモーター${winnerBoat.motor2}%の好機 — モーター好調艇の評価を強化すべき`});
  }

  // 全国勝率
  if (!predHit && winnerBoat.winRate >= 6.5 && winProbs[a1] < 0.2) {
    out.push({type:"learn", text:`勝った${a1+1}号艇の全国勝率${winnerBoat.winRate}は高水準だが、コース不利として軽く見ていた`});
  }

  return out;
}

/* =========================================================

   ========================================================= */
function ImprovementLogView({ results, bets, dailyMemos, setDailyMemos }) {
  const dailyStats = useMemo(() => {
    // 日付の集合
    const dates = new Set();
    results.forEach(r => dates.add(r.date));
    bets.forEach(b => dates.add(b.date));
    const list = [...dates].sort().reverse();
    return list.map(date => {
      const dayResults = results.filter(r => r.date === date);
      const dayBets = bets.filter(b => b.date === date);
      // 買ったレース = bets が存在するユニークraceId
      const boughtRaces = new Set(dayBets.map(b => b.raceId));
      // 見送ったレース = 結果が登録されていてかつ bets が無いraceId
      const skippedRaces = dayResults.filter(r => !boughtRaces.has(r.raceId)).length;
      // 連敗 (この日の bets を時系列で)
      let cur=0, max=0;
      dayBets.forEach(b => {
        if (b.result === "hit") cur=0;
        else if (b.result === "miss") { cur++; max=Math.max(max,cur); }
      });
      const stake = dayBets.reduce((s,b)=>s+b.stake,0);
      const ret = dayBets.reduce((s,b)=>s+(b.result==="hit"?b.stake*b.odds:0),0);
      const hits = dayBets.filter(b=>b.result==="hit").length;
      const count = dayBets.length;
      return {
        date,
        races: dayResults.length,
        bought: boughtRaces.size,
        skipped: skippedRaces,
        bets: count,
        hits,
        hitRate: count? hits/count : 0,
        stake, ret,
        roi: stake? ret/stake : 0,
        pnl: ret - stake,
        maxLoss: max,
      };
    });
  }, [results, bets]);

  return (
    <div className="space-y-4 mt-4">
      <section className="card p-4">
        <h2 className="text-lg font-bold mb-2">📓 改善ログ (日次)</h2>
        <div className="hint mb-3">「買ったレース数」「見送ったレース数」「ROI」「最大連敗」を日ごとに集計します。各日に改善メモを残せます。</div>
      </section>

      {dailyStats.length === 0 ? (
        <div className="info">まだ集計対象の日付がありません。「結果入力」タブから結果を登録すると自動的に反映されます。</div>
      ) : (
      <section className="card p-4">
        <div className="overflow-x-auto scrollbar">
        <table>
          <thead><tr>
            <th>日付</th><th>解析(結果入力)</th><th>買い</th><th>見送り</th>
            <th>購入件数</th><th>的中件数</th><th>的中率</th>
            <th>購入額</th><th>払戻</th><th>収支</th><th>ROI</th><th>最大連敗</th><th>改善メモ</th>
          </tr></thead>
          <tbody>
            {dailyStats.map(d=>(
              <tr key={d.date}>
                <td className="num font-bold">{d.date}</td>
                <td className="num">{d.races}</td>
                <td className="num">{d.bought}</td>
                <td className="num">{d.skipped}</td>
                <td className="num">{d.bets}</td>
                <td className="num">{d.hits}</td>
                <td className="num">{(d.hitRate*100).toFixed(1)}%</td>
                <td className="num">¥{d.stake.toLocaleString()}</td>
                <td className="num">¥{Math.round(d.ret).toLocaleString()}</td>
                <td className={"num " + (d.pnl>=0?"ev-pos":"ev-neg")}>¥{Math.round(d.pnl).toLocaleString()}</td>
                <td className={"num " + (d.roi>=1?"ev-pos":"ev-neg")}>{(d.roi*100).toFixed(1)}%</td>
                <td className={"num " + (d.maxLoss>=5?"ev-neg":"")}>{d.maxLoss}</td>
                <td>
                  <input className="input" style={{minWidth:200}}
                    placeholder="今日の気づき・改善案"
                    value={dailyMemos[d.date]||""}
                    onChange={e=>setDailyMemos({...dailyMemos, [d.date]: e.target.value})}/>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        </div>
      </section>
      )}

      {dailyStats.length > 1 && (
        <section className="card p-4">
          <h3 className="font-bold mb-3">日別 ROI 推移</h3>
          <div style={{height:240}}>
            <ResponsiveContainer>
              <LineChart data={[...dailyStats].reverse().map(d=>({date:d.date, ROI:+(d.roi*100).toFixed(1), 連敗:d.maxLoss}))}>

/* =========================================================
   条件別分析画面 (どの条件で強い/弱いか)
   ========================================================= */
function bucketWind(w) {
  if (w < 2) return "0-2m (微風)";
  if (w < 4) return "2-4m (弱風)";
  if (w < 6) return "4-6m (中風)";
  return "6m+ (強風)";
}
function bucketWave(v) {
  if (v <= 3) return "0-3cm (静水)";
  if (v <= 7) return "4-7cm (普通)";
  if (v <= 12) return "8-12cm (やや荒れ)";
  return "13cm+ (荒れ)";
}
function bucketBoat1(b1) {
  if (b1.class === "A1" && b1.winRate >= 6.5) return "高 (A1+勝率6.5+)";
  if ((b1.class === "A1" || b1.class === "A2") && b1.winRate >= 5) return "中 (A級+勝率5+)";
  return "低 (B級または勝率<5)";
}

function ConditionAnalysisView({ races, results, bets }) {
  // 各 result について 「本命1着的中」をカウント
  // 各 bet について odds-class 別に集計
  const matched = useMemo(() => results.map(r => {
    const race = races.find(x => x.id === r.raceId);
    if (!race) return null;
    const predHit = r.snapshot.predTop === r.first;
    return { result:r, race, predHit };
  }).filter(Boolean), [results, races]);

  function aggBy(keyFn) {
    const map = {};
    matched.forEach(m => {
      const k = keyFn(m);
      if (!map[k]) map[k] = { key:k, n:0, hit:0, betCount:0, betHit:0, stake:0, ret:0 };
      map[k].n++;
      if (m.predHit) map[k].hit++;
      const rb = bets.filter(b => b.raceId === m.result.raceId);
      rb.forEach(b => {
        map[k].betCount++;
        map[k].stake += b.stake;
        if (b.result === "hit") { map[k].betHit++; map[k].ret += b.stake*b.odds; }
      });
    });
    return Object.values(map);
  }

  function aggByOddsClass() {
    const cls = { "本命":{n:0,hit:0,stake:0,ret:0}, "中穴":{n:0,hit:0,stake:0,ret:0}, "大穴":{n:0,hit:0,stake:0,ret:0} };
    bets.forEach(b => {
      const c = classifyTicket(b.odds).label;
      if (!cls[c]) return;
      cls[c].n++;
      cls[c].stake += b.stake;
      if (b.result === "hit") { cls[c].hit++; cls[c].ret += b.stake*b.odds; }
    });
    return Object.entries(cls).map(([k,v])=>({key:k, ...v}));
  }

  function aggByJudgment() {
    // 買い: bets が存在するレース / 見送り: 結果はあるが bets が無いレース
    const map = { "買ったレース":{n:0, hit:0}, "見送ったレース":{n:0, hit:0} };
    matched.forEach(m => {
      const had = bets.some(b => b.raceId === m.result.raceId);
      const k = had ? "買ったレース" : "見送ったレース";
      map[k].n++;
      if (m.predHit) map[k].hit++;
    });
    return Object.entries(map).map(([k,v])=>({key:k, ...v}));
  }

  const byWind   = aggBy(m => bucketWind(m.race.wind));
  const byWave   = aggBy(m => bucketWave(m.race.wave));
  const byVenue  = aggBy(m => m.race.venue);
  const byBoat1  = aggBy(m => bucketBoat1(m.race.boats[0]));
  const byClass  = aggByOddsClass();
  const byJudg   = aggByJudgment();

  function condTable(title, rows, opts={showBets:true}) {
    return (
      <section className="card p-4">
        <h3 className="font-bold mb-3">{title}</h3>
        {rows.length === 0 ? <div className="hint">データなし</div> :
        <div className="overflow-x-auto scrollbar">
        <table>
          <thead><tr>
            <th>区分</th><th>レース数</th><th>本命的中</th><th>本命的中率</th>
            {opts.showBets && <><th>購入件数</th><th>購入的中</th><th>的中率</th><th>購入額</th><th>払戻</th><th>ROI</th></>}
          </tr></thead>
          <tbody>
            {rows.sort((a,b)=>(b.n||0)-(a.n||0)).map(r=>{
              const predHitRate = r.n? (r.hit||0)/r.n : 0;
              const betHitRate = r.betCount? (r.betHit||0)/r.betCount : 0;
              const roi = r.stake? r.ret/r.stake : 0;
              return (
                <tr key={r.key}>
                  <td className="font-bold">{r.key}</td>
                  <td className="num">{r.n}</td>
                  <td className="num">{r.hit||0}</td>
                  <td className={"num " + (predHitRate>=0.5?"ev-pos":(predHitRate<0.3?"ev-neg":""))}>{(predHitRate*100).toFixed(0)}%</td>
                  {opts.showBets && <>
                    <td className="num">{r.betCount||0}</td>
                    <td className="num">{r.betHit||0}</td>
                    <td className="num">{r.betCount? (betHitRate*100).toFixed(0)+"%":"—"}</td>
                    <td className="num">¥{(r.stake||0).toLocaleString()}</td>
                    <td className="num">¥{Math.round(r.ret||0).toLocaleString()}</td>
                    <td className={"num " + (roi>=1?"ev-pos":"ev-neg")}>{r.stake?(roi*100).toFixed(0)+"%":"—"}</td>
                  </>}
                </tr>
              );
            })}
          </tbody>
        </table>
        </div>}
      </section>
    );
  }

  function classRows() {
    return (
      <section className="card p-4">
        <h3 className="font-bold mb-3">本命 / 中穴 / 大穴 別 (購入したものだけ)</h3>
        {bets.length===0 ? <div className="hint">購入記録がありません</div> :
        <div className="overflow-x-auto scrollbar">
        <table>
          <thead><tr><th>区分</th><th>購入件数</th><th>的中</th><th>的中率</th><th>購入額</th><th>払戻</th><th>ROI</th></tr></thead>
          <tbody>
            {byClass.map(r=>{
              const hr = r.n? r.hit/r.n : 0;
              const roi = r.stake? r.ret/r.stake : 0;
              return (
                <tr key={r.key}>
                  <td><span className={"pill " + classifyTicket(r.key==="本命"?5:(r.key==="中穴"?15:50)).cls}>{r.key}</span></td>
                  <td className="num">{r.n}</td><td className="num">{r.hit}</td>
                  <td className="num">{r.n? (hr*100).toFixed(1)+"%":"—"}</td>
                  <td className="num">¥{r.stake.toLocaleString()}</td>
                  <td className="num">¥{Math.round(r.ret).toLocaleString()}</td>
                  <td className={"num " + (roi>=1?"ev-pos":"ev-neg")}>{r.n?(roi*100).toFixed(0)+"%":"—"}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
        </div>}
      </section>
    );
  }

  return (
    <div className="space-y-4 mt-4">
      <section className="card p-4">
        <h2 className="text-lg font-bold mb-2">🔬 条件別分析</h2>
        <div className="hint">登録済み結果 ({results.length}件) を元に、どの条件で本命予想が当たりやすい/外しやすいかを集計します。サンプルが少ないと偏るので、ある程度結果を貯めてから参照してください。</div>
      </section>

      {results.length === 0 ? (
        <div className="info">まだ集計対象の結果がありません。「結果入力」タブで結果を登録してください。</div>
      ) : (
      <>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          {condTable("風速別", byWind)}
          {condTable("波高別", byWave)}
        </div>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          {condTable("会場別", byVenue)}
          {condTable("1号艇 信頼度別", byBoat1)}
        </div>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          {classRows()}
          {condTable("買い / 見送り判断別", byJudg, {showBets:false})}
        </div>
        <section className="card p-4">
          <h3 className="font-bold mb-2">読み方の指針</h3>
          <ul className="list-disc pl-6 text-sm space-y-1">
            <li><b>強風時に本命的中率が大きく落ちる</b>なら、風速の重みを上げるか強風時は見送り強化。</li>
            <li><b>大穴のROIが極端に低い</b>なら攻め型の購入を絞る、または攻め型のEV閾値を引き上げる。</li>
            <li><b>「買ったレース」の本命的中率より「見送ったレース」の方が高い</b>なら、見送り判定の精度に問題あり (本来買うべきを見送っている可能性)。</li>
            <li>会場別に強弱が出るなら会場ごとに別チューニング (会場係数の追加) を検討。</li>
          </ul>
        </section>
      </>
      )}
    </div>
  );
}

/* =========================================================
   週次レポート (直近7日の集計 + 推奨アクション)
   ========================================================= */
function WeeklyReportView({ bets, results, races, settings, onGoTab }) {
  const today = new Date();
  const weekAgo = new Date(today.getTime() - 7*24*60*60*1000);
  const weekAgoStr = weekAgo.toISOString().slice(0,10);
  const todayStr = today.toISOString().slice(0,10);
  const inRange = (d) => d && d >= weekAgoStr && d <= todayStr;

  const weekBets = useMemo(() => bets.filter(b => inRange(b.date)), [bets]);
  const weekResults = useMemo(() => results.filter(r => inRange(r.date)), [results]);

  function summarize(arr) {
    const s = { stake:0, ret:0, count:arr.length, hits:0 };
    arr.forEach(b => {
      s.stake += b.stake;
      if (b.result === "hit") { s.ret += b.stake*b.odds; s.hits += 1; }
    });
    s.pnl = s.ret - s.stake;
    s.roi = s.stake > 0 ? s.ret / s.stake : 0;
    s.hitRate = s.count > 0 ? s.hits / s.count : 0;
    return s;
  }

  const settled = weekBets.filter(b => b.result === "hit" || b.result === "miss");
  const realBets = settled.filter(b => !b.virtual);
  const virtBets = settled.filter(b => b.virtual);
  const realSum = summarize(realBets);
  const virtSum = summarize(virtBets);

  const predHit = weekResults.filter(r => r.snapshot && r.snapshot.predTop === r.first).length;
  const predHitRate = weekResults.length > 0 ? predHit / weekResults.length : 0;

  /* 「買ったレース」 vs 「見送ったレース」の本命的中率 */
  const judgmentCheck = useMemo(() => {
    const map = { bought: { n:0, hit:0 }, skipped: { n:0, hit:0 } };
    weekResults.forEach(r => {
      const had = bets.some(b => b.raceId === r.raceId);
      const k = had ? "bought" : "skipped";
      map[k].n += 1;
      if (r.snapshot && r.snapshot.predTop === r.first) map[k].hit += 1;
    });
    return map;
  }, [weekResults, bets]);

  /* 日別収支 */
  const daily = useMemo(() => {
    const m = {};
    settled.forEach(b => {
      m[b.date] = m[b.date] || { date: b.date, stake:0, ret:0, count:0, hits:0 };
      m[b.date].stake += b.stake;
      m[b.date].count += 1;
      if (b.result === "hit") { m[b.date].ret += b.stake*b.odds; m[b.date].hits += 1; }
    });
    return Object.values(m).sort((a,b)=>a.date.localeCompare(b.date)).map(d => ({
      ...d, pnl: Math.round(d.ret - d.stake),
      roi: d.stake>0 ? +(d.ret/d.stake*100).toFixed(0) : 0,
    }));
  }, [settled]);

  /* 会場別 ROI */
  const byVenue = useMemo(() => {
    const m = {};
    weekBets.forEach(b => {
      m[b.venue] = m[b.venue] || { venue: b.venue, stake:0, ret:0, count:0, hits:0 };
      m[b.venue].stake += b.stake;
      m[b.venue].count += 1;
      if (b.result === "hit") { m[b.venue].ret += b.stake*b.odds; m[b.venue].hits += 1; }
    });
    return Object.values(m)
      .map(v => ({ ...v, roi: v.stake > 0 ? v.ret/v.stake : 0 }))
      .sort((a,b) => b.roi - a.roi);
  }, [weekBets]);

  /* リスク感覚 (戦略タグ) 別 ROI */
  const byStrategy = useMemo(() => {
    const m = {};
    weekBets.forEach(b => {
      const k = b.strategy || "—";
      m[k] = m[k] || { key:k, stake:0, ret:0, count:0, hits:0 };
      m[k].stake += b.stake; m[k].count += 1;
      if (b.result === "hit") { m[k].ret += b.stake*b.odds; m[k].hits += 1; }
    });
    return Object.values(m).map(v => ({ ...v, roi: v.stake > 0 ? v.ret/v.stake : 0 }));
  }, [weekBets]);

  /* 推奨アクション */
  const recommendation = useMemo(() => {
    const sum = settings.virtualMode ? virtSum : realSum;
    if (sum.count < 10) return { tone: "info", text: "サンプル不足。最低10件の購入結果を貯めてから判断してください。" };
    if (sum.roi >= 1.10) return { tone: "good", text: settings.virtualMode
      ? "✅ 仮想ROI 110%以上 — 本運用に進める段階。仮想モードを解除してOK"
      : "✅ 本運用ROI 110%以上 — 良い水準を維持しています" };
    if (sum.roi >= 0.95) return { tone: "warn", text: "△ ROIが横ばい。重み調整・条件絞り込みを試して様子見" };
    return { tone: "bad", text: "❌ ROI 95%未満 — 購入条件を厳格化 (EV閾値↑ / リスク感覚を堅めに / 不調会場除外)" };
  }, [realSum, virtSum, settings.virtualMode]);

  return (
    <div className="space-y-4 mt-4">
      <section className="card p-4">
        <div className="flex items-center justify-between flex-wrap gap-2">
          <h2 className="text-lg font-bold">📅 週次レポート (直近7日)</h2>
          <span className="hint text-xs">{weekAgoStr} 〜 {todayStr}</span>
        </div>
        <div className="hint text-xs mt-1">仮想と本運用は分けて集計します。本運用ROI / 仮想ROI / 見送り判断の正誤 をひと目で確認できます。</div>
      </section>

      <div className="grid-cards">
        <Kpi label="集計レース数" value={`${weekResults.length}件`} sub={`購入 ${weekBets.length}件`}/>
        <Kpi label="本命的中率" value={weekResults.length>0 ? `${(predHitRate*100).toFixed(1)}%` : "—"} sub={`${predHit}/${weekResults.length}件`}/>
        <Kpi label="購入的中率" value={settled.length>0 ? `${((settled.filter(b=>b.result==="hit").length/settled.length)*100).toFixed(1)}%` : "—"} sub={`確定 ${settled.length}件`}/>
        <Kpi label="本運用 ROI" value={realSum.stake>0 ? `${(realSum.roi*100).toFixed(1)}%` : "—"}
          sub={realSum.stake>0 ? `収支 ¥${realSum.pnl>=0?"+":""}${Math.round(realSum.pnl).toLocaleString()}` : "—"}
          highlight={realSum.stake>0 && realSum.roi<1}/>
        <Kpi label="仮想 ROI" value={virtSum.stake>0 ? `${(virtSum.roi*100).toFixed(1)}%` : "—"}
          sub={virtSum.stake>0 ? `仮想${virtSum.count}件 / 的中${virtSum.hits}件` : "—"}/>
        <Kpi label="累計購入額 (本)" value={`¥${realSum.stake.toLocaleString()}`} sub={`払戻 ¥${Math.round(realSum.ret).toLocaleString()}`}/>
      </div>

      <section className="card p-4">
        <h3 className="font-bold mb-2">推奨アクション</h3>
        <div className={recommendation.tone==="good"?"ok":recommendation.tone==="bad"?"warn":recommendation.tone==="warn"?"alert":"info"}>
          {recommendation.text}
        </div>
        <div className="mt-3 flex gap-2 flex-wrap">
          <button className="btn btn-ghost text-xs" onClick={()=>onGoTab&&onGoTab("analysis")}>🔬 条件別分析を開く →</button>
          <button className="btn btn-ghost text-xs" onClick={()=>onGoTab&&onGoTab("weights")}>🎚️ 重み調整を開く →</button>
          <button className="btn btn-ghost text-xs" onClick={()=>onGoTab&&onGoTab("ledger")}>収支管理を開く →</button>
        </div>
      </section>

      <section className="card p-4">
        <h3 className="font-bold mb-3">日別の収支</h3>
        {daily.length === 0 ? <div className="hint">この期間の購入結果はまだありません</div> :
          <div className="overflow-x-auto scrollbar">
            <table>
              <thead><tr><th>日付</th><th>購入</th><th>的中</th><th>購入額</th><th>払戻</th><th>収支</th><th>ROI</th></tr></thead>
              <tbody>{daily.map(d => (
                <tr key={d.date}>
                  <td className="num">{d.date}</td>
                  <td className="num">{d.count}</td>
                  <td className="num">{d.hits}</td>
                  <td className="num">¥{d.stake.toLocaleString()}</td>
                  <td className="num">¥{Math.round(d.ret).toLocaleString()}</td>
                  <td className={"num " + (d.pnl>=0?"ev-pos":"ev-neg")}>¥{d.pnl>=0?"+":""}{d.pnl.toLocaleString()}</td>
                  <td className={"num " + (d.roi>=100?"ev-pos":"ev-neg")}>{d.roi}%</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        }
      </section>

      <section className="card p-4">
        <h3 className="font-bold mb-3">見送り判断の正誤</h3>
        <div className="hint text-xs mb-2">「見送ったレースの本命的中率」が「買ったレース」を大きく上回っているなら、見送り判定が誤って稼ぎ損ねている可能性があります。</div>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
          <div className="info">
            <b>買ったレース</b><br/>
            {judgmentCheck.bought.n}件中 本命的中 {judgmentCheck.bought.hit}件
            ({judgmentCheck.bought.n>0 ? ((judgmentCheck.bought.hit/judgmentCheck.bought.n)*100).toFixed(0) : "—"}%)
          </div>
          <div className="info">
            <b>見送ったレース</b><br/>
            {judgmentCheck.skipped.n}件中 本命的中 {judgmentCheck.skipped.hit}件
            ({judgmentCheck.skipped.n>0 ? ((judgmentCheck.skipped.hit/judgmentCheck.skipped.n)*100).toFixed(0) : "—"}%)
          </div>
        </div>
      </section>

      {byVenue.length > 0 && (
        <section className="card p-4">
          <h3 className="font-bold mb-3">会場別 ROI (購入したものだけ)</h3>
          <div className="overflow-x-auto scrollbar">
            <table>
              <thead><tr><th>会場</th><th>購入</th><th>的中</th><th>購入額</th><th>払戻</th><th>ROI</th></tr></thead>
              <tbody>
                {byVenue.map(v => (
                  <tr key={v.venue}>
                    <td className="font-bold">{v.venue}</td>
                    <td className="num">{v.count}</td>
                    <td className="num">{v.hits}</td>
                    <td className="num">¥{v.stake.toLocaleString()}</td>
                    <td className="num">¥{Math.round(v.ret).toLocaleString()}</td>
                    <td className={"num " + (v.roi>=1?"ev-pos":"ev-neg")}>{(v.roi*100).toFixed(0)}%</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </section>
      )}

      {byStrategy.length > 0 && (
        <section className="card p-4">
          <h3 className="font-bold mb-3">戦略 (本命/押さえ/穴) 別 ROI</h3>
          <div className="overflow-x-auto scrollbar">
            <table>
              <thead><tr><th>戦略</th><th>購入</th><th>的中</th><th>購入額</th><th>払戻</th><th>ROI</th></tr></thead>
              <tbody>
                {byStrategy.map(v => (
                  <tr key={v.key}>
                    <td className="font-bold">{v.key}</td>
                    <td className="num">{v.count}</td>
                    <td className="num">{v.hits}</td>
                    <td className="num">¥{v.stake.toLocaleString()}</td>
                    <td className="num">¥{Math.round(v.ret).toLocaleString()}</td>
                    <td className={"num " + (v.roi>=1?"ev-pos":"ev-neg")}>{v.stake>0?(v.roi*100).toFixed(0)+"%":"—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </section>
      )}

      <section className="card p-4">
        <h3 className="font-bold mb-2">読み方</h3>
        <ul className="list-disc pl-6 text-sm space-y-1">
          <li><b>本運用ROI が継続的に 100% を超える</b> → AI予想は「買って勝てる」状態。</li>
          <li><b>仮想ROIが高いのに本運用が低い</b> → 心理バイアス (連敗時の追い金など) を疑う。</li>
          <li><b>見送りが正しい</b>= 「見送ったレースの本命的中率」 ≦ 「買ったレースの本命的中率」</li>
          <li><b>会場別/戦略別で偏り</b> → ベスト/ワースト条件を抽出し、悪い側を除外して再運用。</li>
        </ul>
      </section>
    </div>
  );
}

/* =========================================================
   重み調整画面
   ========================================================= */
function WeightsView({ weights, setWeights, activePreset, setActivePreset }) {
  function applyPreset(name) {
    if (!WEIGHT_PRESETS[name]) return;
    setWeights({...WEIGHT_PRESETS[name]});
    setActivePreset(name);
  }
  function resetDefault() { applyPreset("標準型"); }
  function setW(k, v) {
    setWeights(prev => ({...prev, [k]: +v}));
    setActivePreset("カスタム");
  }
  const total = Object.values(weights).reduce((a,b)=>a+b,0);

  // 重みのバランスをレーダーチャートで可視化
  const radarData = FACTOR_KEYS.map(k => ({factor: FACTOR_LABELS[k], 重み: +weights[k].toFixed(3)}));

  return (
    <div className="space-y-4 mt-4">
      <section className="card p-4">
        <div className="flex flex-wrap items-center justify-between gap-2">
          <h2 className="text-lg font-bold">🎚️ 予測ロジックの重み調整</h2>
          <div className="flex items-center gap-2">
            <span className="hint">現在のプリセット:</span>
            <span className="pill badge-honmei">{activePreset}</span>
          </div>
        </div>
        <div className="info mt-3 text-sm">
          各要素の重みを変更すると、レース予想画面の確率・期待値・買い目が即座に再計算されます。重みの<b>合計値は厳密に1.0でなくてもOK</b> (softmaxで正規化されます)。値が大きいほどその要素が予想に強く影響します。
        </div>
      </section>

      <section className="card p-4">
        <h3 className="font-bold mb-3">プリセット</h3>
        <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
          {Object.keys(WEIGHT_PRESETS).map(p => (
            <button key={p}
              className={"btn " + (activePreset===p ? "btn-primary" : "btn-ghost")}
              onClick={()=>applyPreset(p)}>
              {p}
            </button>
          ))}
        </div>
        <div className="hint mt-3 text-xs">
          <b>標準型</b>: 各要素をバランス良く配点 /
          <b> イン重視型</b>: コース1着率を強化 (1号艇本命を信頼) /
          <b> 展示重視型</b>: 直前の展示タイムを最重要視 /
          <b> モーター重視型</b>: モーター2連率を最重要視 /
          <b> 荒れ水面警戒型</b>: 風速・波高の影響を強化 (荒れ予想) /
          <b> 穴狙い抑制型</b>: 全国勝率と2連対率を高めに置き、波乱を抑制
        </div>
      </section>

      <section className="card p-4">
        <h3 className="font-bold mb-3">重みスライダー (合計: {total.toFixed(2)})</h3>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          {FACTOR_KEYS.map(k => (
            <div key={k} className="p-3 rounded bg-[#0f1830] border border-[#1f2a44]">
              <div className="flex justify-between items-center mb-1">
                <label className="text-sm font-bold">{FACTOR_LABELS[k]}</label>
                <span className="num text-cyan-400 font-bold">{weights[k].toFixed(3)}</span>
              </div>
              <input type="range" min="0" max="0.5" step="0.005"
                value={weights[k]}
                onChange={e=>setW(k, e.target.value)}
                className="w-full"/>
              <div className="flex justify-between text-xs text-slate-400 mt-1">
                <span>0.000</span><span>0.500</span>
              </div>
            </div>
          ))}
        </div>
        <div className="mt-3 flex gap-2 flex-wrap">
          <button className="btn btn-ghost" onClick={resetDefault}>標準値に戻す</button>
        </div>
      </section>

      <section className="card p-4">
        <h3 className="font-bold mb-3">重みバランス (レーダー)</h3>
        <div style={{height:300}}>
          <ResponsiveContainer>
            <RadarChart data={radarData}>
              <PolarGrid stroke="#243154"/>
              <PolarAngleAxis dataKey="factor" stroke="#9fb0c9" fontSize={11}/>
              <PolarRadiusAxis stroke="#9fb0c9"/>
              <Radar dataKey="重み" stroke="#22d3ee" fill="#22d3ee" fillOpacity={0.4}/>
              <Tooltip contentStyle={{background:"#121a2c",border:"1px solid #243154"}}/>
            </RadarChart>
          </ResponsiveContainer>
        </div>
      </section>
    </div>
  );
}

/* =========================================================
   プリセット比較バックテスト
   - 同じレース集合に対して各プリセットでバックテストを回し
   - 的中率/回収率/最大連敗/最大DD/買いレース数/見送り数を比較
   ========================================================= */
function PresetCompareView({ settings, races }) {
  const [iter, setIter] = useState(300);
  const [evMin, setEvMin] = useState(1.10);
  const [perBet, setPerBet] = useState(500);
  const [strategy, setStrategy] = useState("balanced");
  const [seed, setSeed] = useState(12345);
  const [results, setResults] = useState(null);
  const [running, setRunning] = useState(false);

  function runComparison() {
    setRunning(true);
    setTimeout(() => {
      const presets = Object.entries(WEIGHT_PRESETS);
      const out = [];
      for (const [name, w] of presets) {
        const stats = runBacktestOnce(iter, evMin, perBet, strategy, w, seed);
        out.push({ name, ...stats });
      }
      setResults(out);
      setRunning(false);
    }, 30);
  }

  return (
    <div className="space-y-4 mt-4">
      <section className="card p-4">
        <h2 className="text-lg font-bold mb-2">🆚 プリセット比較バックテスト</h2>
        <div className="info text-sm mb-3">
          同じレースの組み合わせ (同一シード) に対して、各プリセットを並列で適用しバックテストを実行します。
          <b>同条件比較</b>で「どのプリセットが当たり、どれが回収率を残せるか」が一目で分かります。
          サンプルデータでの検証なので、実データを取り込んでから実行すると意味のある比較になります。
        </div>
        <div className="grid grid-cols-1 md:grid-cols-5 gap-3">
          <div><label className="hint">試行レース数</label><input className="input" type="number" value={iter} onChange={e=>setIter(+e.target.value)}/></div>
          <div><label className="hint">EV閾値</label><input className="input" type="number" step="0.05" value={evMin} onChange={e=>setEvMin(+e.target.value)}/></div>
          <div><label className="hint">1点あたり購入額</label><input className="input" type="number" value={perBet} onChange={e=>setPerBet(+e.target.value)}/></div>
          <div><label className="hint">戦略</label>
            <select className="select" value={strategy} onChange={e=>setStrategy(e.target.value)}>
              <option value="steady">堅実型</option>
              <option value="balanced">バランス型</option>
              <option value="aggressive">攻め型</option>
            </select></div>
          <div><label className="hint">乱数シード (固定)</label><input className="input" type="number" value={seed} onChange={e=>setSeed(+e.target.value)}/></div>
        </div>

                    <td className="num">{r.racesAnalyzed}</td>
                    <td className="num">{r.racesPlayed}</td>
                    <td className="num">{r.racesSkipped}</td>

                    <td className={"num " + (r.raceROI>=1?"ev-pos":"ev-neg")}>{(r.raceROI*100).toFixed(1)}%</td>
                    <td className={"num " + (r.maxLossStreak>=8?"ev-neg":"")}>{r.maxLossStreak}</td>
                    <td className={"num " + (r.maxDD<-r.stake*0.3?"ev-neg":"")}>¥{Math.round(r.maxDD).toLocaleString()}</td>
                  </tr>

        <section className="card p-4">

            <ResponsiveContainer>
              <BarChart data={results.map(r=>({name:r.name, "ROI(%)":+(r.roi*100).toFixed(1), "的中率(%)":+(r.hitRate*100).toFixed(1)}))}>

              </BarChart>
            </ResponsiveContainer>

    </div>
  );
}

/* バックテスト本体 (一回分) — PresetCompareView と BacktestView で共有 */
function runBacktestOnce(iter, evMin, perBet, strategy, weights, seedNum) {
  const r = seedRand(seedNum >>> 0);
  let stake=0, ret=0, count=0, hits=0;
  let cum = 0; let maxDD = 0, peak = 0;
  let lossStreak = 0, maxLossStreak = 0;
  let racesAnalyzed = 0, racesSkipped = 0, racesPlayed = 0;
  let raceStakes = 0, raceRets = 0;

  for (let i=0;i<iter;i++) {
    const race = generateRaces("BT")[Math.floor(r()*24)];
    const e = evaluateRace(race, {evMin, weights});
    racesAnalyzed++;
    if (e.skip) { racesSkipped++; continue; }
    const tickets = e.strategies[strategy].picks.filter(t => t.ev >= evMin);
    if (tickets.length === 0) { racesSkipped++; continue; }
    racesPlayed++;
    let raceStake=0, raceRet=0;
    for (const t of tickets) {
      const trueP = Math.max(0.001, Math.min(0.99, t.prob * (0.7 + r()*0.6)));
      const win = r() < trueP;
      stake += perBet; raceStake += perBet; count++;
      if (win) { ret += perBet*t.odds; raceRet += perBet*t.odds; hits++; lossStreak=0; }
      else     { lossStreak++; maxLossStreak = Math.max(maxLossStreak, lossStreak); }
      cum = ret - stake;
      peak = Math.max(peak, cum);
      maxDD = Math.min(maxDD, cum - peak);
    }
    raceStakes += raceStake; raceRets += raceRet;
  }
  return {
    stake, ret, count, hits,
    roi: stake?ret/stake:0, hitRate: count?hits/count:0,
    racesAnalyzed, racesSkipped, racesPlayed,
    raceROI: raceStakes? raceRets/raceStakes : 0,
    maxDD, maxLossStreak,
  };
}

/* =========================================================
   データ品質チェック
   ========================================================= */
function validateRaces(data) {
  const errors = [];   // critical
  const warnings = []; // warning
  if (!Array.isArray(data)) { errors.push("配列形式である必要があります"); return {errors,warnings}; }
  const ids = new Set();
  data.forEach((r, i) => {
    const tag = `[${i}/${r.id||"?"}]`;
    if (!r.id) errors.push(`${tag} id が無い`);
    else if (ids.has(r.id)) errors.push(`${tag} レースID "${r.id}" が重複`);
    else ids.add(r.id);
    if (!r.venue) warnings.push(`${tag} venue が無い`);
    if (!r.date) warnings.push(`${tag} date が無い`);
    if (!r.boats || !Array.isArray(r.boats)) {
      errors.push(`${tag} boats 配列が無い`); return;
    }
    if (r.boats.length !== 6) errors.push(`${tag} 艇数が ${r.boats.length} (6必須)`);
    const boatNos = [...r.boats.map(b => b.boatNo)].sort((a,b)=>a-b);
    if (boatNos.join(",") !== "1,2,3,4,5,6") errors.push(`${tag} 艇番が 1〜6 で揃っていない (${boatNos.join(",")})`);
    r.boats.forEach((b) => {
      const bt = `${tag} ${b.boatNo}号艇`;
      if (b.winRate != null && (b.winRate < 0 || b.winRate > 10)) warnings.push(`${bt} 全国勝率=${b.winRate} は異常値の可能性`);
      if (b.placeRate != null && (b.placeRate < 0 || b.placeRate > 100)) warnings.push(`${bt} 2連対率=${b.placeRate} は異常値`);
      if (b.exTime != null && (b.exTime < 6 || b.exTime > 8)) warnings.push(`${bt} 展示タイム=${b.exTime} は異常値の可能性`);
      if (b.ST != null && (b.ST < 0 || b.ST > 0.5)) warnings.push(`${bt} 平均ST=${b.ST} は異常値`);
      if (b.motor2 != null && (b.motor2 < 0 || b.motor2 > 100)) warnings.push(`${bt} モーター2連率=${b.motor2} は異常値`);
      if (b.boat2 != null && (b.boat2 < 0 || b.boat2 > 100)) warnings.push(`${bt} ボート2連率=${b.boat2} は異常値`);
      if (b.courseWinPct != null && (b.courseWinPct < 0 || b.courseWinPct > 100)) warnings.push(`${bt} コース1着率=${b.courseWinPct} は異常値`);
      if (b.winRate == null) warnings.push(`${bt} winRate が無い`);
      if (b.exTime == null) warnings.push(`${bt} exTime が無い`);
      // 拡張データ (任意項目 — 値があれば範囲チェック)
      if (b.localWinRate != null && (b.localWinRate < 0 || b.localWinRate > 10)) warnings.push(`${bt} 当地勝率=${b.localWinRate} は異常値`);
      if (b.localPlaceRate != null && (b.localPlaceRate < 0 || b.localPlaceRate > 100)) warnings.push(`${bt} 当地2連対率=${b.localPlaceRate} は異常値`);
      if (b.tilt != null && (b.tilt < -1 || b.tilt > 4)) warnings.push(`${bt} チルト=${b.tilt} は異常値 (通常 -0.5〜3.0)`);
      if (b.startExhibition != null && (b.startExhibition < 0 || b.startExhibition > 0.5)) warnings.push(`${bt} スタ展=${b.startExhibition} は異常値`);
      if (b.lapExhibition != null && (b.lapExhibition < 6 || b.lapExhibition > 8)) warnings.push(`${bt} 周回展示=${b.lapExhibition} は異常値`);
      if (b.prevResults != null && !Array.isArray(b.prevResults)) warnings.push(`${bt} prevResults は配列で指定してください`);
      if (b.thisSeriesResults != null && !Array.isArray(b.thisSeriesResults)) warnings.push(`${bt} thisSeriesResults は配列で指定してください`);
      if (b.entryHistory != null && !Array.isArray(b.entryHistory)) warnings.push(`${bt} entryHistory は配列で指定してください`);
      // レーサー履歴データ (任意)
      if (b.recentWinRate != null && (b.recentWinRate < 0 || b.recentWinRate > 10)) warnings.push(`${bt} 近況勝率=${b.recentWinRate} は異常値`);
      if (b.accidentRate != null && (b.accidentRate < 0 || b.accidentRate > 1)) warnings.push(`${bt} 事故率=${b.accidentRate} は異常値 (0〜1の範囲)`);
      if (b.prevClass != null && !["A1","A2","B1","B2"].includes(b.prevClass)) warnings.push(`${bt} prevClass=${b.prevClass} は不正値 (A1/A2/B1/B2)`);
      if (b.prevPrevClass != null && !["A1","A2","B1","B2"].includes(b.prevPrevClass)) warnings.push(`${bt} prevPrevClass=${b.prevPrevClass} は不正値`);
      if (b.last3SeriesResults != null && !Array.isArray(b.last3SeriesResults)) warnings.push(`${bt} last3SeriesResults は配列で指定`);
      if (b.flState != null && !Array.isArray(b.flState) && typeof b.flState !== "string") warnings.push(`${bt} flState は配列または文字列で指定`);
      if (b.courseStats != null && typeof b.courseStats !== "object") warnings.push(`${bt} courseStats はオブジェクト ({1:55,2:16,...}) で指定`);
      // モーター追加情報 (任意)
      if (b.motorRanking != null && (b.motorRanking < 0 || b.motorRanking > 100)) warnings.push(`${bt} motorRanking=${b.motorRanking} は0〜100で指定`);
      if (b.motorTrend != null && !["上昇","下降","横ばい"].includes(b.motorTrend)) warnings.push(`${bt} motorTrend=${b.motorTrend} は上昇/下降/横ばい`);
      if (b.motorType != null && !["出足型","伸び型","バランス型"].includes(b.motorType)) warnings.push(`${bt} motorType=${b.motorType} は出足型/伸び型/バランス型`);
      if (b.avgExhibitionTime != null && (b.avgExhibitionTime < 6 || b.avgExhibitionTime > 8)) warnings.push(`${bt} avgExhibitionTime=${b.avgExhibitionTime} は異常値`);
      if (b.recentUserResults != null && !Array.isArray(b.recentUserResults)) warnings.push(`${bt} recentUserResults は配列で指定`);
      // 地元支部 (任意)
      if (b.branch != null && typeof b.branch !== "string") warnings.push(`${bt} branch は文字列で指定 (例: "群馬", "東京")`);
    });
    // オッズ (任意フィールド) のチェック
    if (r.odds) {
      const flatten = [];
      for (const k of Object.keys(r.odds)) {
        const o = r.odds[k];
        if (typeof o === "object") for (const k2 of Object.keys(o)) flatten.push([k+"/"+k2, o[k2]]);
        else flatten.push([k, o]);
      }
      flatten.forEach(([k,v]) => {
        if (v == null || v === "" || +v <= 0) warnings.push(`${tag} オッズ ${k} が 0/空欄`);
      });
    }
  });
  return { errors, warnings };
}

/* =========================================================
   仮想購入テスト (1週間判定)
   ========================================================= */
function VirtualTestView({ bets, results, races, settings, setSettings }) {
  const [windowDays, setWindowDays] = useState(7);

  // 仮想購入と本購入を分離
  const virtualBets = useMemo(() => bets.filter(b => b.virtual === true), [bets]);
  const realBets    = useMemo(() => bets.filter(b => b.virtual !== true), [bets]);

  // ウィンドウ内 (直近 windowDays 日)
  const cutoff = useMemo(() => {
    const d = new Date(); d.setDate(d.getDate() - windowDays);
    return d.toISOString().slice(0,10);
  }, [windowDays]);
  const windowVirtual = useMemo(() => virtualBets.filter(b => b.date >= cutoff), [virtualBets, cutoff]);
  const windowReal    = useMemo(() => realBets.filter(b => b.date >= cutoff), [realBets, cutoff]);

  function summarize(set) {
    const stake = set.reduce((s,b)=>s+b.stake, 0);
    const ret = set.reduce((s,b)=>s+(b.result==="hit"?b.stake*b.odds:0), 0);
    const hits = set.filter(b => b.result==="hit").length;
    const count = set.length;
    const pending = set.filter(b => b.result==="pending").length;
    // 連敗
    let cur=0, max=0;
    [...set].sort((a,b)=>(a.date+a.id).localeCompare(b.date+b.id)).forEach(b=>{
      if (b.result==="hit") cur=0;
      else if (b.result==="miss") { cur++; max=Math.max(max,cur); }
    });
    // 累計DD
    let cum=0, peak=0, dd=0;
    [...set].sort((a,b)=>(a.date+a.id).localeCompare(b.date+b.id)).forEach(b=>{
      const pnl = (b.result==="hit"? b.stake*b.odds - b.stake : -b.stake);
      cum += pnl;
      peak = Math.max(peak, cum);
      dd = Math.min(dd, cum - peak);
    });
    // ユニークレース
    const uniqRaces = new Set(set.map(b => b.raceId)).size;
    return { stake, ret, hits, count, pending, hitRate: count?hits/count:0, roi: stake?ret/stake:0,
      maxLoss: max, maxDD: dd, races: uniqRaces, pnl: ret-stake };
  }

  const vSummary = summarize(windowVirtual);
  const rSummary = summarize(windowReal);

  // 見送り判断の精度: 結果が登録されていて bets が無いレースは「見送り」
  const judgmentStats = useMemo(() => {
    const inWindow = results.filter(r => r.date >= cutoff);
    const boughtRaceIds = new Set(windowVirtual.concat(windowReal).map(b => b.raceId));
    let buyHit=0, buyMiss=0, skipHit=0, skipMiss=0;
    inWindow.forEach(r => {
      const correct = r.snapshot && r.snapshot.predTop === r.first;
      const bought = boughtRaceIds.has(r.raceId);
      if (bought) { if (correct) buyHit++; else buyMiss++; }
      else        { if (correct) skipHit++; else skipMiss++; }
    });
    const buyAccuracy = (buyHit+buyMiss) ? buyHit/(buyHit+buyMiss) : 0;
    const skipAccuracy = (skipHit+skipMiss) ? skipMiss/(skipHit+skipMiss) : 0; // 見送ったレースで本命が外れたら正解
    return { buyHit, buyMiss, skipHit, skipMiss, buyAccuracy, skipAccuracy, totalRaces: inWindow.length, skippedRaces: inWindow.length - boughtRaceIds.size };
  }, [results, cutoff, windowVirtual, windowReal]);

  // データ鮮度・欠損の品質チェック
  const qualityStats = useMemo(() => {
    let freshCount = 0, oldCount = 0, dataMissCount = 0;
    races.forEach(r => {
      const f = calcFreshness(r);
      if (f.level === "最新") freshCount++;
      else if (["古い","危険"].includes(f.level)) oldCount++;
      r.boats.forEach(b => {
        if (b.exTime == null || b.ST == null || b.motor2 == null || b.winRate == null) dataMissCount++;
      });
    });
    return { freshCount, oldCount, total: races.length, dataMissCount,
      freshRatio: races.length? freshCount/races.length : 0,
      missRatio: races.length? dataMissCount/(races.length*6) : 0 };
  }, [races]);

  // 本運用判定
  const criteria = [
    { key:"roi",        label:"7日間 ROI ≥ 100%",
      pass: vSummary.roi >= 1.00, value:`${(vSummary.roi*100).toFixed(1)}%` },
    { key:"maxLoss",    label:"最大連敗 ≤ 6",
      pass: vSummary.maxLoss <= 6, value:`${vSummary.maxLoss}連敗` },
    { key:"maxDD",      label:"最大DD ≤ 購入額の30%",
      pass: vSummary.stake>0 ? vSummary.maxDD >= -vSummary.stake*0.30 : false,
      value: vSummary.stake>0 ? `${(Math.abs(vSummary.maxDD)/vSummary.stake*100).toFixed(0)}%` : "—" },
    { key:"races",      label:"買いレース数 ≥ 5 (少なすぎない)",
      pass: vSummary.races >= 5, value:`${vSummary.races}レース` },
    { key:"freshness",  label:"データ鮮度: 最新が60%以上",
      pass: qualityStats.freshRatio >= 0.60, value:`${(qualityStats.freshRatio*100).toFixed(0)}%` },
    { key:"missing",    label:"データ欠損率 ≤ 10%",
      pass: qualityStats.missRatio <= 0.10, value:`${(qualityStats.missRatio*100).toFixed(0)}%` },
    { key:"pending",    label:"未確定の仮想購入が無い",
      pass: vSummary.pending === 0, value:`${vSummary.pending}件未確定` },
  ];
  const allPass = criteria.every(c => c.pass);

  function bumpKpi(label, value, pass, sub) {
    return (
      <div className={"card kpi " + (pass?"border-emerald-700":"border-rose-700")}>
        <h4>{label}</h4>
        <div className="v num">{value} {pass ? "✅" : "❌"}</div>
        {sub && <div className="hint mt-1">{sub}</div>}
      </div>
    );
  }

  return (
    <div className="space-y-4 mt-4">
      <section className="card p-4">
        <div className="flex items-center justify-between flex-wrap gap-2 mb-2">
          <h2 className="text-lg font-bold">🧪 仮想購入テスト</h2>
          <div className="flex items-center gap-2">
            <span className="hint text-xs">仮想モード:</span>
            <span className={"pill " + (settings.virtualMode?"badge-honmei":"badge-skip")}>{settings.virtualMode?"ON":"OFF"}</span>
            <button className="btn btn-ghost text-xs" onClick={()=>setSettings({...settings, virtualMode: !settings.virtualMode})}>
              {settings.virtualMode ? "本運用に切替" : "仮想モードに戻す"}
            </button>
          </div>
        </div>
        <div className="info text-sm">
          <b>目的:</b> いきなり実購入は危険なので、最初の1週間は AI 推奨買い目を <b>仮想購入として記録</b>し、本当に長期回収率がプラスになるかを検証します。仮想と本購入は分けて集計します。<b>自動購入・自動ログイン・パスワード保存は実装していません。</b>
          <div className="mt-2 hint text-xs">
            集計ウィンドウ:
            <select className="select inline-block ml-2" style={{width:"auto"}} value={windowDays} onChange={e=>setWindowDays(+e.target.value)}>
              <option value="7">直近7日</option>
              <option value="14">直近14日</option>
              <option value="30">直近30日</option>
            </select>
            <span className="ml-2">起点: {cutoff} 〜 {TODAY}</span>
          </div>
        </div>
      </section>

      {/* 仮想成績サマリ */}
      <section className="card p-4">
        <h3 className="font-bold mb-3">仮想購入成績 ({windowDays}日間)</h3>
        <div className="grid-cards">
          <Kpi label="仮想購入レース数" value={vSummary.races}/>
          <Kpi label="仮想購入件数" value={vSummary.count} sub={`未確定 ${vSummary.pending}件`}/>
          <Kpi label="的中率" value={vSummary.count ? (vSummary.hitRate*100).toFixed(1)+"%" : "—"}/>
          <Kpi label="回収率 (ROI)" value={vSummary.stake ? (vSummary.roi*100).toFixed(1)+"%" : "—"}
               highlight={vSummary.roi>=1}/>
          <Kpi label="収支" value={`¥${Math.round(vSummary.pnl).toLocaleString()}`}
               highlight={vSummary.pnl>=0}/>
          <Kpi label="最大連敗" value={`${vSummary.maxLoss}`} highlight={vSummary.maxLoss>=6}/>
          <Kpi label="最大ドローダウン" value={`¥${Math.round(vSummary.maxDD).toLocaleString()}`}/>
          <Kpi label="見送り数" value={`${judgmentStats.skippedRaces}レース`} sub={`総解析 ${judgmentStats.totalRaces}`}/>
        </div>
      </section>

      {/* 判断精度 */}
      <section className="card p-4">
        <h3 className="font-bold mb-3">判断精度 (本命的中率ベース)</h3>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
          <div className="p-3 rounded bg-[#053527] border border-emerald-700">
            <div className="text-sm font-bold">買い判断の精度</div>
            <div className="text-2xl num font-bold mt-1">{(judgmentStats.buyAccuracy*100).toFixed(1)}%</div>
            <div className="hint text-xs mt-1">買ったレースで本命が1着になった率: {judgmentStats.buyHit}/{judgmentStats.buyHit+judgmentStats.buyMiss}</div>
          </div>
          <div className="p-3 rounded bg-[#0e2440] border border-blue-700">
            <div className="text-sm font-bold">見送り判断の精度</div>
            <div className="text-2xl num font-bold mt-1">{(judgmentStats.skipAccuracy*100).toFixed(1)}%</div>
            <div className="hint text-xs mt-1">見送ったレースで本命が崩れた率: {judgmentStats.skipMiss}/{judgmentStats.skipHit+judgmentStats.skipMiss}</div>
          </div>
        </div>
        <div className="hint text-xs mt-2">
          見送り判断の精度が高いほど「買うべきでないレースを正しく避けている」ことを意味します。買い判断は的中率、見送り判断は本命崩れ検知率で計測。
        </div>
      </section>

      {/* 本運用判定 */}
      <section className="card p-4">
        <h3 className="font-bold mb-3">🎯 本運用判定 (7日間テスト基準)</h3>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-2 mb-3">
          {criteria.map(c => (
            <div key={c.key} className={"p-2 rounded border flex items-center justify-between " + (c.pass?"border-emerald-700 bg-[#053527]":"border-rose-700 bg-[#3b1d1d]")}>
              <div className="text-sm">{c.pass?"✅":"❌"} {c.label}</div>
              <div className="text-sm num font-bold">{c.value}</div>
            </div>
          ))}
        </div>
        {allPass ? (
          <div className="ok">
            <b>✅ 本運用検討OK</b> — 全ての基準を満たしています。ただし、サンプル数が十分でない場合 (買いレース数が10未満など) はもう数日継続することを推奨します。実購入に進む場合も「資金管理設定」の上限を厳守してください。
          </div>
        ) : (
          <div className="warn">
            <b>⚠️ まだ本運用は危険。仮想購入を継続してください。</b><br/>
            未達基準: {criteria.filter(c=>!c.pass).map(c=>c.label).join(" / ")}<br/>

/* =========================================================
   勝負条件AI / 戦略検証エンジン (統合画面)
   ========================================================= */
function WinningConditionsView({ winningConditions, races, evals, bets, results, settings }) {
  const [activeStrategies, setActiveStrategies] = useState(
    Object.fromEntries(Object.keys(STRATEGY_DEFS).map(k => [k, true]))
  );
  const [perBet, setPerBet] = useState(500);

  const ana = winningConditions;

  // 戦略別のシミュレーション (現在の races + 結果ありレースのみで再計算)
  const stratResults = useMemo(() => {
    const out = {};
    for (const [skey, sdef] of Object.entries(STRATEGY_DEFS)) {
      if (!activeStrategies[skey]) continue;
      let stake=0, ret=0, hits=0, count=0, played=0, skipped=0;
      let cur=0, maxLoss=0, cum=0, peak=0, dd=0;
      const conditionStats = {}; // key: "venue:桐生" → {n,hits,stake,ret}
      function bump(condKey, win, st, rt) {
        if (!conditionStats[condKey]) conditionStats[condKey] = {n:0, hits:0, stake:0, ret:0};
        conditionStats[condKey].n++;
        if (win) conditionStats[condKey].hits++;
        conditionStats[condKey].stake += st;
        conditionStats[condKey].ret += rt;
      }
      // 結果が登録されているレースのみ評価対象
      const settledRaces = results.map(r => {
        const race = races.find(x => x.id === r.raceId);
        return race ? { race, result: r } : null;
      }).filter(Boolean);
      for (const {race, result} of settledRaces) {
        const ev = evals[race.id];
        if (!ev) { continue; }
        const tickets = sdef.pick(race, ev);
        if (tickets.length === 0) { skipped++; continue; }
        played++;
        const winningCombo = (k,c)=>{
          if (k==="単勝") return String(result.first);
          if (k==="2連単") return `${result.first}-${result.second}`;
          if (k==="3連単") return `${result.first}-${result.second}-${result.third}`;
          return null;
        };
        for (const t of tickets) {
          const win = t.combo === winningCombo(t.kind);
          stake += perBet; count++;
          const rt = win ? perBet*t.odds : 0;
          ret += rt;
          if (win) { hits++; cur=0; }
          else { cur++; maxLoss = Math.max(maxLoss, cur); }
          cum = ret-stake;
          peak = Math.max(peak, cum);
          dd = Math.min(dd, cum-peak);
          // 条件別集計
          bump(`会場:${race.venue}`, win, perBet, rt);
          bump(`風:${bucketWind(race.wind)}`, win, perBet, rt);
          bump(`波:${bucketWave(race.wave)}`, win, perBet, rt);
          // レース種別 (簡易)
          let mode = "中間戦";
          const b1 = race.boats[0];
          if (b1?.class === "A1" && b1.winRate >= 6.5 && race.wind <= 4) mode = "本命戦";
          else if ((b1?.class === "B1" || b1?.class === "B2") || race.wind > 5) mode = "荒れ戦";
          bump(`種別:${mode}`, win, perBet, rt);
          // 文脈フラグ
          const flags = ev.flags || [];
          if (flags.length===0) bump(`フラグ:なし`, win, perBet, rt);
          else flags.forEach(f => bump(`フラグ:${CONTEXT_FLAGS[f]?.label||f}`, win, perBet, rt));
          // 本命危険度
          const dl = ev.market?.dangerLevel || "—";
          bump(`本命危険度:${dl}`, win, perBet, rt);
          // 鮮度
          bump(`鮮度:${ev.freshness?.level || "—"}`, win, perBet, rt);
          // 過剰人気指数
          const oh = ev.market?.overhypeIndex;
          let ohb = "—";
          if (oh != null) {
            if (oh >= 1.30) ohb = "強い過剰人気";
            else if (oh >= 1.15) ohb = "やや過剰人気";
            else if (oh >= 0.95) ohb = "適正";
            else ohb = "市場過小評価";
          }
          bump(`過剰人気:${ohb}`, win, perBet, rt);
        }
      }
      out[skey] = {
        label: sdef.label, desc: sdef.desc,
        stake, ret, hits, count, played, skipped,
        roi: stake?ret/stake:0, hitRate: count?hits/count:0,
        maxLoss, maxDD: dd, conditionStats,
        pnl: ret - stake,
      };
    }
    return out;
  }, [activeStrategies, races, evals, results, perBet]);

  // 全戦略横断: 勝てる条件 / 負ける条件のランキング (戦略まとめて)
  const condRanking = useMemo(() => {
    const merged = {};
    Object.values(stratResults).forEach(s => {
      Object.entries(s.conditionStats).forEach(([k,v]) => {
        if (!merged[k]) merged[k] = {key:k, n:0, hits:0, stake:0, ret:0};
        merged[k].n+=v.n; merged[k].hits+=v.hits; merged[k].stake+=v.stake; merged[k].ret+=v.ret;
      });
    });
    return Object.values(merged).map(b => ({
      ...b,
      hitRate: b.n? b.hits/b.n : 0,
      roi: b.stake? b.ret/b.stake : 0,
    })).sort((a,b)=>b.roi-a.roi);
  }, [stratResults]);

  const winning = condRanking.filter(c => c.n >= 3 && c.roi >= 1.10);
  const losing  = condRanking.filter(c => c.n >= 3 && c.roi <= 0.90).reverse();
  const dangerous = condRanking.filter(c => c.n >= 5 && c.roi <= 0.70).reverse();

  return (
    <div className="space-y-4 mt-4">
      <section className="card p-4">
        <h2 className="text-lg font-bold mb-2">🎯 勝負条件AI / 戦略検証エンジン</h2>
        <div className="info text-sm">
          <b>このAIの最終目標は「全レースを予想すること」ではありません。</b>
          長期回収率が高くなりやすい条件だけを抽出し、買うべきレースだけを厳選します。各戦略を ON/OFF し、過去結果・仮想購入結果を使って条件別に成績を比較します。
          <ul className="list-disc pl-6 mt-2 text-xs">
            <li>買うレースを増やすより、買わない精度を上げる</li>
            <li>的中率より回収率を重視 / AIが自信のないレースは見送る</li>
            <li>勝負条件外のレースは、たとえ当たりそうでも見送り</li>
          </ul>
        </div>
        <div className="hint text-xs mt-2">
          サンプル数: 結果登録済みレース {results.length}件 / 仮想テストサンプル {ana.sampleSize||0}件
        </div>
      </section>

      {/* 戦略 ON/OFF */}
      <section className="card p-4">
        <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
          <h3 className="font-bold">戦略の有効/無効</h3>
          <div className="flex items-center gap-2">
            <span className="hint text-xs">1点あたり購入額:</span>
            <input className="input" style={{width:90}} type="number" value={perBet} onChange={e=>setPerBet(+e.target.value)}/>
          </div>
        </div>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
          {Object.entries(STRATEGY_DEFS).map(([k, def])=>(
            <label key={k} className={"p-3 rounded border cursor-pointer flex items-start gap-2 " + (activeStrategies[k]?"border-emerald-700 bg-[#053527]":"border-slate-600 bg-[#0f1830]")}>
              <input type="checkbox" checked={activeStrategies[k]} onChange={e=>setActiveStrategies({...activeStrategies, [k]: e.target.checked})}/>
              <div>
                <div className="font-bold text-sm">{def.label}</div>
                <div className="hint text-xs mt-1">{def.desc}</div>
              </div>
            </label>
          ))}
        </div>
      </section>

      {/* 戦略別成績 */}
      <section className="card p-4">
        <h3 className="font-bold mb-3">📊 戦略別の成績 (結果登録済みレース基準)</h3>
        {Object.keys(stratResults).length === 0 ? (
          <div className="info">有効な戦略がありません。</div>
        ) : (
          <div className="overflow-x-auto scrollbar">
            <table>
              <thead><tr>
                <th>戦略</th><th>適用</th><th>見送り</th><th>件数</th><th>的中</th>
                <th>的中率</th><th>ROI</th><th>収支</th><th>最大連敗</th><th>最大DD</th>
              </tr></thead>
              <tbody>
                {Object.entries(stratResults).sort(([,a],[,b])=>b.roi-a.roi).map(([k,s])=>(
                  <tr key={k}>
                    <td className="font-bold">{s.label}</td>
                    <td className="num">{s.played}</td>
                    <td className="num">{s.skipped}</td>
                    <td className="num">{s.count}</td>
                    <td className="num">{s.hits}</td>
                    <td className="num">{s.count? (s.hitRate*100).toFixed(1)+"%":"—"}</td>
                    <td className={"num font-bold " + (s.roi>=1?"ev-pos":"ev-neg")}>
                      {s.stake? (s.roi*100).toFixed(0)+"%" : "—"}
                    </td>
                    <td className={"num " + (s.pnl>=0?"ev-pos":"ev-neg")}>¥{Math.round(s.pnl).toLocaleString()}</td>
                    <td className={"num " + (s.maxLoss>=8?"ev-neg":"")}>{s.maxLoss}</td>
                    <td className="num">¥{Math.round(s.maxDD).toLocaleString()}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
        <div className="hint text-xs mt-2">サンプル数が少ない戦略 (5件未満) は信頼性が低い参考値です。10件以上で初めて意味を持つ数字。</div>
      </section>

      {/* 勝てる条件ランキング */}
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-3">
        <section className="card p-4">
          <h3 className="font-bold mb-3 text-emerald-300">✅ 買ってよい条件 (ROI≥110%)</h3>
          {winning.length === 0 ? <div className="hint text-xs">該当なし — サンプル不足</div> :
          <div className="overflow-x-auto scrollbar">
            <table>
              <thead><tr><th>条件</th><th>n</th><th>ROI</th></tr></thead>
              <tbody>
                {winning.slice(0,12).map(c=>(
                  <tr key={c.key}>
                    <td className="text-xs">{c.key}</td>
                    <td className="num">{c.n}</td>
                    <td className="num ev-pos">{(c.roi*100).toFixed(0)}%</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>}
        </section>
        <section className="card p-4">
          <h3 className="font-bold mb-3 text-rose-300">⚠️ 見送るべき条件 (ROI≤90%)</h3>
          {losing.length === 0 ? <div className="hint text-xs">該当なし</div> :
          <div className="overflow-x-auto scrollbar">
            <table>
              <thead><tr><th>条件</th><th>n</th><th>ROI</th></tr></thead>
              <tbody>
                {losing.slice(0,12).map(c=>(
                  <tr key={c.key}>
                    <td className="text-xs">{c.key}</td>

      {/* 勝負条件 AI 自体のディメンション分析 */}
      {ana.hasData && (

          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            {Object.entries(ana.dims).map(([dimKey, list])=>(
              <div key={dimKey}>
                <h4 className="text-sm font-bold mb-1">{({
                  venue:"会場別", wind:"風速別", wave:"波高別",

                  oddsClass:"オッズ帯", strategy:"購入戦略", kind:"券種",

                })[dimKey] || dimKey}</h4>
                <table>
                  <thead><tr><th>区分</th><th>n</th><th>ROI</th><th>的中率</th></tr></thead>
                  <tbody>
                    {list.slice(0,6).map(b=>(
                      <tr key={b.key}>
                        <td className="text-xs">{b.key}</td>
                        <td className="num">{b.n}</td>

/* エラーバウンダリ: 予期せぬエラーを画面に表示 */
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {error:null, info:null}; }
  static getDerivedStateFromError(error) { return {error}; }
  componentDidCatch(error, info) { this.setState({error, info}); }
  render() {
    if (this.state.error) {
      return (
        <div style={{padding:24, fontFamily:"sans-serif"}}>
          <div className="warn" style={{maxWidth:700, margin:"0 auto"}}>
            <h2 style={{fontWeight:700, fontSize:18, marginBottom:8}}>⚠️ 表示エラーが発生しました</h2>
            <div style={{fontSize:13, marginBottom:8}}>
              アプリの一部でエラーが起きました。サンプルデータの再生成、もしくは画面リロードで復旧する場合があります。
            </div>
            <details style={{fontSize:12, opacity:0.8}}>
              <summary>エラーメッセージ (開発者向け)</summary>
              <pre style={{whiteSpace:"pre-wrap", marginTop:8}}>{String(this.state.error?.stack || this.state.error)}</pre>
            </details>
            <div style={{marginTop:12}}>
              <button className="btn btn-primary" onClick={()=>{
                try { localStorage.removeItem("kyoteiAssistantStateV3"); } catch(e){}
                location.reload();
              }}>localStorage をクリアしてリロード</button>
            </div>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

// boot-screen を消す前にルートをクリア
const rootEl = document.getElementById("root");
const bootScreen = document.getElementById("boot-screen");
if (bootScreen && rootEl) rootEl.removeChild(bootScreen);

ReactDOM.createRoot(rootEl).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
