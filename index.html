function normalize(v, min, max) {
  return Math.max(-0.5, Math.min(1.5, (v - min) / (max - min)));
}

/* スコア計算: 重みと race を引数に取り、風/波の影響もスコアに含める */
function scoreBoat(b, race, weights) {
  const w = weights || DEFAULT_WEIGHTS;
  const factors = {
    全国勝率:    w.winRate   * normalize(b.winRate, 3, 8),
    "2連対率":   w.placeRate * normalize(b.placeRate, 20, 60),
    モーター2連率: w.motor    * normalize(b.motor2, 20, 50),
    ボート2連率:  w.boat     * normalize(b.boat2, 20, 50),
    平均ST:      w.ST       * normalize(0.28 - b.ST, 0, 0.18),
    展示タイム:   w.exTime   * normalize(7.1 - b.exTime, 0, 0.5),
    コース1着率:  w.course   * normalize(b.courseWinPct, 2, 55),
  };
  // 風波の影響: インほどマイナス、外艇ほど相対的にプラス (荒れ要因)
  const innerBoat = b.boatNo <= 2;
  const windExcess = race ? Math.max(0, race.wind - 3) : 0;
  const waveExcess = race ? Math.max(0, race.wave - 4) : 0;
  const windEffect = innerBoat ? -windExcess/5 : windExcess/15;
  const waveEffect = innerBoat ? -waveExcess/10 : waveExcess/30;
  factors["風速影響"] = w.wind * windEffect;
  factors["波高影響"] = w.wave * waveEffect;

  const score = Object.values(factors).reduce((a,b)=>a+b, 0);
  return { score: Math.max(0.001, score), factors };
}

function softmax(arr, temp=1.0) {
  const max = Math.max(...arr);
  const exp = arr.map(x => Math.exp((x-max)/temp));
  const sum = exp.reduce((a,b)=>a+b,0);
  return exp.map(x => x/sum);
}

function plackettLuceTopK(scores, k) {
  function recurse(remainingIdx, depth, prob) {
    if (depth === k) return [{order:[], p:prob}];
    const sm = softmax(remainingIdx.map(i => scores[i]), 1.0);
    const out = [];
    for (let i=0;i<remainingIdx.length;i++) {
      const idx = remainingIdx[i];
      const sub = recurse(remainingIdx.filter(x=>x!==idx), depth+1, prob*sm[i]);
      sub.forEach(s => s.order.unshift(idx));
      out.push(...sub);
    }
    return out;
  }
  return recurse([...Array(scores.length).keys()], 0, 1.0);
}

/* レース全体の「買い理由 / 危険材料」を抽出 */
function diagnoseRace(race, breakdown, winProbs) {
  const reasons = []; // {type:"pos"|"neg"|"neutral", text}
  const top1 = winProbs.indexOf(Math.max(...winProbs));
  const topBoat = race.boats[top1];

  // ── 1号艇分析 (競艇は1コース有利が大前提)
  const b1 = race.boats[0];
  if (b1.class === "A1" && b1.winRate >= 6.5) {
    reasons.push({type:"pos", text:`1号艇がA1級で全国勝率${b1.winRate} — イン逃げが鉄板級の信頼度`});
  } else if (b1.class === "B1" || b1.class === "B2") {
    reasons.push({type:"neg", text:`1号艇が${b1.class}級 (勝率${b1.winRate}) — イン逃げの信頼度が下がり荒れる可能性`});
  }
  if (b1.ST > 0.18) {
    reasons.push({type:"neg", text:`1号艇の平均ST ${b1.ST} がやや遅い — 差し・捲りを許す危険`});
  } else if (b1.ST <= 0.13) {
    reasons.push({type:"pos", text:`1号艇の平均ST ${b1.ST} が早く、スタート信頼度が高い`});
  }
  if (b1.motor2 >= 40) {
    reasons.push({type:"pos", text:`1号艇のモーター2連率 ${b1.motor2}% が高水準 — 機力面でも有利`});
  } else if (b1.motor2 < 28) {
    reasons.push({type:"neg", text:`1号艇のモーター2連率 ${b1.motor2}% が低調 — 機力で差されるリスク`});
  }

  // ── 2-3号艇の脅威度
  const b2 = race.boats[1], b3 = race.boats[2];
  if ((b2.motor2 >= 42 || b2.winRate >= 6.8) && b1.class !== "A1") {
    reasons.push({type:"neg", text:`2号艇 (${b2.class} 勝率${b2.winRate} モーター${b2.motor2}%) の捲り差しに警戒`});
  }
  if (b3.motor2 >= 42 || b3.winRate >= 6.8) {
    reasons.push({type:"neg", text:`3号艇のモーター/勝率が高水準 — 3コースまくりの可能性`});
  }

  // ── 環境条件
  if (race.wind > 6) reasons.push({type:"neg", text:`風速 ${race.wind}m と強風 — 荒れやすい (1号艇不利)`});
  else if (race.wind < 2) reasons.push({type:"pos", text:`風速 ${race.wind}m と穏やか — イン有利が出やすいコンディション`});
  if (race.wave >= 10) reasons.push({type:"neg", text:`波高 ${race.wave}cm — 高波で機力差が出にくく荒れる`});
  if (race.windDir === "向かい風" && race.wind > 4) reasons.push({type:"neg", text:`向かい風${race.wind}m — まくり差しが決まりやすく波乱要因`});
  if (race.windDir === "追い風" && race.wind > 4) reasons.push({type:"neutral", text:`追い風${race.wind}m — 1号艇のイン逃げが決まりやすい一方、スタート難化`});
  if (race.weather === "雨") reasons.push({type:"neg", text:`雨天 — 視界悪化で展示通りに走らない可能性`});

  // ── 本命艇の総合
  const topBreakdown = breakdown[top1];
  const topPosFactors = Object.entries(topBreakdown.factors)
    .filter(([_,v])=>v>0.05).sort((a,b)=>b[1]-a[1]).slice(0,2);
  if (topPosFactors.length>0) {
    reasons.push({type:"pos", text:`本命${top1+1}号艇 ${topBoat.racer} のプラス要因: ${topPosFactors.map(([k,v])=>`${k}(+${v.toFixed(2)})`).join(", ")}`});
  }
  return reasons;
}

/* 文脈フラグによるスコア補正
   各艇のスコア配列に対して係数を掛ける形で補正し、
   「どのフラグで何%補正されたか」を画面表示用に返す */
function applyFlagAdjustments(baseScores, race, flags) {
  const adjusted = baseScores.map(s => s);
  const log = []; // [{flag, label, detail, perBoat:{boatNo: pct}}]
  if (!flags || flags.length === 0) return { adjusted, log };

  function multiply(boatIdx, factor, label, flag) {
    adjusted[boatIdx] = adjusted[boatIdx] * factor;
    const exists = log.find(l => l.flag === flag);
    const entry = exists || (log.push({flag, label:CONTEXT_FLAGS[flag]?.label||flag, perBoat:{}, detail:label}) && log[log.length-1]);
    entry.perBoat[boatIdx+1] = ((factor - 1) * 100);
  }

  if (flags.includes("inner_friendly")) {
    multiply(0, 1.15, "1号艇 +15% (イン特に伸びる水面)", "inner_friendly");
  }
  if (flags.includes("makuri_caution")) {
    multiply(1, 1.08, "2号艇 +8%", "makuri_caution");
    multiply(2, 1.10, "3号艇 +10%", "makuri_caution");
    multiply(3, 1.08, "4号艇 +8%", "makuri_caution");
  }
  if (flags.includes("fixed_lane")) {
    multiply(0, 1.07, "進入固定で1号艇のイン信頼度+7%", "fixed_lane");
  }
  if (flags.includes("volatile")) {
    // 上位艇を抑え、下位艇を持ち上げる (本命過信を下げる)
    const ranked = [...adjusted].map((s,i)=>({s,i})).sort((a,b)=>b.s-a.s);
    multiply(ranked[0].i, 0.92, "上位本命 -8%", "volatile");
    multiply(ranked[5].i, 1.10, "最下位艇 +10%", "volatile");
    multiply(ranked[4].i, 1.05, "下位艇 +5%", "volatile");
  }
  if (flags.includes("yusho")) {
    const ranked = [...adjusted].map((s,i)=>({s,i})).sort((a,b)=>b.s-a.s);
    multiply(ranked[0].i, 1.08, "本命艇 +8% (優勝戦の堅実評価)", "yusho");
    multiply(ranked[5].i, 0.85, "最下位艇 -15% (穴狙い抑制)", "yusho");
    multiply(ranked[4].i, 0.92, "下位艇 -8%", "yusho");
  }
  if (flags.includes("junyusho")) {
    race.boats.forEach((b,i) => {
      if (b.ST <= 0.14) multiply(i, 1.06, "ST≦0.14 +6% (攻めSTを評価)", "junyusho");
      if (b.ST >= 0.20) multiply(i, 0.95, "ST≧0.20 -5% (無理攻めリスク)", "junyusho");
    });
  }
  if (flags.includes("shobugake")) {
    race.boats.forEach((b,i) => {
      if (b.ST <= 0.13) multiply(i, 1.08, "ST≦0.13 +8% (勝負駆けの平均ST重視)", "shobugake");
      if (b.exTime != null && b.exTime <= 6.75) multiply(i, 1.05, "展示≦6.75 +5% (展示気配重視)", "shobugake");
    });
  }
  // shouka: スコア補正なし、信頼度のみ低下

  return { adjusted, log };
}

function predict(race, weights, flags=[], comments={}) {
  const breakdown = race.boats.map(b => scoreBoat(b, race, weights));
  const baseScores = breakdown.map(b => b.score);
  const flagAdj = applyFlagAdjustments(baseScores, race, flags);
  const commentAdj = applyCommentAdjustments(flagAdj.adjusted, race, comments);
  const extAdj = applyExtensionAdjustments(commentAdj.adjusted, race);
  const histAdj = applyRacerHistoryAdjustments(extAdj.adjusted, race);
  const motorAdj = applyMotorAdjustments(histAdj.adjusted, race);
  const regionalAdj = applyRegionalAdjustments(motorAdj.adjusted, race, null);
  const scores = regionalAdj.adjusted;
  const flagLog = flagAdj.log;
  const commentLog = commentAdj.log;
  const extensionLog = extAdj.log;
  const racerHistoryLog = histAdj.log;
  const motorLog = motorAdj.log;
  const regionalLog = regionalAdj.log;
  const venueTrait = regionalAdj.venueTrait;
  const homeBranch = regionalAdj.homeBranch;
  const winProbs = softmax(scores, 0.55);
  const exacta = plackettLuceTopK(scores, 2);
  const trifecta = plackettLuceTopK(scores, 3);
  const overround = 1.25;
  const winOdds = winProbs.map(p => +(1/(p*overround)).toFixed(1));
  const exactaOdds = {};
  exacta.forEach(({order,p}) => exactaOdds[order.map(i=>i+1).join("-")] = +(1/(p*overround)).toFixed(1));
  const trifectaOdds = {};
  trifecta.forEach(({order,p}) => trifectaOdds[order.map(i=>i+1).join("-")] = +(1/(p*overround)).toFixed(1));
  return { scores, baseScores, flagLog, commentLog, extensionLog, racerHistoryLog, motorLog, regionalLog, venueTrait, homeBranch, breakdown, winProbs, exacta, trifecta, winOdds, exactaOdds, trifectaOdds };
}

function classifyTicket(odds) {
  if (odds < 7) return { label:"本命", cls:"badge-honmei" };
  if (odds < 30) return { label:"中穴", cls:"badge-chuana" };
  return { label:"大穴", cls:"badge-ooana" };
}

/* =========================================================
   市場 vs AI ダイバージェンス検出
   - market_prob = (1/odds) を全艇で正規化したもの (控除率を除いた市場推定確率)
   - ai_prob     = AI の予測確率 (winProbs)
   - 差分・比率から「過剰人気」「過小評価 (狙い目)」を判定
   - 1号艇本命が「買ってはいけない本命」かどうかを総合スコア化
   - 本機能の狙いは "当たりそうな艇" を探すことではなく、
     "買ってはいけない人気" を見抜くこと
   ========================================================= */
function detectMarketDivergence(race, pred, sortedTickets, raceFlagsArr) {
  const winProbs = pred.winProbs;
  const winOdds  = pred.winOdds;
  const flags = raceFlagsArr || [];

  // 市場 implied 確率 (overround を1にした正規化)
  const rawMarket = winOdds.map(o => (o>0 ? 1/o : 0));
  const sumMarket = rawMarket.reduce((a,b)=>a+b, 0) || 1;
  const marketProbs = rawMarket.map(m => m/sumMarket);

  // 艇ごとの判定
  const perBoat = winProbs.map((aiP, i) => {
    const mP = marketProbs[i];
    const diff = aiP - mP;                // +なら AI > 市場 (過小評価=妙味)
    const ratio = mP > 0 ? aiP/mP : 1;
    let label, badge;
    if (mP >= 0.10 && diff < -0.05 && ratio < 0.75) { label="過剰人気";          badge="badge-ooana"; }
    else if (mP <= 0.15 && diff > 0.03 && ratio > 1.5) { label="妙味あり (過小評価)"; badge="badge-buy"; }
    else if (Math.abs(diff) < 0.03)                 { label="市場と一致";        badge="badge-skip"; }
    else if (diff > 0.03)                           { label="やや過小評価";       badge="badge-honmei"; }
    else                                            { label="やや過剰人気";       badge="badge-warn"; }
    return {
      boatNo: i+1, racer: race.boats[i].racer,
      aiProb: aiP, marketProb: mP, diff, ratio,
      odds: winOdds[i],
      ev: aiP * winOdds[i],
      label, badge,
    };
  });

  // 市場本命艇 (オッズ最安)
  const popFavIdx = marketProbs.indexOf(Math.max(...marketProbs));
  const popFavBoat = race.boats[popFavIdx];
  const popFavMarket = marketProbs[popFavIdx];
  const popFavAI = winProbs[popFavIdx];
  const popFavOdds = winOdds[popFavIdx];

  // AI本命艇 (AI確率最大)
  const aiTopIdx = winProbs.indexOf(Math.max(...winProbs));

  // 過剰人気指数 (市場本命の market_prob ÷ ai_prob, >1 で過剰人気)
  const overhypeIndex = popFavAI > 0 ? popFavMarket / popFavAI : 1;

  // 平均ダイバージェンス
  const avgDivergence = perBoat.reduce((s,b)=>s+Math.abs(b.diff), 0) / 6;

  // 本命危険度スコア
  let dangerScore = 0;
  const dangerReasons = [];

  // ① 市場とAIで本命がずれている
  if (popFavIdx !== aiTopIdx) {
    dangerScore += 25;
    dangerReasons.push(`市場本命 ${popFavIdx+1}号艇 と AI本命 ${aiTopIdx+1}号艇 が不一致 — 市場が見落としている可能性、または市場が正しい可能性 (要再確認)`);
  }
  // ② 過剰人気の度合い
  if (overhypeIndex > 1.30 && popFavMarket > 0.45) {
    dangerScore += 30;
    dangerReasons.push(`過剰人気指数 ${overhypeIndex.toFixed(2)} — 市場 ${(popFavMarket*100).toFixed(0)}% に対し AI ${(popFavAI*100).toFixed(0)}% で買いすぎ`);
  } else if (overhypeIndex > 1.15 && popFavMarket > 0.40) {
    dangerScore += 15;
    dangerReasons.push(`やや過剰人気 (指数 ${overhypeIndex.toFixed(2)})`);
  }
  // ③ 1号艇人気の場合の追加チェック
  if (popFavIdx === 0) {
    if (popFavBoat.class === "B1" || popFavBoat.class === "B2") {
      dangerScore += 20;
      dangerReasons.push(`1号艇が${popFavBoat.class}級なのに人気が集中`);
    }
    if (popFavBoat.ST != null && popFavBoat.ST > 0.18) {
      dangerScore += 12;
      dangerReasons.push(`1号艇のST(${popFavBoat.ST})が遅い — 過信されている可能性`);
    }
    if (popFavBoat.motor2 != null && popFavBoat.motor2 < 30) {
      dangerScore += 12;
      dangerReasons.push(`1号艇のモーター2連率(${popFavBoat.motor2}%)が低調`);
    }
    // 荒れそうなのに1号艇人気
    if ((race.wind > 4 || race.wave > 7) && popFavMarket > 0.5) {
      dangerScore += 18;
      dangerReasons.push(`風${race.wind}m / 波${race.wave}cm の荒れ条件なのに1号艇に偏った人気`);
    }
    if (flags.includes("volatile") && popFavMarket > 0.5) {
      dangerScore += 12;
      dangerReasons.push(`荒れやすい会場で1号艇に偏った人気 (本命過信)`);
    }
    if (flags.includes("makuri_caution") && popFavMarket > 0.5) {
      dangerScore += 10;
      dangerReasons.push(`まくり警戒水面で1号艇に偏った人気`);
    }
  }
  // ④ オッズが安すぎる
  if (popFavOdds < 1.5 && popFavAI < 0.70) {
    dangerScore += 18;
    dangerReasons.push(`単勝オッズ ${popFavOdds} は安すぎる (AI勝率 ${(popFavAI*100).toFixed(0)}%)`);
  } else if (popFavOdds < 1.3) {
    dangerScore += 25;
    dangerReasons.push(`単勝オッズ ${popFavOdds} はどう見ても妙味なし`);
  }
  // ⑤ EVが低い
  const popFavEV = popFavAI * popFavOdds;
  if (popFavEV < 0.85) {
    dangerScore += 15;
    dangerReasons.push(`市場本命のEV ${popFavEV.toFixed(2)} は控除率割れ — 期待値マイナス`);
  }

  dangerScore = Math.min(100, dangerScore);
  let dangerLevel;
  if (dangerScore >= 60) dangerLevel = "高";
  else if (dangerScore >= 30) dangerLevel = "中";
  else dangerLevel = "低";

  // 妙味あり艇 (value boats)
  const valueBoats = perBoat.filter(b => b.diff > 0.03 && b.ratio > 1.20).sort((a,b)=>b.ratio-a.ratio);
  // 過剰人気艇
  const overhypedBoats = perBoat.filter(b => b.marketProb >= 0.10 && b.diff < -0.04 && b.ratio < 0.80).sort((a,b)=>a.ratio-b.ratio);
  // 狙える穴候補 (低人気だが AI の確率がそれなりにある)
  const sleepers = perBoat.filter(b => b.marketProb < 0.10 && b.aiProb > 0.05 && b.ratio > 1.5).sort((a,b)=>b.aiProb-a.aiProb);
  // 妙味なし買い目 (EVが控除率を下回るもの、人気帯のみ)
  const noValueTickets = sortedTickets.filter(t => t.ev < 0.95 && t.odds < 20).slice(0, 12);
  // 「本命は強いが妙味なしレース」判定
  const strongButNoValue = popFavAI >= 0.55 && popFavEV < 1.00;

  return {
    perBoat, marketProbs,
    popFavIdx, aiTopIdx,
    overhypeIndex, avgDivergence,
    dangerScore, dangerLevel, dangerReasons,
    valueBoats, overhypedBoats, sleepers, noValueTickets,
    strongButNoValue,
  };
}

/* リスク評価 (高EVでも危険な場合に警告) */
function ticketRisk(ticket, race) {
  const flags = [];
  if (ticket.odds >= 50 && ticket.prob < 0.02) flags.push("超低確率の高配当 (分散極大)");
  if (ticket.odds >= 100) flags.push("100倍超の大穴 (ヒット率1%未満)");
  if (race.wind > 6 && ticket.kind === "単勝" && ticket.combo === "1") flags.push("強風時に1号艇単勝はリターン妙味薄");
  if (ticket.ev >= 1.3 && ticket.prob < 0.05) flags.push("EVは高いが当選確率が低くベット回数を稼がないと収束しない");
  return flags;
}

function evaluateRace(race, opts={evMin:1.10, weights:DEFAULT_WEIGHTS, flags:[], comments:{}, conditions:null}) {
  const flags = opts.flags || [];
  const comments = opts.comments || {};
  const pred = predict(race, opts.weights, flags, comments);
  const freshness = calcFreshness(race);
  const commentContradictions = detectCommentContradictions(race, comments);
  const extensionNotes = detectExtensionNotes(race);
  const racerHistoryNotes = detectRacerHistoryNotes(race);
  const motorMismatches = detectMotorMismatches(race, pred.motorLog, /* market計算後 */ null);
  const allTickets = [];
  pred.winProbs.forEach((p,i) => {
    const odds = pred.winOdds[i];
    allTickets.push({ kind:"単勝", combo: String(i+1), prob:p, odds, ev: p*odds });
  });
  pred.exacta.forEach(({order,p}) => {
    const combo = order.map(i=>i+1).join("-");
    const odds = pred.exactaOdds[combo];
    allTickets.push({ kind:"2連単", combo, prob:p, odds, ev: p*odds });
  });
  pred.trifecta.forEach(({order,p}) => {
    const combo = order.map(i=>i+1).join("-");
    const odds = pred.trifectaOdds[combo];
    allTickets.push({ kind:"3連単", combo, prob:p, odds, ev: p*odds });
  });
  const sorted = [...allTickets].sort((a,b)=> b.ev - a.ev);
  const reasons = diagnoseRace(race, pred.breakdown, pred.winProbs);
  const maxEV = sorted[0]?.ev ?? 0;
  const top1Prob = Math.max(...pred.winProbs);
  const skipReasons = [];
  if (maxEV < 1.05) skipReasons.push("最大期待値が1.05未満 — 控除率の壁を超えられない");
  if (top1Prob > 0.7 && pred.winOdds[pred.winProbs.indexOf(top1Prob)] < 1.5) skipReasons.push("圧倒的人気でオッズに妙味がない");
  if (race.wind > 7) skipReasons.push("風速7m超 — 荒れリスク高");
  if (race.wave > 12) skipReasons.push("波高12cm超 — 機力差が出にくい");

  // 文脈フラグ由来のスキップ・閾値補正
  if (flags.includes("shouka") && maxEV < 1.20) skipReasons.push("消化レース + EV不足 — 信頼度が低い");
  if (flags.includes("shouka") && maxEV < 1.05) skipReasons.push("消化レースで予測精度が低下");

  // データ鮮度に応じたスキップ・確認待ち判定
  if (freshness.level === "危険") {
    skipReasons.push("データが危険レベル古さ — 直前情報またはオッズが未取得 (確認待ち)");
  } else if (freshness.level === "古い") {
    skipReasons.push(`データが${freshness.message} — 古いオッズで判定不能の可能性`);
  }

  // 市場ダイバージェンス & 本命危険度
  const market = detectMarketDivergence(race, pred, sorted, flags);
  // モーター市場ミスマッチ (market 計算後に実行)
  const motorMismatchesFinal = detectMotorMismatches(race, pred.motorLog, market);
  if (market.dangerScore >= 60) {
    skipReasons.push(`本命危険度 高 (${market.dangerScore}/100) — 「買ってはいけない本命」の典型: ${market.dangerReasons[0]}`);
  }
  if (market.strongButNoValue && maxEV < 1.10) {
    skipReasons.push("本命は強いが妙味なしレース — オッズが安すぎる");
  }

  // 直前オッズ変動の高度判定
  const oddsMovement = analyzeOddsMovement(race, pred, sorted, market);
  if (oddsMovement.hasHistory) {
    if (oddsMovement.valueScore < 30) {
      skipReasons.push(`直前妙味スコア ${oddsMovement.valueScore.toFixed(0)} (低) — 直前で妙味が大きく失われた`);
    }
    if (oddsMovement.valueLost.length >= 2) {
      skipReasons.push(`直前で${oddsMovement.valueLost.length}艇の妙味が消失 (EV<1.0 に転落)`);
    }
    if (oddsMovement.anomalies.some(a => a.type==="warn") && market.dangerScore >= 30) {
      skipReasons.push("直前オッズ変動の警告と本命危険度が同時発生 — 高リスク");
    }
  }

  // 戦略構築 (フラグで穴抑制 / 攻めスタンスを切り替え)
  let stratEvMin = opts.evMin;
  if (flags.includes("yusho")) stratEvMin = Math.max(stratEvMin, 1.20); // 優勝戦は閾値を上げて穴抑制
  const strategies = buildStrategies(sorted, stratEvMin);
  if (flags.includes("yusho")) {
    // 攻め型から大穴を更に絞る
    strategies.aggressive.picks = strategies.aggressive.picks.filter(t => t.odds < 50);
  }
  if (flags.includes("junyusho")) {
    // 準優は攻めSTが増える → 攻め型と中穴をやや拡大
    strategies.aggressive.picks = sorted.filter(t => t.ev >= Math.max(1.15, opts.evMin) && t.odds >= 7).slice(0,5);
  }

  // AI信頼度 (フラグ・コメント・鮮度を反映)
  const confidence = calcConfidence(race, pred, flags, comments, freshness);

  return {
    pred, sorted, reasons, maxEV,
    skip: skipReasons.length>0, skipReasons,
    awaiting: freshness.awaiting,
    strategies, confidence, flags, market,
    freshness, commentContradictions, comments,
    extensionNotes, oddsMovement,
    racerHistoryNotes,
    motorMismatches: motorMismatchesFinal,
  };
}

/* 評価結果に勝負条件マッチを追加し、SKIP の場合は買い目候補を消す */
function applyConditionGate(evalRes, race, conditionsAnalysis, raceComments, results) {
  // データ準備状態の事前チェック (運用フロー)
  const readiness = checkRaceReadiness(race, raceComments, results);
  evalRes.readiness = readiness;

  let match = matchRaceConditions(race, evalRes, conditionsAnalysis);

  // データ不足の場合は GO/CAUTION でも WAIT に降格
  if (readiness.level === "INSUFFICIENT" && (match.level === "GO" || match.level === "CAUTION")) {
    match = {
      level: "WAIT",
      icon: "⏳",
      reasons: [`データ不足 (準備度 ${(readiness.completeness*100).toFixed(0)}%) — 直前データの取込が必要`,
                ...readiness.criticalMissing.slice(0,2).map(m=>m.label)],
      score: match.score,
      matches: match.matches,
    };
  }

  evalRes.conditionGate = match;
  if (match.level === "SKIP") {
    evalRes.skip = true;
    evalRes.skipReasons = [`🔴 勝負条件外 (条件AI判定: SKIP) — ${match.reasons[0]||""}`, ...evalRes.skipReasons];
    Object.values(evalRes.strategies).forEach(s => { s.picks = []; });
  } else if (match.level === "WAIT") {
    evalRes.awaiting = true;
    evalRes.skipReasons = [`⏳ 勝負条件AI: WAIT — ${match.reasons[0]||""}`, ...evalRes.skipReasons];
  } else if (match.level === "CAUTION") {
    evalRes.skipReasons = [`🟡 勝負条件AI: CAUTION — ${match.reasons[0]||""}`, ...evalRes.skipReasons];
  }
  return evalRes;
}

/* AI信頼度の計算 (高/中/低) */
function calcConfidence(race, pred, flags=[], comments={}, freshness=null) {
  let score = 50; // 0-100
  const reasons = [];

  // データ鮮度
  if (freshness) {
    if (freshness.level === "危険") { score -= 25; reasons.push({type:"neg", text:"データ鮮度: 危険 (直前情報・オッズ未取得)"}); }
    else if (freshness.level === "古い") { score -= 15; reasons.push({type:"neg", text:`データ鮮度: 古い (${freshness.maxStale.toFixed(0)}分前)`}); }
    else if (freshness.level === "やや古い") { score -= 5; reasons.push({type:"neutral", text:`データやや古い (${freshness.maxStale.toFixed(0)}分前)`}); }
    else { reasons.push({type:"pos", text:"データ最新"}); }
  }

  // コメント取得状況
  if (comments && race.boats) {
    const known = race.boats.filter(b => {
      const t = comments[String(b.boatNo)] ?? comments[b.boatNo];
      return t != null && t !== "";
    }).length;
    const unknown = race.boats.length - known;
    if (unknown > 0) { score -= unknown*2; reasons.push({type:"neg", text:`コメント未取得 ${unknown}艇 — 主観情報不足`}); }
    else { score += 4; reasons.push({type:"pos", text:"全艇コメント取得済"}); }
  }

  // 文脈フラグの影響
  if (flags.includes("shouka")) { score -= 20; reasons.push({type:"neg", text:"消化レース — 予測信頼度低下"}); }
  if (flags.includes("volatile")) { score -= 8; reasons.push({type:"neg", text:"荒れやすい会場 — 本命過信を抑制"}); }
  if (flags.includes("yusho")) { score += 8; reasons.push({type:"pos", text:"優勝戦 — 全力勝負で読み易い"}); }
  if (flags.includes("junyusho")) { score += 3; reasons.push({type:"pos", text:"準優勝戦 — 全力勝負"}); }
  if (flags.includes("fixed_lane")) { score += 5; reasons.push({type:"pos", text:"進入固定で読み易い"}); }
  if (flags.includes("shobugake")) { score += 4; reasons.push({type:"pos", text:"勝負駆けでST/展示が真剣"}); }
  if (flags.includes("inner_friendly")) { score += 4; reasons.push({type:"pos", text:"イン有利水面"}); }
  if (flags.includes("makuri_caution")) { score -= 4; reasons.push({type:"neg", text:"まくり警戒水面 — 中艇から差される可能性"}); }

  // データ完備度
  let missing = 0;
  race.boats.forEach(b => {
    if (b.exTime == null || isNaN(b.exTime)) missing++;
    if (b.ST == null || isNaN(b.ST)) missing++;
    if (b.motor2 == null || isNaN(b.motor2)) missing++;
    if (b.winRate == null || isNaN(b.winRate)) missing++;
  });
  if (missing === 0) { score += 15; reasons.push({type:"pos", text:"主要データ完備"}); }
  else { score -= Math.min(40, missing*3); reasons.push({type:"neg", text:`データ欠損 ${missing}件`}); }

  // 気象条件
  if (race.wind > 6) { score -= 15; reasons.push({type:"neg", text:`強風 ${race.wind}m で読み難い`}); }
  else if (race.wind < 3) { score += 5; reasons.push({type:"pos", text:`風速 ${race.wind}m と穏やか`}); }
  if (race.wave > 10) { score -= 12; reasons.push({type:"neg", text:`波高 ${race.wave}cm の荒水面`}); }
  if (race.weather === "雨") { score -= 5; reasons.push({type:"neg", text:"雨天"}); }

  // スコア分散 (差が大きいほど明確)
  const sc = pred.scores;
  const mean = sc.reduce((a,b)=>a+b,0)/sc.length;
  const variance = sc.reduce((a,b)=>a+(b-mean)*(b-mean),0)/sc.length;
  const std = Math.sqrt(variance);
  if (std > 0.18) { score += 10; reasons.push({type:"pos", text:"艇間に明確な実力差"}); }
  else if (std < 0.08) { score -= 10; reasons.push({type:"neg", text:"艇間の差が小さく波乱含み"}); }

  // 本命確率レンジ
  const top1Prob = Math.max(...pred.winProbs);
  if (top1Prob > 0.55 && top1Prob < 0.75) { score += 5; reasons.push({type:"pos", text:"本命の信頼度が手堅い水準"}); }
  else if (top1Prob > 0.85) { reasons.push({type:"neutral", text:"本命が圧倒的人気 — オッズ妙味薄"}); }
  else if (top1Prob < 0.30) { score -= 5; reasons.push({type:"neg", text:"本命確率が低く読みづらい"}); }

  // オッズ健全性
  const oddsZero = pred.winOdds.some(o => o == null || o <= 0 || isNaN(o));
  if (oddsZero) { score -= 30; reasons.push({type:"neg", text:"オッズに異常値"}); }

  score = Math.max(0, Math.min(100, score));
  let level;
  if (score >= 65) level = "高";
  else if (score >= 40) level = "中";
  else level = "低";
  return { level, score, reasons };
}

/* 3戦略 (堅実 / バランス / 攻め) */
function buildStrategies(sorted, evMin) {
  const ev = Math.max(evMin, 1.0);
  const honmei = sorted.filter(t => t.odds < 7);
  const chuana = sorted.filter(t => t.odds >= 7 && t.odds < 30);
  const ooana  = sorted.filter(t => t.odds >= 30);

  const steady = honmei.filter(t => t.ev >= 1.05).slice(0,3);
  const balanced = [
    ...honmei.filter(t => t.ev >= ev).slice(0,2),
    ...chuana.filter(t => t.ev >= ev).slice(0,2),
  ].slice(0,4);
  const aggressive = [
    ...chuana.filter(t => t.ev >= 1.20).slice(0,2),
    ...ooana.filter(t => t.ev >= 1.30).slice(0,3),
  ].slice(0,5);

  return {
    steady:    { label:"堅実型 (本命狙い)",    desc:"オッズ7倍未満のみ。当てやすいが配当は小さく回収率は控えめ。", picks: steady, allocPct: 0.7 },
    balanced:  { label:"バランス型 (本命+中穴)", desc:"本命と中穴を組み合わせ、的中率と回収率のバランスを取る。", picks: balanced, allocPct: 0.45 },
    aggressive:{ label:"攻め型 (中穴/大穴)",     desc:"中穴・大穴中心。当たれば大きいが分散が大きく連敗が長引く。", picks: aggressive, allocPct: 0.25 },
  };
}

/* =========================================================
   3. 資金管理 (安全側強化版)
   - 1日損失上限到達 → 全レース強制見送り
   - 3連敗以上 → 推奨額大幅減 (×0.5)
   - 5連敗以上 → 強制見送り (推奨額0)
   - 倍プッシュ禁止 (実装上ない)
   ========================================================= */
function moneyState(settings, todayPnL, lossStreak) {
  const todayLoss = todayPnL.stake - todayPnL.ret; // 当日の損失額 (プラスなら損)
  const dailyLossHit = todayLoss >= settings.dailyLossLimit;
  const dailyStakeHit = todayPnL.stake >= settings.dailyLimit;
  const forcedSkip = dailyLossHit || dailyStakeHit || lossStreak >= 5;
  const reasons = [];
  if (dailyLossHit) reasons.push(`本日の損失が上限 ¥${settings.dailyLossLimit.toLocaleString()} に到達 — 本日の追加購入は強制見送り`);
  if (dailyStakeHit) reasons.push(`本日の購入額が上限 ¥${settings.dailyLimit.toLocaleString()} に到達 — 本日の追加購入は強制見送り`);
  if (lossStreak >= 5) reasons.push(`${lossStreak} 連敗中 — 5連敗以上で強制見送り (頭を冷やす)`);
  return { forcedSkip, reasons, dailyLossHit, dailyStakeHit, todayLoss };
}

function recommendStake(bankroll, settings, lossStreak, ticketEV, ticketProb, strategyAlloc=0.5, money) {
  if (money?.forcedSkip) return 0;
  const b = settings.assumeOdds || 5;
  const kelly = Math.max(0, (ticketProb*(b+1) - 1) / b);
  let frac = 0.5 * kelly * strategyAlloc;
  // 連敗ペナルティ: 3連敗以上で大幅減 (×0.5), 通常は -10%/連敗
  let penalty = 1;
  if (lossStreak >= 3) penalty = 0.5;
  else penalty = Math.max(0.5, 1 - 0.1*lossStreak);
  frac *= penalty;
  let stake = bankroll * frac;
  stake = Math.min(stake, settings.dailyLimit, settings.perRaceLimit);
  if (ticketEV < settings.evMin) stake = 0;
  stake = Math.floor(stake/100)*100;
  return Math.max(0, stake);
}

/* =========================================================
   結論カード用ヘルパー: 「今、何を買うか」 1 レース分の意思決定を作る
   ========================================================= */
function pickHeadlineRace(races, evals) {
  const annotated = races.map(r => {
    const ev = evals[r.id]; if (!ev) return null;
    const timing = calcRaceTiming(r, ev);
    return { race: r, ev, timing, mins: timing.minutesToStart };
  }).filter(Boolean);
  if (annotated.length === 0) return null;
  const upcoming = annotated.filter(x => !x.timing.finished);
  const pool = upcoming.length ? upcoming : annotated;
  const score = (lvl) => ({ "GO":4, "CAUTION":3, "WAIT":2, "SKIP":1 }[lvl] || 0);
  pool.sort((a, b) => {
    const la = score(a.ev?.conditionGate?.level);
    const lb = score(b.ev?.conditionGate?.level);
    if (la !== lb) return lb - la;
    return (a.mins ?? 9999) - (b.mins ?? 9999);
  });
  return pool[0] || null;
}

/* リスク感覚別の本命/押さえ/穴 配分比 (合計1) */
const RISK_ALLOC = {
  steady:     { 本命: 0.70, 押さえ: 0.30, 穴狙い: 0.00, label: "堅め (本命中心)" },
  balanced:   { 本命: 0.50, 押さえ: 0.35, 穴狙い: 0.15, label: "標準 (本命+押さえ+少し穴)" },
  aggressive: { 本命: 0.35, 押さえ: 0.30, 穴狙い: 0.35, label: "穴狙い (配当重視)" },
};

function buildBuyRecommendation(race, evalRes, settings, lossStreak, money, remainingDaily) {
  if (!race || !evalRes) return null;
  const gate = evalRes.conditionGate?.level;
  const verdict = (gate === "SKIP" || (evalRes.skip && gate !== "GO")) ? "skip"
                : (gate === "WAIT" || evalRes.awaiting) ? "wait"
                : (gate === "CAUTION") ? "caution"
                : (gate === "GO") ? "buy" : "neutral";
  const profile = settings.riskProfile || "balanced";
  const alloc = RISK_ALLOC[profile] || RISK_ALLOC.balanced;
  const strategies = evalRes.strategies || {};
  const lock = !!money?.forcedSkip;
  // 1レース上限 = min(perRaceLimit, 残り日次予算)
  const raceCap = Math.max(0, Math.min(settings.perRaceLimit || 0, remainingDaily || 0));

  function pickFrom(name, role) {
    const s = strategies[name]; if (!s || !(s.picks || []).length) return null;
    const t = s.picks[0];
    return { role, kind: t.kind, combo: t.combo, prob: t.prob, odds: t.odds, ev: t.ev, strategy: name };
  }
  const honmei = pickFrom("steady",     "本命");
  const osae   = pickFrom("balanced",   "押さえ");
  const ana    = pickFrom("aggressive", "穴狙い");

  // 見送り/確認待ち/強制スキップなら買い目なし
  if (verdict === "skip" || verdict === "wait" || lock || raceCap <= 0) {
    return { verdict, items: [], total: 0, gate, lock, profile, raceCap, alloc };
  }

  const candidates = [];
  if (honmei && alloc.本命 > 0) candidates.push({ ...honmei, allocPct: alloc.本命 });
  if (osae && alloc.押さえ > 0 && (!honmei || osae.combo !== honmei.combo)) candidates.push({ ...osae, allocPct: alloc.押さえ });
  if (ana && alloc.穴狙い > 0 && ana.ev >= 1.20
      && (!honmei || ana.combo !== honmei.combo)
      && (!osae   || ana.combo !== osae.combo)) candidates.push({ ...ana, allocPct: alloc.穴狙い });

  // EV閾値を満たさない候補は配分から除外
  const live = candidates.filter(c => c.ev >= settings.evMin);
  const sumAlloc = live.reduce((a, b) => a + b.allocPct, 0) || 1;
  // raceCap をリスク配分に従って割り振り、100円単位に丸める
  live.forEach(c => {
    const portion = c.allocPct / sumAlloc;
    c.stake = Math.floor((raceCap * portion) / 100) * 100;
  });
  // 端数で raceCap を超えないようチェック (丸め誤差吸収)
  let total = live.reduce((a, b) => a + b.stake, 0);
  while (total > raceCap && live.length > 0) {
    const last = live[live.length - 1];
    if (last.stake <= 100) break;
    last.stake -= 100; total -= 100;
  }
  return { verdict, items: live, total, gate, lock, profile, raceCap, alloc };
}

    // 既存結果を上書き / 追加
    const snapshot = {
      predTop: evalRes.pred.winProbs.indexOf(Math.max(...evalRes.pred.winProbs))+1,
      predProb: Math.max(...evalRes.pred.winProbs),
      maxEV: evalRes.maxEV,
      skip: evalRes.skip,
      skipReasons: evalRes.skipReasons,
    };
    const result = { raceId, date: race.date, venue: race.venue, raceNo: race.raceNo,
      first, second, third, payouts, snapshot, reflections, memo: memo||"" };
    setResults(prev => {
      const filtered = prev.filter(r => r.raceId !== raceId);
      return [...filtered, result];
    });
    // 同レースの bets を精算
    let newLossStreak = lossStreak;
    setBets(prev => prev.map(b => {
      if (b.raceId !== raceId) return b;
      const winCombo = winningComboFor(b.kind, first, second, third);
      const hit = b.combo === winCombo;
      // 払戻の上書き (ユーザ入力があれば反映)
      let realOdds = b.odds;
      if (hit && payouts) {
        if (b.kind === "単勝" && payouts.tan && payouts.tan[b.combo]) realOdds = payouts.tan[b.combo]/100;
        if (b.kind === "2連単" && payouts.exacta && payouts.exacta[b.combo]) realOdds = payouts.exacta[b.combo]/100;
        if (b.kind === "3連単" && payouts.trifecta && payouts.trifecta[b.combo]) realOdds = payouts.trifecta[b.combo]/100;
      }
      if (hit) newLossStreak = 0; else newLossStreak += 1;
      return {...b, result: hit?"hit":"miss", odds: realOdds};
    }));
    // 連敗の累積は順次計算が必要なので簡易にここでは setLossStreak で確定値を入れる
    // (より厳密には 全 bets を時系列で再計算してもよい)
    setLossStreak(newLossStreak);
  }
  function winningComboFor(kind, first, second, third) {
    if (kind === "単勝") return String(first);
    if (kind === "2連単") return `${first}-${second}`;
    if (kind === "3連単") return `${first}-${second}-${third}`;
    return "";
  }

  /* ダッシュボードからの「この買い目で記録」一括記録 */
  function quickRecordRecommendation(race, items) {
    if (!race || !items || !items.length) return 0;
    const stamp = new Date().toISOString();
    setBets(prev => [
      ...prev,
      ...items.filter(it => it.stake > 0).map(it => ({
        id: Math.random().toString(36).slice(2,10),
        date: race.date, raceId: race.id, venue: race.venue, raceNo: race.raceNo,
        kind: it.kind, combo: it.combo,
        stake: it.stake, odds: it.odds, prob: it.prob, ev: it.ev,
        strategy: it.strategy || it.role,
        result: "pending",
        virtual: !!settings.virtualMode,
        recordedAt: stamp,
      })),
    ]);
    // 各候補の decision 状態も即時反映
    const newDec = {...decisions};
    items.filter(it => it.stake > 0).forEach(it => {
      const key = `${race.id}|${it.kind}|${it.combo}|${it.strategy || it.role}`;
      newDec[key] = "bought";
    });
    setDecisions(newDec);
    return items.filter(it => it.stake > 0).length;
  }

  return (
    <div className="min-h-screen">
      <Header onShowWelcome={()=>setWelcomeSeen(false)} />
      {/* 初回: 資産・予算・リスク感覚を入力するウィザード (これが最優先) */}

        <OnboardingWizard settings={settings} setSettings={setSettings}

            setSettings(prev => ({...prev, assetInputDone: true}));
          }}/>

      {settings.assetInputDone && !welcomeSeen && (

          <span className="font-bold">{settings.virtualMode ? "🧪 仮想購入モード" : "💰 本運用モード"}</span>
          <span className="text-xs">
            {settings.virtualMode
              ? "実際の券は買わず、AI推奨買い目を仮想で記録します。最初の1週間はこちらを推奨。"
              : "本運用中。仮想購入と本購入は分けて集計されます。"}
          </span>
          <button className="btn btn-ghost text-xs ml-auto" onClick={()=>setSettings({...settings, virtualMode: !settings.virtualMode})}>
            {settings.virtualMode ? "本運用に切替" : "仮想モードに戻す"}
          </button>

      </div>
      {money.forcedSkip && (

            🔒 本日は強制見送りモードです: {money.reasons.join(" / ")}
          </div>
        </div>
      )}
      <Nav tab={tab} setTab={setTab} />
      <main className="max-w-7xl mx-auto px-4 pb-20">
        {tab === "dashboard" && (

            lastRefreshAt={lastRefreshAt}

            onRefreshAll={refreshAll} onRecalc={manualRecalc}

        )}
        {tab === "weekly" && (

        {tab === "race" && (

          <div className="overflow-x-auto scrollbar">
          <table>
            <thead><tr>
              <th>会場</th><th>R</th><th>発走</th>
              <th>勝負条件AI</th>
              <th>本命艇 (1着確率)</th><th>最高EV</th><th>過剰人気</th><th>本命危険度</th><th>信頼度</th><th>鮮度</th><th></th>
            </tr></thead>
            <tbody>
              {featured.map(({race,e}) => {
                const top = e.pred.winProbs.indexOf(Math.max(...e.pred.winProbs));
                const topBoat = race.boats[top];
                const m = e.market;
                const ohClass = m && m.overhypeIndex>=1.30?"ev-neg":(m && m.overhypeIndex>=1.15?"text-amber-400":"");
                return (
                  <tr key={race.id} className="hover:bg-[#162241]">
                    <td>{race.venue}
                      {(e.flags||[]).length>0 && (
                        <span className="ml-1">
                          {e.flags.map(f => <span key={f} title={CONTEXT_FLAGS[f]?.label}>{CONTEXT_FLAGS[f]?.icon}</span>)}
                        </span>
                      )}
                    </td>
                    <td>{race.raceNo}R</td><td className="num">{race.startTime}</td>
                    <td>
                      {e.conditionGate && (
                        <span className={"pill " + (
                          e.conditionGate.level==="GO"      ? "badge-buy" :
                          e.conditionGate.level==="CAUTION" ? "badge-warn" :
                          e.conditionGate.level==="SKIP"    ? "badge-ooana" : "badge-skip"
                        )}>
                          {e.conditionGate.icon} {e.conditionGate.level}
                        </span>
                      )}
                    </td>
                    <td>{top+1}号艇 {topBoat.racer} <span className="hint">({(e.pred.winProbs[top]*100).toFixed(1)}%)</span></td>
                    <td className={"num " + (e.maxEV>=1.1?"ev-pos":(e.maxEV<1?"ev-neg":""))}>{e.maxEV.toFixed(2)}</td>
                    <td className={"num " + ohClass}>{m ? m.overhypeIndex.toFixed(2)+"×" : "—"}</td>
                    <td>{m && (
                      <span className={"pill " + (m.dangerLevel==="高"?"badge-ooana":(m.dangerLevel==="中"?"badge-warn":"badge-buy"))}>
                        {m.dangerLevel}
                      </span>
                    )}</td>
                    <td><span className={"pill conf-"+e.confidence.level}>{e.confidence.level}</span></td>
                    <td><span className={"pill " + (
                      e.freshness.level==="最新"?"badge-buy":
                      e.freshness.level==="やや古い"?"badge-warn":
                      e.freshness.level==="古い"?"badge-chuana":"badge-ooana"
                    )}>{e.freshness.level}</span></td>
                    <td><button className="btn btn-ghost" onClick={()=>onPick(race.id)}>分析を見る →</button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          </div>
        </section>
      )}
    </div>
  );
}

/* ========== 直前オッズ変動の高度判定 表示 ========== */
function OddsMovementView({ race, oddsMovement, sorted }) {
  if (!oddsMovement?.hasHistory) {
    return (
      <section className="card p-4">
        <h3 className="font-bold mb-2">📈 直前オッズ変動の高度判定</h3>
        <div className="info text-xs">
          まだオッズ履歴がありません。「データ更新」タブで <b>直前オッズの取り込み (JSON)</b> を実施するか、レース上部の「🔄 直前情報を取込済にする」を押すと、前回オッズと比較した変動分析が出ます。<br/>
          想定運用: 締切15分前 → 10分前 → 5分前 → 3分前のタイミングで取り込み、各時点で「妙味が消えていないか」を再判定します。
        </div>
      </section>
    );
  }
  const m = oddsMovement;
  const scoreCls = m.valueScoreLabel === "高" ? "badge-buy" : (m.valueScoreLabel === "中" ? "badge-warn" : "badge-ooana");

  function dirCls(d) {
    if (d === "急落") return "ev-neg";
    if (d === "下落") return "text-rose-300";
    if (d === "急上昇") return "ev-pos";
    if (d === "上昇") return "text-emerald-300";
    return "hint";
  }

  return (
    <section className="card p-4">
      <div className="flex items-center justify-between mb-2 flex-wrap gap-2">
        <h3 className="font-bold">📈 直前オッズ変動の高度判定</h3>
        <div className="flex items-center gap-2">
          <span className="hint text-xs">直前妙味スコア:</span>
          <span className={"pill text-sm " + scoreCls}>{m.valueScoreLabel} ({m.valueScore.toFixed(0)}/100)</span>
          {m.oddsStale && <span className="pill badge-ooana text-xs">⏳ オッズ更新が古い</span>}
        </div>
      </div>
      <div className="hint text-xs mb-3">
        前回取込オッズと現在オッズを比較し、「妙味消失」「妙味維持」「直前売れ過ぎ」「オッズ残存」を自動分類します。<b>これは購入判断のための直前確認機能で、自動購入はしません。</b>
      </div>

      {m.oddsStale && (
        <div className="alert text-xs mb-3">
          ⏳ オッズ更新が15分以上経過しています ({m.oddsAgeMin?.toFixed(0)}分前)。<b>確認待ち推奨</b> — 「データ更新」タブで再取込してから判定してください。
        </div>
      )}

      {/* オッズ変動率 (艇別) */}
      <div className="overflow-x-auto scrollbar mb-4">
        <table>
          <thead><tr>
            <th>艇</th><th>選手</th><th>前回オッズ</th><th>現在オッズ</th><th>変動率</th>
            <th>方向</th><th>AI確率</th><th>前EV</th><th>現EV</th><th>EV変化</th>
          </tr></thead>
          <tbody>
            {m.winMoves.map(mv => (
              <tr key={mv.boatNo}>
                <td className="font-bold">{mv.boatNo}</td>
                <td className="hint">{mv.racer}</td>
                <td className="num">{mv.prev}</td>
                <td className="num font-bold">{mv.curr}</td>
                <td className={"num " + dirCls(mv.direction)}>
                  {mv.changePct>=0?"+":""}{mv.changePct.toFixed(0)}%
                </td>
                <td><span className={"pill " + dirCls(mv.direction)}>{mv.direction}</span></td>
                <td className="num">{(mv.aiProb*100).toFixed(1)}%</td>
                <td className="num">{mv.prevEV.toFixed(2)}</td>
                <td className={"num " + (mv.currEV>=1?"ev-pos":"ev-neg")}>{mv.currEV.toFixed(2)}</td>
                <td className={"num " + ((mv.currEV-mv.prevEV)>=0?"ev-pos":"ev-neg")}>

                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* 不自然なオッズ変動 */}
      {m.anomalies.length > 0 && (
        <div className="mb-3">

              {a.type==="warn"?"⚠️":(a.type==="good"?"✅":"💡")} {a.text}
            </div>
          ))}
        </div>
      )}

        <div className="p-3 rounded bg-[#3b1d1d] border border-rose-700">

          {m.rushed.length === 0 ? <div className="hint text-xs mt-1">該当なし</div> :
            <ul className="text-xs mt-2 space-y-1">
              {m.rushed.map((r,i)=>(
                <li key={i}><b>{r.boatNo}号艇</b> {r.prev}→{r.curr} <span className="ev-neg">({r.changePct.toFixed(0)}%)</span> — EV {r.prevEV.toFixed(2)}→{r.currEV.toFixed(2)}</li>
              ))}

        </div>
        <div className="p-3 rounded bg-[#1e293b] border border-cyan-700">
          <div className="text-sm font-bold text-cyan-300">💎 オッズが残っている艇 ({m.remaining.length}件)</div>
          {m.remaining.length === 0 ? <div className="hint text-xs mt-1">該当なし</div> :
            <ul className="text-xs mt-2 space-y-1">
              {m.remaining.map((r,i)=>(
                <li key={i}><b>{r.boatNo}号艇</b> {r.prev}→{r.curr} <span className="ev-pos">(+{r.changePct.toFixed(0)}%)</span> — AI {(r.aiProb*100).toFixed(0)}% / EV {r.currEV.toFixed(2)}</li>
              ))}
            </ul>}
        </div>
        <div className="p-3 rounded bg-[#3a2d0a] border border-amber-700">
          <div className="text-sm font-bold text-amber-300">⛔ 妙味が消えた買い目 (単勝)</div>
          {m.valueLost.length === 0 ? <div className="hint text-xs mt-1">該当なし</div> :
            <ul className="text-xs mt-2 space-y-1">
              {m.valueLost.map((v,i)=>(
                <li key={i}><b>{v.boatNo}号艇</b> EV {v.prevEV.toFixed(2)}→<span className="ev-neg">{v.currEV.toFixed(2)}</span> (オッズ {v.prev}→{v.curr})</li>
              ))}
            </ul>}
          <div className="hint text-xs mt-2">EV ≧ 1.10 だった買い目が EV&lt;1.0 に転落 — 「直前で妙味が消えた」買い目です。買わない方が良い。</div>
        </div>
        <div className="p-3 rounded bg-[#053527] border border-emerald-700">
          <div className="text-sm font-bold text-emerald-300">✅ 妙味が維持されている買い目 (単勝)</div>
          {m.valueKept.length === 0 ? <div className="hint text-xs mt-1">該当なし</div> :
            <ul className="text-xs mt-2 space-y-1">
              {m.valueKept.map((v,i)=>(
                <li key={i}><b>{v.boatNo}号艇</b> EV <span className="ev-pos">{v.currEV.toFixed(2)}</span> (オッズ {v.prev}→{v.curr})</li>
              ))}
            </ul>}
          <div className="hint text-xs mt-2">EV ≧ 1.15 を維持し、直前のオッズ下落も -10% 以内。<b>買う直前に確認すべき買い目</b>です。</div>
        </div>
      </div>

      {/* 穴目で残存している艇 */}
      {m.remainingSleepers.length > 0 && (
        <div className="p-3 rounded bg-[#0e2440] border border-blue-700 mb-3">
          <div className="text-sm font-bold text-blue-300">🎯 オッズが残っている穴 (AI評価 + 妙味)</div>
          <ul className="text-xs mt-2 space-y-1">
            {m.remainingSleepers.map((s,i)=>(
              <li key={i}><b>{s.boatNo}号艇</b> オッズ {s.prev}→{s.curr} / AI {(s.aiProb*100).toFixed(1)}% / EV <span className="ev-pos">{s.currEV.toFixed(2)}</span></li>
            ))}
          </ul>
          <div className="hint text-xs mt-2">10倍以上のオッズが残り、AI が一定以上の確率を見ている穴。「市場が見落としている可能性」のある妙味です。</div>
        </div>
      )}

      {/* 直前確認チェックリスト */}
      <div className="info text-xs">
        <b>📋 直前確認チェックリスト (人間が最後に確認):</b>
        <ol className="list-decimal pl-6 mt-1 space-y-1">
          <li>妙味維持の買い目が、現在もEV ≧ 1.10 を保っているか</li>
          <li>妙味消失の買い目に該当する券を買おうとしていないか</li>
          <li>本命艇のオッズが直前で急落していないか (過剰人気の最終チェック)</li>
          <li>不自然な複数艇同時急落が起きていないか</li>
          <li>オッズ更新時刻が締切3〜5分前以内か</li>
        </ol>
      </div>
    </section>
  );
}

/* ========== 運用フロー画面 ========== */
function OperationFlowView({ races, evals, results, raceComments, bets, onPick }) {
  const [tick, setTick] = useState(0);
  useEffect(() => { const id = setInterval(()=>setTick(x=>x+1), 60000); return ()=>clearInterval(id); }, []);

  const enriched = useMemo(() => races.map(r => {
    const ev = evals[r.id];
    const timing = calcRaceTiming(r, ev);
    return { race:r, ev, timing };
  }), [races, evals, tick]);

  const goRaces      = enriched.filter(x => x.ev?.conditionGate?.level === "GO" && !x.timing.finished);
  const waitRaces    = enriched.filter(x => x.ev?.conditionGate?.level === "WAIT" && !x.timing.finished);
  const skipRaces    = enriched.filter(x => x.ev?.conditionGate?.level === "SKIP" && !x.timing.finished);
  const cautionRaces = enriched.filter(x => x.ev?.conditionGate?.level === "CAUTION" && !x.timing.finished);
  const insufficient = enriched.filter(x => x.ev?.readiness?.level === "INSUFFICIENT" && !x.timing.finished);

  // 7日間仮想テスト進捗
  const sevenDayProgress = useMemo(() => {
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-7);
    const cutoffStr = cutoff.toISOString().slice(0,10);
    const inWin = bets.filter(b => b.virtual && b.date >= cutoffStr);
    const settled = inWin.filter(b => b.result === "hit" || b.result === "miss");
    const stake = settled.reduce((s,b)=>s+b.stake,0);
    const ret = settled.reduce((s,b)=>s+(b.result==="hit"?b.stake*b.odds:0),0);
    const races = new Set(inWin.map(b=>b.raceId));
    let cur=0, max=0;
    [...settled].sort((a,b)=>(a.date+a.id).localeCompare(b.date+b.id)).forEach(b=>{
      if (b.result==="hit") cur=0; else { cur++; max=Math.max(max,cur); }
    });
    const days = new Set(inWin.map(b=>b.date)).size;
    return { count: inWin.length, settled: settled.length, races: races.size, days,
      stake, ret, roi: stake?ret/stake:0, maxLoss: max };
  }, [bets]);

  const productionReady = sevenDayProgress.days >= 7 && sevenDayProgress.roi >= 1.0 && sevenDayProgress.maxLoss <= 6 && sevenDayProgress.races >= 5;

  return (
    <div className="space-y-4 mt-4">
      <section className="card p-4">
        <h2 className="text-lg font-bold mb-2">📋 実運用フロー (使用手順)</h2>
        <div className="info text-sm">
          <b>このAIは「全レース予想AI」ではなく、勝てる条件だけやるAIです。</b>データの取得タイミングを守らないと判定精度が落ちます。
        </div>
      </section>

      {/* タイムライン */}
      <section className="card p-4">
        <h3 className="font-bold mb-3">🕐 1日の使用タイムライン</h3>
        <div className="grid grid-cols-1 md:grid-cols-5 gap-2">
          <div className="p-3 rounded bg-[#0f1830] border border-blue-700">
            <div className="text-xs hint">朝</div>
            <div className="font-bold text-sm">出走表 / 選手 / モーター / ボート / レーサー履歴</div>
            <div className="hint text-xs mt-1">CSV/JSON 取込から</div>
          </div>
          <div className="p-3 rounded bg-[#0f1830] border border-cyan-700">
            <div className="text-xs hint">展示後</div>
            <div className="font-bold text-sm">展示タイム / 気配 / チルト / 部品交換 / コメント</div>
            <div className="hint text-xs mt-1">レース詳細→各艇に入力</div>
          </div>
          <div className="p-3 rounded bg-[#0f1830] border border-amber-700">
            <div className="text-xs hint">締切15分前</div>
            <div className="font-bold text-sm">オッズ更新 (1回目)</div>
            <div className="hint text-xs mt-1">「データ更新」タブで取込</div>
          </div>
          <div className="p-3 rounded bg-[#0f1830] border border-orange-700">
            <div className="text-xs hint">締切5〜10分前</div>
            <div className="font-bold text-sm">オッズ最終確認</div>
            <div className="hint text-xs mt-1">直前妙味スコア確認</div>
          </div>
          <div className="p-3 rounded bg-[#0f1830] border border-emerald-700">
            <div className="text-xs hint">レース後</div>
            <div className="font-bold text-sm">結果 / 払戻 / 反省ログ</div>
            <div className="hint text-xs mt-1">「結果入力」タブから</div>
          </div>
        </div>
      </section>

      {/* レース前チェックリスト */}
      <section className="card p-4">
        <h3 className="font-bold mb-3">✅ レース前チェックリスト (各レースで必ず確認)</h3>
        <ol className="list-decimal pl-6 text-sm space-y-1">

                    </div>
                  </td>
                  <td className="text-xs hint">{ev.readiness.criticalMissing.slice(0,2).map(m=>m.label).join(" / ") || "—"}</td>
                  <td><button className="btn btn-ghost text-xs" onClick={()=>onPick(race.id)}>更新</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>}
      </section>

      {/* 7日間テスト進捗 */}
      <section className="card p-4">
        <h3 className="font-bold mb-3">🧪 仮想購入7日間テスト 進捗</h3>
        <div className="grid-cards">
          <Kpi label="経過日数" value={`${sevenDayProgress.days}/7日`} highlight={sevenDayProgress.days>=7}/>
          <Kpi label="買ったレース" value={`${sevenDayProgress.races}件`} highlight={sevenDayProgress.races>=5}/>
          <Kpi label="ROI" value={sevenDayProgress.stake?(sevenDayProgress.roi*100).toFixed(0)+"%":"—"} highlight={sevenDayProgress.roi>=1}/>
          <Kpi label="最大連敗" value={`${sevenDayProgress.maxLoss}`} highlight={sevenDayProgress.maxLoss>=6}/>
        </div>
        <div className="mt-3">
          {productionReady ? (
            <div className="ok"><b>✅ 本運用検討OK</b> — 7日間テストの主要基準を満たしています。実購入に進む場合も上限を厳守。</div>
          ) : (
            <div className="warn"><b>⚠️ 本運用はまだ早い</b> — 7日経過/ROI≧100%/最大連敗≦6/買い5件以上 を満たしてから検討してください。</div>
          )}
        </div>
      </section>
    </div>
  );
}

/* ========== 初回 資産入力ウィザード ========== */
function OnboardingWizard({ settings, setSettings, onClose }) {
  const [bankroll,    setBankroll]    = useState(settings.bankroll || 50000);
  const [dailyLimit,  setDailyLimit]  = useState(settings.dailyLimit || 10000);
  const [perRace,     setPerRace]     = useState(settings.perRaceLimit || 2000);
  const [risk,        setRisk]        = useState(settings.riskProfile || "balanced");
  const [virt,        setVirt]        = useState(settings.virtualMode !== false);
  const ratio = bankroll > 0 ? (dailyLimit/bankroll*100).toFixed(1) : "—";
  function save() {
    setSettings({...settings,
      bankroll: +bankroll || 0,
      dailyLimit: +dailyLimit || 0,
      perRaceLimit: +perRace || 0,
      dailyLossLimit: Math.min(settings.dailyLossLimit || 5000, +dailyLimit*0.6 || 5000),
      riskProfile: risk,
      virtualMode: !!virt,
      assetInputDone: true,
    });
    onClose();
  }
  return (
    <div style={{position:"fixed", inset:0, background:"rgba(11,18,32,0.92)", zIndex:60,
      display:"flex", alignItems:"center", justifyContent:"center", padding:16, backdropFilter:"blur(4px)"}}>
      <div className="card" style={{maxWidth:560, width:"100%", padding:24, border:"2px solid #22d3ee"}}>
        <div className="text-center mb-3">
          <div style={{fontSize:48, lineHeight:1}}>💼</div>
          <h2 className="text-xl font-bold mt-2">あなたのお金の設定 (はじめに 1度だけ)</h2>
          <div className="hint text-sm mt-1">この情報をもとに「いくらまで使うか / 何を買うか」を毎レース計算します</div>
        </div>
        <div className="space-y-3 text-sm">
          <div>
            <label className="hint">現在の資産 (円)</label>
            <input className="input mt-1 num" type="number" value={bankroll} onChange={e=>setBankroll(e.target.value)} placeholder="例 50000"/>

                {k:"balanced",   icon:"⚖️", title:"標準",   desc:"50 / 35 / 15"},

              ].map(o => (
                <button key={o.k} className={"p-2 rounded-lg border-2 text-left " + (risk===o.k ? "border-cyan-400 bg-[#0e2440]" : "border-[#243154] bg-[#0f1830]")}
